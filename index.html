    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; color: #1e293b; }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const React = window.React;
        const ReactDOM = window.ReactDOM;
        const { useState, useMemo, useRef, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyC82hnDtesWHC2Xm3P36V1kKQfl-1RIhtM",
            authDomain: "math-evaluation-system.firebaseapp.com",
            projectId: "math-evaluation-system",
            storageBucket: "math-evaluation-system.firebasestorage.app",
            messagingSenderId: "795313813853",
            appId: "1:795313813853:web:6a8e1224a0a4eb30b590b4"
        };

        if (!window.firebase.apps.length) { window.firebase.initializeApp(firebaseConfig); }
        const db = window.firebase.firestore();
        const auth = window.firebase.auth();
        const appId = firebaseConfig.projectId;

        // 🌟 문항분류코드 정규화 (MS03-01 -> MS301 호환 엔진) 🌟
        const normalizeCode = (code) => {
            if (!code) return '';
            let c = String(code).trim().toUpperCase();
            c = c.replace(/[\-\s_]/g, ''); // 하이픈, 공백, 언더바 완벽 제거
            if (c.startsWith('MS0')) {
                c = 'MS' + c.substring(3); // MS03 -> MS3 변환하여 호환성 확보
            }
            return c;
        };

        // 🌟 대단원 순수 추출 (괄호 및 불순물 철벽 방어) 🌟
        const cleanMajorUnit = (str) => {
            if (!str) return '미분류';
            let s = String(str);
            
            // 1. 괄호와 그 안의 내용 모두 날리기
            s = s.replace(/[\(\[\{<].*?[\)\]\}>]/g, '');
            
            // 2. 숫자, 특수문자 날리기
            s = s.replace(/[0-9\-\:\>_]/g, '');
            
            s = s.trim();

            // 3. 교과 과정 대단원 키워드로 강력하게 묶기 (차트 렌더링 최적화)
            if (s.includes('수와 연산') || s.includes('유리수') || s.includes('소수') || s.includes('제곱근') || s.includes('실수') || s.includes('소인수분해') || s.includes('정수')) return '수와 연산';
            if (s.includes('문자와 식') || s.includes('방정식') || s.includes('부등식') || s.includes('다항식') || s.includes('인수분해') || s.includes('이차방정식') || s.includes('일차방정식')) return '문자와 식';
            if (s.includes('함수') || s.includes('이차함수') || s.includes('일차함수') || s.includes('그래프')) return '함수';
            if (s.includes('기하') || s.includes('도형') || s.includes('삼각형') || s.includes('사각형') || s.includes('피타고라스') || s.includes('삼각비') || s.includes('원') || s.includes('닮음')) return '기하';
            if (s.includes('확률') || s.includes('통계') || s.includes('경우의 수') || s.includes('대푯값') || s.includes('산포도') || s.includes('자료의정리')) return '확률과 통계';
            
            return s || '기타 단원';
        };

        // --- 초정밀 시험 기간 문자열 분석기 ---
        const parsePeriodString = (rawStr, rawGradeStr = '', fileName = '') => {
            const parseLogic = (str, gradeStr) => {
                if (!str) return '';
                let s = String(str).trim();
                
                if (s.includes('_')) s = s.substring(s.indexOf('_') + 1);
                s = s.replace(/[\(\[][가-힣a-zA-Z0-9\s]+(?:중|고|여중|남중|여고|남고|중학교|고등학교)[\)\]]/g, ''); 
                
                const doubleBracketMatch = s.match(/\[(.*?)\]\s*\[(.*?)\]/);
                if (doubleBracketMatch) {
                    let sem = doubleBracketMatch[1].replace(/성취도\s*평가|테스트/g, '').replace(/\s+/g, '').replace(/^[중고](?=\d-\d)/, '');
                    let exam = doubleBracketMatch[2].trim().replace(/고사$/, '');
                    if (!sem) {
                       let sMatch = s.match(/(\d)\s*-\s*(\d)/);
                       if (sMatch) sem = `${sMatch[1]}-${sMatch[2]}`;
                    }
                    if (sem && exam) return `${sem} ${exam}`;
                }
                
                const parenMatch = s.match(/(.*?)(?:성취도\s*평가|테스트)?\s*[\(\[](.+?)[\)\]]/);
                if (parenMatch) {
                    let sem = parenMatch[1].replace(/성취도\s*평가|테스트/g, '').replace(/\s+/g, '').replace(/^[중고](?=\d-\d)/, '');
                    let exam = parenMatch[2].trim().replace(/고사$/, '');
                    if (!sem) {
                       let sMatch = s.match(/(\d)\s*-\s*(\d)/);
                       if (sMatch) sem = `${sMatch[1]}-${sMatch[2]}`;
                    }
                    if (sem && exam) return `${sem} ${exam}`;
                }
                
                s = s.replace(/성취도\s*평가|테스트/g, '');
                let semester = '';
                let sMatch = s.match(/(\d)\s*-\s*(\d)/) || String(gradeStr).match(/(\d)\s*-\s*(\d)/);
                
                if (sMatch) {
                    semester = `${sMatch[1]}-${sMatch[2]}`;
                } else if (s.includes('공통수학') || String(gradeStr).includes('공통수학')) {
                    let m = s.match(/공통수학\s*([12])/) || String(gradeStr).match(/공통수학\s*([12])/);
                    semester = m ? `공통수학${m[1]}` : '공통수학';
                } else {
                    let strForGrade = s.replace(/20\d{2}/g, '');
                    let gradeMatchStr = String(gradeStr) ? String(gradeStr) : strForGrade;
                    let gMatch = gradeMatchStr.match(/(?:중|고)?\s*([1-6])/);
                    let tMatch = s.match(/(\d)\s*학기/);
                    if (gMatch && tMatch) {
                        semester = `${gMatch[1]}-${tMatch[1]}`;
                    }
                }
                
                let exam = '';
                if (s.includes('중간')) exam = '중간';
                else if (s.includes('기말')) exam = '기말';
                
                if (semester && exam) return `${semester} ${exam}`;
                if (semester) return semester;
                return String(str).trim();
            };

            if (fileName) {
                const baseName = fileName.split('.')[0].trim();
                const fileResult = parseLogic(baseName, '');
                if (fileResult && fileResult.includes(' ')) return fileResult;
            }
            
            let result = parseLogic(rawStr, rawGradeStr);
            
            if ((!result || result.length < 2 || !result.includes(' ')) && fileName) {
                const baseName = fileName.split('.')[0].trim();
                const fbResult = parseLogic(baseName, '');
                if (fbResult && fbResult.includes(' ')) { result = fbResult; }
            }
            
            return result;
        };

        const encodeReportData = (analysisData, studentName) => {
            const dictMap = new Map();
            const dict = [];
            const getDictIdx = (str) => {
                const s = String(str || '');
                if (!dictMap.has(s)) { dictMap.set(s, dict.length); dict.push(s); }
                return dictMap.get(s);
            };

            const r = analysisData.results.map(res => [
                res.qNum, getDictIdx(res.majorUnit), getDictIdx(res.minorUnit),
                getDictIdx(res.type), getDictIdx(res.difficulty), 
                res.status === 'O' ? 2 : (res.status === '△' ? 1 : 0),
                res.fullScore || 0, res.earnedScore || 0,
                getDictIdx(res.concept || '') 
            ]);

            const payload = { p: analysisData.targetPeriod, n: studentName, d: dict, r: r, s: analysisData.schoolName || '' };
            try { return window.LZString.compressToEncodedURIComponent(JSON.stringify(payload)); } catch(e) { return null; }
        };

        const decodeReportData = (encodedStr) => {
            try {
                let jsonStr = window.LZString.decompressFromEncodedURIComponent(encodedStr);
                let payload;
                if (jsonStr) { payload = JSON.parse(jsonStr); } 
                else {
                    const safeStr = encodedStr.replace(/ /g, '+');
                    try { jsonStr = decodeURIComponent(escape(window.atob(safeStr))); }
                    catch(e) { jsonStr = decodeURIComponent(window.atob(safeStr)); }
                    payload = JSON.parse(jsonStr);
                }
                if (payload.period) return payload;

                const dict = payload.d;
                const results = payload.r.map(item => {
                    const isOldFormat = item.length <= 7;
                    const fullScore = isOldFormat ? item[6] : item[6];
                    let status, earnedScore, conceptStr = '';

                    if (isOldFormat) {
                        status = item[5] === 1 ? 'O' : 'X';
                        earnedScore = item[5] === 1 ? fullScore : 0;
                    } else {
                        status = item[5] === 2 ? 'O' : (item[5] === 1 ? '△' : 'X');
                        earnedScore = item[7];
                        if (item.length > 8) conceptStr = dict[item[8]];
                    }

                    return {
                        qNum: item[0], majorUnit: dict[item[1]], minorUnit: dict[item[2]],
                        type: dict[item[3]], difficulty: dict[item[4]], concept: conceptStr,
                        isCorrect: earnedScore > 0, 
                        score: fullScore, fullScore: fullScore, earnedScore: earnedScore, status: status
                    };
                });

                let totalScoreCalc = 0, maxScore = 0;
                const unitStats = {};
                const diffStats = { '상': {total:0, correct:0}, '중': {total:0, correct:0}, '하': {total:0, correct:0} };
                const typeStats = {};

                results.forEach(r => {
                    totalScoreCalc += r.earnedScore !== undefined ? r.earnedScore : (r.isCorrect ? r.score : 0); 
                    maxScore += r.fullScore !== undefined ? r.fullScore : r.score;
                    
                    let major = cleanMajorUnit(r.majorUnit);

                    if(!unitStats[major]) unitStats[major] = { total: 0, correct: 0 };
                    unitStats[major].total++; if(r.earnedScore > 0) unitStats[major].correct++;

                    let d = String(r.difficulty || '중');
                    if (d.includes('상') || d.includes('어려움') || d.includes('7') || d.includes('8')) d = '상';
                    else if (d.includes('하') || d.includes('쉬움') || d.includes('1') || d.includes('2')) d = '하';
                    else d = '중';
                    
                    if(!diffStats[d]) diffStats[d] = {total:0, correct:0};
                    diffStats[d].total++; if(r.earnedScore > 0) diffStats[d].correct++;

                    let t = String(r.type || '기타');
                    if (t.includes('객관')) t = '객관식'; else if (t.includes('주관') || t.includes('서술')) t = '주관식/서술형'; else t = '기타';
                    if(!typeStats[t]) typeStats[t] = { total: 0, correct: 0 };
                    typeStats[t].total++; if(r.earnedScore > 0) typeStats[t].correct++;
                });

                const totalScore = maxScore > 0 ? Math.round(totalScoreCalc * 10) / 10 : Math.round((results.filter(r => r.isCorrect).length / results.length) * 100);
                const diffOrder = ['하', '중', '상', '최상'];
                const unitData = Object.entries(unitStats).map(([name, stats]) => ({ name, ...stats }));
                
                const diffData = Object.entries(diffStats).map(([name, stats]) => {
                    let itemColor = '#10b981'; 
                    if (name === '상') itemColor = '#f97316'; 
                    else if (name === '중') itemColor = '#10b981'; 
                    else if (name === '하') itemColor = '#fde047'; 
                    return { name, ...stats, color: itemColor };
                }).filter(d=>d.total>0).sort((a,b) => diffOrder.indexOf(b.name) - diffOrder.indexOf(a.name));

                const analysisDataProxy = { unitData, totalScore, results, targetPeriod: payload.p, typeStats };
                const comments = generateAIComment(analysisDataProxy);

                return {
                    period: payload.p, name: payload.n, score: totalScore, schoolName: payload.s || '',
                    results: results, units: unitData, diffs: diffData, types: typeStats, comments: comments
                };
            } catch(e) { console.error("데이터 디코딩 실패:", e); return null; }
        };

        const generateAIComment = (analysisData) => {
            if (!analysisData) return {};
            const { unitData, totalScore, results } = analysisData;
            
            const maxScore = results.reduce((acc, r) => acc + (r.fullScore || r.score || r.s || 0), 0);
            const percentage = maxScore > 0 ? (totalScore / maxScore) * 100 : (results.filter(r => r.isCorrect).length / results.length) * 100;
            
            const unitsWithPct = unitData.map(u => ({ name: u.name, pct: (u.correct / u.total) * 100 })).sort((a, b) => b.pct - a.pct);

            let strongText = "-", weakText = "-", primaryWeakUnit = "-";

            if (unitsWithPct.length > 0) {
                const bestScore = unitsWithPct[0].pct;
                const strongUnits = unitsWithPct.filter(u => u.pct === bestScore || u.pct >= 90).slice(0, 2);
                strongText = strongUnits.map(u => u.name).join(', ');

                const weakCandidates = unitsWithPct.filter(u => u.pct <= 70).sort((a, b) => a.pct - b.pct);
                if (weakCandidates.length > 0) {
                    weakText = weakCandidates.slice(0, 2).map(u => u.name).join(', ');
                    primaryWeakUnit = weakCandidates[0].name;
                } else {
                    const nextWeak = unitsWithPct.filter(u => u.pct < 100).sort((a, b) => a.pct - b.pct);
                    if (nextWeak.length > 0) {
                        weakText = "전반적으로 양호함";
                        primaryWeakUnit = nextWeak[0].name;
                    } else {
                        weakText = "취약 단원 없음 (완벽함!)";
                        primaryWeakUnit = unitsWithPct[unitsWithPct.length - 1]?.name || "-";
                    }
                }
            }

            const kiceGuidelines = {
                "수와 연산": "실수의 체계와 성질을 명확히 이해하고, 빠르고 정확한 연산을 요구합니다.",
                "문자와 식": "주어진 조건을 수식으로 정확히 표현하고, 다항식의 전개와 인수분해, 그리고 방정식 및 부등식을 논리적으로 해결하는 능력이 필요합니다.",
                "함수": "함수의 정의를 바탕으로 그래프를 그리고, x절편, y절편, 기울기, 꼭짓점 등의 기하학적 의미를 파악하는 것이 중요합니다.",
                "기하": "도형의 성질(합동, 닮음, 피타고라스 정리, 삼각비, 원 등)을 이용하여 보조선을 긋고 길이나 넓이를 구하는 공간 지각력이 요구됩니다.",
                "확률과 통계": "경우의 수를 빠짐없이 구하고, 확률의 기본 성질 및 대푯값과 산포도의 의미를 바탕으로 실생활 상황을 해석하는 사고방식이 필요합니다."
            };

            let matchedGuideline = kiceGuidelines[primaryWeakUnit] || "전반적인 수학 기본 개념을 탄탄히 다지는 것이 중요합니다.";

            let method = "";
            if (percentage >= 100) {
                method = `모든 단원의 개념을 완벽하게 이해하고 있습니다! 🎉 현재의 훌륭한 학습 패턴을 유지하며, 심화 문제나 선행 학습을 가볍게 시작해 보는 것을 적극 추천합니다.`;
                weakText = "취약 단원 없음 (완벽함!)";
            }
            else if (percentage >= 90) {
                if (weakText === "취약 단원 없음 (완벽함!)" || weakText === "전반적으로 양호함") {
                    method = `전체적인 개념 이해도가 매우 우수합니다. 간혹 실수하는 문제나 고난도 심화 문제를 집중적으로 풀어보며 100점을 향한 훈련을 진행하세요.`;
                    weakText = "전반적으로 우수함";
                } else {
                    method = `전체적인 개념 이해도가 매우 우수합니다. 간혹 실수하는 문제나 고난도 심화 문제를 집중적으로 풀어보며 100점을 향한 훈련을 진행하세요.\n\n📌 [KICE 평가원 기준 학습 조언]\n${matchedGuideline}`;
                }
            }
            else if (percentage >= 70) {
                if (weakText === "취약 단원 없음 (완벽함!)" || weakText === "전반적으로 양호함") {
                    method = `기본적인 개념은 잘 잡혀 있습니다. 틀린 문제들의 오답 노트를 작성하고 기본 예제를 다시 한 번 풀어보며 실수를 줄여보세요.`;
                    weakText = "전반적으로 양호함";
                } else {
                    method = `기본적인 개념은 잘 잡혀 있으나 특정 단원([${weakText}])에서 오답이 발생하고 있습니다.\n\n📌 [KICE 평가원 기준 학습 조언]\n${matchedGuideline}\n\n위 지침을 바탕으로 오답 노트를 작성하며 빈틈을 메워주세요.`;
                }
            }
            else {
                method = `전반적인 기초 개념 다지기가 우선되어야 합니다. 어려운 문제보다는 교과서 위주의 기본 문제를 반복해서 풀며 원리를 정확히 이해하는 학습이 필요합니다.\n\n📌 [최우선 보완 단원 조언]\n${matchedGuideline}`;
            }

            return { strong: strongText, weak: weakText, method };
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = ''; 
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    i.style.width = `${size}px`; i.style.height = `${size}px`;
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons();
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const DonutChart = ({ data, title }) => {
            const total = data.reduce((sum, d) => sum + d.value, 0);
            let cumulative = 0;
            if (total === 0) return null;

            return (
                <div className="flex flex-col items-center bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex-1 min-w-[140px] max-w-[200px]">
                    <h4 className="text-[13px] font-black text-slate-700 mb-3 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200 w-full text-center truncate">{title}</h4>
                    <div className="relative flex items-center justify-center w-full">
                        <svg viewBox="-1.2 -1.2 2.4 2.4" className="w-full h-full transform -rotate-90 drop-shadow-sm max-w-[90px] max-h-[90px]">
                            {data.map((slice, i) => {
                                const pct = slice.value / total;
                                if (pct === 0) return null;
                                const startX = Math.cos(2 * Math.PI * cumulative);
                                const startY = Math.sin(2 * Math.PI * cumulative);
                                cumulative += pct;
                                const endX = Math.cos(2 * Math.PI * cumulative);
                                const endY = Math.sin(2 * Math.PI * cumulative);
                                const largeArc = pct > 0.5 ? 1 : 0;
                                const path = pct === 1 
                                    ? `M 1 0 A 1 1 0 1 1 -1 0 A 1 1 0 1 1 1 0` 
                                    : `M ${startX} ${startY} A 1 1 0 ${largeArc} 1 ${endX} ${endY} L 0 0`;
                                return <path key={i} d={path} fill={slice.color} stroke="#fff" strokeWidth="0.1" strokeLinejoin="round" />;
                            })}
                            <circle cx="0" cy="0" r="0.65" fill="#fff" />
                            <text x="0" y="0.05" textAnchor="middle" dominantBaseline="middle" className="text-[0.45px] font-black fill-indigo-600" style={{transform: 'rotate(90deg)'}}>{Math.round((data[0]?.value/total)*100 || 0)}%</text>
                        </svg>
                    </div>
                    <div className="flex flex-col gap-1.5 mt-4 w-full px-1">
                        {data.map((d, i) => (
                            <div key={i} className="flex items-center justify-between text-xs w-full">
                                <div className="flex items-center gap-1.5 shrink-0">
                                    <span className="w-2.5 h-2.5 rounded-full shadow-sm" style={{ backgroundColor: d.color }}></span>
                                    <span className="font-bold text-slate-600">{d.name}</span>
                                </div>
                                <span className="text-slate-500 font-bold shrink-0">{d.value}개</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const HorizontalBarChart = ({ data, color, isExamView = false }) => {
            return (
                <div className="flex flex-col gap-4 w-full">
                    {data.map((item, i) => {
                        const pct = item.total === 0 ? 0 : (isExamView ? item.percent : Math.round((item.correct / item.total) * 100));
                        const barColor = item.color || color || '#4f46e5';
                        const isLightColor = item.name.includes('1~2') || item.name === '하'; 
                        
                        return (
                            <div key={i} className="flex flex-col gap-1.5 w-full">
                                <div className="flex justify-between items-end w-full">
                                    <span className="text-[14px] font-bold text-slate-700 leading-tight flex-1 pr-2 whitespace-normal break-keep">{item.name}</span>
                                    <span className="text-xs text-slate-400 font-bold shrink-0">
                                        {isExamView ? `${pct}% (${item.correct}문항)` : (item.correct !== undefined ? `${item.correct}/${item.total}` : `${item.total}문항`)}
                                    </span>
                                </div>
                                <div className="w-full h-4 bg-slate-100 rounded-full overflow-hidden flex relative shadow-inner">
                                    <div className="h-full rounded-full flex items-center justify-end px-2" style={{ width: `${pct}%`, backgroundColor: barColor, transition: 'width 1s' }}>
                                        {pct > 15 && !isExamView && <span className={`text-[10px] font-bold ${isLightColor ? 'text-slate-700' : 'text-white'}`}>{pct}%</span>}
                                    </div>
                                    {pct <= 15 && !isExamView && <span className="absolute left-2 top-1/2 transform -translate-y-1/2 text-[10px] text-slate-500 font-bold">{pct}%</span>}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const DetailRowItem = ({ r }) => {
            const qNum = r.q !== undefined ? r.q : r.qNum;
            const rawMajor = r.m !== undefined ? r.m : r.majorUnit;
            const cleanMajor = cleanMajorUnit(rawMajor); // 🌟 무조건 순수 대단원
            
            const minor = r.i !== undefined ? r.i : r.minorUnit;
            const type = r.t !== undefined ? r.t : r.type;
            const diff = r.d !== undefined ? r.d : r.difficulty;
            
            const fullScore = r.fullScore !== undefined ? r.fullScore : (r.score !== undefined ? r.score : r.s);
            const status = r.status !== undefined ? r.status : (r.c !== undefined ? (r.c ? 'O' : 'X') : (r.isCorrect ? 'O' : 'X'));
            const earnedScore = r.earnedScore !== undefined ? r.earnedScore : (status === 'O' ? fullScore : 0);

            let statusIcon;
            if (status === 'O') {
                statusIcon = <div className="w-9 h-9 rounded-full border-2 border-emerald-500 text-emerald-500 flex items-center justify-center font-black text-[15px] bg-emerald-50">O</div>;
            } else if (status === '△') {
                statusIcon = <div className="w-9 h-9 rounded-full border-2 border-orange-500 text-orange-500 flex items-center justify-center font-black text-[18px] bg-orange-50 pb-0.5">△</div>;
            } else {
                statusIcon = <div className="w-9 h-9 rounded-full border-2 border-rose-500 text-rose-500 flex items-center justify-center font-black text-[15px] bg-rose-50">X</div>;
            }

            return (
                <div className="flex items-start justify-between p-3.5 bg-white rounded-xl border border-slate-200 shadow-sm h-auto break-inside-avoid">
                    <div className="flex items-start gap-3 w-full">
                        <div className="mt-0.5 w-8 h-8 rounded-full bg-slate-100 text-slate-700 font-black flex items-center justify-center shrink-0 text-sm shadow-sm border border-slate-200">
                            {qNum || '-'}
                        </div>
                        <div className="flex flex-col flex-1 min-w-0 pr-2">
                            <span className="text-[14px] font-bold text-slate-800 mb-1.5 leading-snug break-words whitespace-normal">
                                {cleanMajor} <span className="text-slate-400 font-normal text-[12px] inline-block">| {minor || '-'}</span>
                            </span>
                            <div className="flex flex-wrap gap-1.5 text-[10px] items-center">
                                <span className="bg-slate-50 text-slate-500 px-1.5 py-0.5 rounded border border-slate-200 font-bold whitespace-nowrap">{type || '-'}</span>
                                <span className={`px-1.5 py-0.5 rounded font-bold border whitespace-nowrap ${diff==='상'?'text-rose-600 bg-rose-50 border-rose-100':(diff==='하'?'text-emerald-600 bg-emerald-50 border-emerald-100':'text-amber-600 bg-amber-50 border-amber-100')}`}>{diff || '-'}</span>
                                {fullScore > 0 && <span className="text-indigo-500 font-bold px-1.5 py-0.5 whitespace-nowrap">{status === '△' ? `${earnedScore}점 / ${fullScore}점` : `${fullScore}점`}</span>}
                            </div>
                        </div>
                        <div className="shrink-0 flex items-center justify-center ml-1 mt-0.5">
                            {statusIcon}
                        </div>
                    </div>
                </div>
            );
        };

        const StudentReportMobileView = ({ data }) => {
            if (!data) return <div className="p-8 text-center h-screen flex items-center justify-center font-bold text-slate-500">데이터를 불러올 수 없습니다.</div>;

            return (
                <div className="min-h-screen bg-slate-100 md:py-8 font-sans">
                    <div className="max-w-md mx-auto bg-white md:rounded-3xl shadow-2xl overflow-hidden min-h-screen md:min-h-0 pb-12">
                        <div className="bg-indigo-600 p-6 pt-10 text-white text-center relative overflow-hidden">
                            <div className="absolute opacity-10 -right-6 -top-6"><Icon name="award" size={150} /></div>
                            <p className="text-indigo-200 font-bold text-xs tracking-widest mb-1 relative z-10 uppercase">Math Report</p>
                            <div className="flex flex-col items-center justify-center relative z-10 mb-6 gap-1">
                                <h1 className="text-2xl font-black text-center">{data.period} 수학 성취도</h1>
                                {data.schoolName && (
                                    <span className="text-sm font-bold text-indigo-200 bg-indigo-800/50 px-3 py-0.5 rounded-full">{data.schoolName}</span>
                                )}
                            </div>
                        </div>

                        <div className="px-4 -mt-10 relative z-20 mb-6">
                            <div className="bg-white rounded-2xl shadow-xl border border-slate-100 p-5 flex items-stretch gap-4">
                                <div className="flex flex-col items-center justify-center flex-shrink-0 pr-4 border-r border-slate-100 min-w-[90px]">
                                    <span className="text-[12px] font-bold text-slate-500 mb-1">{data.name} 학생</span>
                                    <div className="flex items-baseline gap-0.5 text-indigo-600">
                                        <span className="text-4xl font-black tracking-tighter">{data.score}</span>
                                        <span className="text-sm font-bold">점</span>
                                    </div>
                                </div>
                                
                                <div className="flex flex-col gap-3 flex-1 min-w-0 justify-center">
                                    <div className="flex items-start gap-2.5">
                                        <div className="bg-emerald-50 text-emerald-600 p-1.5 rounded mt-0.5 shrink-0"><Icon name="trending-up" size={14}/></div>
                                        <div className="flex-1 min-w-0">
                                            <p className="text-[11px] font-bold text-slate-400 leading-none mb-1">강한 단원</p>
                                            <p className="text-[13px] font-black text-slate-800 truncate break-keep">{data.comments.strong}</p>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-2.5">
                                        <div className="bg-rose-50 text-rose-600 p-1.5 rounded mt-0.5 shrink-0"><Icon name="trending-down" size={14}/></div>
                                        <div className="flex-1 min-w-0">
                                            <p className="text-[11px] font-bold text-slate-400 leading-none mb-1">
                                                {data.comments.weak.includes('완벽함') || data.comments.weak.includes('우수함') || data.comments.weak.includes('양호함') ? '특이사항' : '보완 단원'}
                                            </p>
                                            <p className={`text-[13px] font-black truncate break-keep ${data.comments.weak.includes('완벽함') ? 'text-emerald-600' : 'text-slate-800'}`}>
                                                {data.comments.weak}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="px-4 space-y-8 mt-2">
                            <p className="text-[13.5px] text-slate-700 leading-relaxed font-medium bg-white p-5 rounded-2xl border border-slate-100 shadow-sm whitespace-pre-wrap break-keep">
                                <span className="font-bold text-indigo-600 mr-1 flex items-center gap-1.5 mb-2"><Icon name="lightbulb" size={16}/>전문 학습 가이드</span>{data.comments.method}
                            </p>

                            <div>
                                <h3 className="font-black text-slate-800 mb-4 border-b-2 border-slate-100 pb-2 flex items-center gap-2 text-[15px]"><Icon name="bar-chart-2" size={18} className="text-indigo-500"/> 단원별 성취도</h3>
                                <HorizontalBarChart data={data.units || data.unitData} color="#4f46e5" />
                            </div>

                            <div>
                                <h3 className="font-black text-slate-800 mb-4 border-b-2 border-slate-100 pb-2 flex items-center gap-2 text-[15px]"><Icon name="layers" size={18} className="text-emerald-500"/> 난이도별 성취도</h3>
                                <HorizontalBarChart data={data.diffs || data.diffData} color="#10b981" />
                            </div>

                            {data.types && Object.keys(data.types).length > 0 && (
                                <div>
                                    <h3 className="font-black text-slate-800 mb-4 border-b-2 border-slate-100 pb-2 flex items-center gap-2 text-[15px]"><Icon name="pie-chart" size={18} className="text-amber-500"/> 문제유형별 정답률</h3>
                                    <div className="flex flex-wrap gap-4 justify-center w-full">
                                        {Object.entries(data.types).map(([type, stats]) => (
                                            <DonutChart key={type} data={[{name: '정답', value: stats.correct, color: '#4f46e5'}, {name: '오답', value: stats.total-stats.correct, color: '#e2e8f0'}]} title={type} />
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div>
                                <h3 className="font-black text-slate-800 mb-4 border-b-2 border-slate-100 pb-2 flex items-center gap-2 text-[15px]"><Icon name="check-square" size={18} className="text-indigo-600"/> 상세 정오표</h3>
                                <div className="grid grid-cols-1 gap-y-3 flex-1 items-start content-start">
                                    {data.results.map((r, idx) => (
                                        <DetailRowItem key={idx} r={r} />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 📊 기출 분석 전용 뷰 컴포넌트 ---
        const ExamAnalysisView = ({ data }) => {
            const [questionImages, setQuestionImages] = useState({});

            const handleImageUpload = (e, qNum) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setQuestionImages(prev => ({ ...prev, [qNum]: event.target.result }));
                    };
                    reader.readAsDataURL(file);
                }
            };

            const formattedTitleElements = useMemo(() => {
                const fileName = data.fileName || "";
                let year = "";
                let school = "";
                let semester = "";
                let exam = "";

                const yearMatch = fileName.match(/(24|25|26|27|28|29|30)/);
                if (yearMatch) year = yearMatch[0] + "년";

                const schoolMatch = fileName.match(/[가-힣]{2,4}(?:중|고)/);
                if (schoolMatch) school = schoolMatch[0];
                else if (fileName.includes("신곡")) school = "신곡중";
                else if (fileName.includes("남천")) school = "남천중";
                else if (fileName.includes("해강")) school = "해강중";

                if (fileName.match(/1-1|1학년\s*1학기/)) semester = "1-1";
                else if (fileName.match(/1-2|1학년\s*2학기/)) semester = "1-2";
                else if (fileName.match(/2-1|2학년\s*1학기/)) semester = "2-1";
                else if (fileName.match(/2-2|2학년\s*2학기/)) semester = "2-2";
                else if (fileName.match(/3-1|3학년\s*1학기/)) semester = "3-1";
                else if (fileName.match(/3-2|3학년\s*2학기/)) semester = "3-2";

                if (fileName.includes("중간")) exam = "중간고사";
                else if (fileName.includes("기말")) exam = "기말고사";

                const parts = [year, school, semester, exam].filter(Boolean);
                if (parts.length > 0) {
                    return (
                        <h1 className="text-[26px] font-black text-slate-900 leading-tight break-keep">
                            <span className="text-orange-600 mr-2">{parts.join(' ')}</span>분석
                        </h1>
                    );
                }

                return (
                    <h1 className="text-[26px] font-black text-slate-900 leading-tight break-keep">
                        <span className="text-orange-600 mr-2">{fileName}</span>분석
                    </h1>
                );
            }, [data.fileName]);

            if (!data) return <div className="p-8 text-center h-screen flex items-center justify-center font-bold text-slate-500">기출 데이터를 불러올 수 없습니다. 시험을 먼저 선택해주세요.</div>;

            return (
                <div className="pt-8 no-print:bg-slate-100 font-sans">
                    <div className="a4-page bg-white print-page-auto mb-8 relative">
                        <div className="border-b-4 border-orange-500 pb-4 mb-6 flex justify-between items-end">
                            <div>
                                <div className="text-orange-500 font-black text-xs tracking-widest mb-1 uppercase tracking-tighter">Exam Analysis Report</div>
                                {formattedTitleElements}
                            </div>
                            <div className="text-right">
                                <p className="text-sm text-slate-500 font-bold mb-1 uppercase tracking-tighter">Total Questions</p>
                                <p className="text-xl font-black text-slate-800 bg-orange-50 px-4 py-1 rounded-lg shadow-sm border border-orange-100">{data.targetExams.length}문항</p>
                            </div>
                        </div>

                        <div className="mb-8 break-inside-avoid">
                            <h2 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2 border-l-4 border-orange-500 pl-3">1. 기본 정보</h2>
                            <div className="bg-slate-50 rounded-2xl border border-slate-200 p-5 shadow-sm space-y-5">
                                <div>
                                    <h3 className="text-sm font-bold text-slate-500 mb-2 flex items-center gap-1"><Icon name="book-open" size={16}/> 시험 범위</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {/* 🌟 시험범위 무조건 순수 대단원만 나오게 됨 */}
                                        {data.scopes.map((scope, idx) => (
                                            <span key={idx} className="bg-white border border-slate-200 text-slate-700 px-3 py-1.5 rounded-lg text-[13px] font-bold shadow-sm">{scope}</span>
                                        ))}
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-8 print:gap-4">
                                    <div>
                                        <h3 className="text-sm font-bold text-slate-500 mb-3 flex items-center gap-1"><Icon name="pie-chart" size={16}/> 단원별 문항 분포</h3>
                                        <HorizontalBarChart data={data.unitDistribution.map(u => ({...u, correct: u.count}))} color="#f97316" isExamView={true} />
                                    </div>
                                    <div>
                                        <h3 className="text-sm font-bold text-slate-500 mb-3 flex items-center gap-1"><Icon name="bar-chart" size={16}/> 난이도별 문항 분포 (1~8단계)</h3>
                                        <HorizontalBarChart data={data.diffLevelsList} isExamView={true} />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="mb-8 break-inside-avoid">
                            <h2 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2 border-l-4 border-orange-500 pl-3">2. 전체 구성 및 출제 경향</h2>
                            <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                                <p className="text-[14px] text-slate-700 leading-relaxed font-medium whitespace-pre-wrap break-keep">
                                    {data.trendComment}
                                </p>
                            </div>
                        </div>

                        {data.coreQuestions && data.coreQuestions.length > 0 && (
                            <div className="mb-8 break-inside-avoid">
                                <h2 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2 border-l-4 border-orange-500 pl-3">3. 핵심 문항 심층 분석</h2>
                                <div className="grid grid-cols-2 gap-4 print:gap-3">
                                    {data.coreQuestions.map((q, idx) => (
                                        <div key={idx} className="bg-white border border-orange-200 rounded-2xl shadow-sm relative overflow-hidden flex flex-col">
                                            <div className="absolute top-0 right-0 bg-orange-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-lg z-10">고난도 문항</div>
                                            
                                            <label className="bg-slate-50 w-full min-h-[150px] flex flex-col items-center justify-center border-b border-slate-200 cursor-pointer hover:bg-slate-100 transition-colors relative group">
                                                <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(e, q.qNum)} />
                                                {questionImages[q.qNum] ? (
                                                    <img src={questionImages[q.qNum]} alt={`문항 ${q.qNum}`} className="max-w-full max-h-[300px] object-contain p-2" />
                                                ) : (
                                                    <div className="flex flex-col items-center text-slate-400 group-hover:text-orange-500 transition-colors px-4 text-center">
                                                        <Icon name="camera" size={32} className="mb-2 opacity-50 group-hover:opacity-100" />
                                                        <span className="font-bold text-sm">이곳을 클릭해 핵심 문항 이미지를 첨부하세요</span>
                                                    </div>
                                                )}
                                            </label>
                                            
                                            <div className="p-4 flex flex-col flex-1">
                                                <h3 className="text-[16px] font-black text-slate-800 mb-3 flex items-center gap-2">
                                                    <div className="w-6 h-6 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center text-sm shrink-0">{q.qNum}</div>
                                                    <span className="truncate">{q.cleanMajor}</span> <span className="text-xs text-slate-400 font-medium shrink-0">| {q.minorUnit}</span>
                                                </h3>
                                                <div className="space-y-3 flex-1 flex flex-col justify-end">
                                                    {q.aiPoint && (
                                                        <div>
                                                            <p className="text-[11px] font-bold text-orange-500 mb-0.5">⚠️ 어려운 포인트 (AI)</p>
                                                            <p className="text-[13px] text-slate-700 font-medium break-keep leading-tight">{q.aiPoint}</p>
                                                        </div>
                                                    )}
                                                    <div>
                                                        <p className="text-[11px] font-bold text-orange-500 mb-0.5">🧠 필요한 개념</p>
                                                        <p className="text-[13px] text-slate-700 font-medium break-keep leading-tight">{q.aiConcept || q.concept || q.minorUnit}</p>
                                                    </div>
                                                    <div className="bg-orange-50 p-3 rounded-lg border border-orange-100 mt-2">
                                                        <p className="text-[11px] font-bold text-orange-600 mb-1">💡 단계별 해결 전략 (AI)</p>
                                                        <p className="text-[12px] text-slate-800 font-bold whitespace-pre-wrap leading-relaxed break-keep">{q.aiStrategy}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                        <div className="absolute bottom-10 print:bottom-6 left-0 right-0 text-center text-[10px] text-slate-300 font-bold tracking-[0.2em] uppercase font-sans">
                            Exam Analysis Report — Page 1
                        </div>
                    </div>
                    
                    <div className="a4-page bg-white print-page-auto relative">
                        <div className="mb-4">
                            <h2 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2 border-l-4 border-orange-500 pl-3">4. 문항별 상세 분석</h2>
                            <div className="overflow-x-auto rounded-xl border border-slate-200">
                                <table className="w-full text-left border-collapse text-[12px]">
                                    <thead>
                                        <tr className="bg-slate-50 border-b border-slate-200">
                                            <th className="py-2.5 px-3 font-bold text-slate-500 text-center w-12 border-r">문항</th>
                                            <th className="py-2.5 px-3 font-bold text-slate-500 text-center w-16 border-r">유형</th>
                                            <th className="py-2.5 px-3 font-bold text-slate-500 border-r w-40">핵심 개념(세부 유형)</th>
                                            <th className="py-2.5 px-3 font-bold text-slate-500 text-center w-16 border-r">난이도</th>
                                            <th className="py-2.5 px-3 font-bold text-slate-500">풀이 전략 (AI)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {data.targetExams.map((q, idx) => (
                                            <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                <td className="py-2.5 px-3 text-center font-black text-slate-700 border-r">{q.qNum}</td>
                                                <td className="py-2.5 px-3 text-center font-bold text-slate-600 border-r">{q.type}</td>
                                                <td className="py-2.5 px-3 border-r">
                                                    <div className="font-bold text-slate-800 break-keep" style={{maxWidth: '160px'}}>{q.aiConcept || q.concept || q.minorUnit}</div>
                                                </td>
                                                <td className="py-2.5 px-3 text-center border-r">
                                                    <span className={`px-1.5 py-0.5 rounded font-bold whitespace-nowrap ${q.numericDifficulty >= 7 ? 'text-white bg-red-400 border border-red-500' : (q.numericDifficulty >= 5 ? 'text-red-800 bg-red-100 border border-red-200' : (q.numericDifficulty <= 2 ? 'text-yellow-800 bg-yellow-100 border border-yellow-200' : 'text-lime-800 bg-lime-100 border border-lime-200'))}`}>
                                                        {q.difficulty}
                                                    </span>
                                                </td>
                                                <td className="py-2.5 px-3 text-slate-700 font-medium break-keep leading-snug">
                                                    {q.aiStrategy || q.aiShortStrategy}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const urlParams = new URLSearchParams(window.location.search);
            const reportParam = urlParams.get('report');
            
            const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
            const [confirmModal, setConfirmModal] = useState({ show: false, message: '', onConfirm: null });
            const [linkModal, setLinkModal] = useState({ show: false, url: '' });
            const [pdfModal, setPdfModal] = useState({ show: false, url: '', isImage: false }); 
            
            const [masterDB, setMasterDB] = useState(() => JSON.parse(localStorage.getItem('math_master_codes_cache') || '{}'));
            
            const [isStudentView, setIsStudentView] = useState(false);
            const [studentReportData, setStudentReportData] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);

            const [viewMode, setViewMode] = useState('student');

            const [exams, setExams] = useState(() => JSON.parse(localStorage.getItem('math_exams_cache') || '[]'));
            const [students, setStudents] = useState(() => JSON.parse(localStorage.getItem('math_students_cache') || '[]'));
            const [examMedia, setExamMedia] = useState(null); 
            
            const [filters, setFilters] = useState({ semester: '', examType: '', studentName: '' });
            const [showDataModal, setShowDataModal] = useState(false);

            const showToast = (message, type = 'info') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 3500);
            };

            const requestConfirm = (message, onConfirm) => { setConfirmModal({ show: true, message, onConfirm }); };

            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        await auth.signInAnonymously().catch(err => {
                            console.warn("Firebase 익명 로그인 실패:", err);
                        });
                        
                        auth.onAuthStateChanged((u) => {
                            if (u) {
                                const examsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams');
                                const studentsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students');

                                examsRef.onSnapshot(snap => {
                                    const data = snap.docs.map(d => d.data());
                                    setExams(data); localStorage.setItem('math_exams_cache', JSON.stringify(data));
                                });
                                
                                studentsRef.onSnapshot(snap => {
                                    const data = snap.docs.map(d => d.data());
                                    setStudents(data); localStorage.setItem('math_students_cache', JSON.stringify(data));
                                });
                            }
                        });
                    } catch(e) { console.error("Firebase 초기화 에러:", e); }
                };
                initFirebase();
            }, []);

            useEffect(() => {
                if (reportParam) {
                    const decoded = decodeReportData(reportParam);
                    if (decoded) {
                        setStudentReportData(decoded); setIsStudentView(true);
                    } else {
                        showToast('유효하지 않은 링크이거나 손상된 데이터입니다.', 'error');
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }
            }, [reportParam]);

            const optionsData = useMemo(() => {
                const allPeriods = [...new Set(exams.map(e => e.period))]; 
                const semesters = [...new Set(allPeriods.map(p => {
                    const idx = p.indexOf(' '); return idx > -1 ? p.substring(0, idx) : p;
                }))].filter(Boolean).sort();
                
                const examTypes = [...new Set(allPeriods
                    .filter(p => filters.semester ? p.startsWith(filters.semester + ' ') : true)
                    .map(p => {
                        const idx = p.indexOf(' '); return idx > -1 ? p.substring(idx + 1) : '';
                    })
                )].filter(Boolean);
                
                const targetPeriod = `${filters.semester} ${filters.examType}`.trim();
                const availableStudents = [...new Set(students.filter(s => s.period === targetPeriod).map(s => s.name))].sort();

                return { semesters, examTypes, students: availableStudents };
            }, [exams, students, filters.semester, filters.examType]);

            useEffect(() => {
                if (!filters.semester && optionsData.semesters.length > 0) setFilters(prev => ({ ...prev, semester: optionsData.semesters[0] }));
            }, [optionsData.semesters]);

            useEffect(() => {
                if (optionsData.examTypes.length > 0 && (!filters.examType || !optionsData.examTypes.includes(filters.examType))) {
                    setFilters(prev => ({ ...prev, examType: optionsData.examTypes[0], studentName: '' }));
                }
            }, [optionsData.examTypes, filters.examType]);

            const analysisData = useMemo(() => {
                if (viewMode !== 'student' || !filters.semester || !filters.examType || !filters.studentName) return null;
                const targetPeriod = `${filters.semester} ${filters.examType}`;
                
                const targetExams = exams.filter(e => e.period === targetPeriod).sort((a,b) => a.qNum - b.qNum);
                const targetStudent = students.find(s => s.name === filters.studentName && s.period === targetPeriod);
                
                if (targetExams.length === 0 || !targetStudent) return null;

                let totalScoreCalc = 0;
                const results = targetExams.map(ex => {
                    const studentAns = targetStudent.responses[ex.qNum]; 
                    const fullScore = ex.score || 0; 
                    let earnedScore = 0;
                    let status = 'X';

                    if (studentAns === 'O' || studentAns === '정답') {
                        earnedScore = fullScore; status = 'O';
                    } else if (studentAns === 'X' || studentAns === '오답' || studentAns === undefined || studentAns === '') {
                        earnedScore = 0; status = 'X';
                    } else if (typeof studentAns === 'object' && studentAns !== null) {
                        const ratio = studentAns.studentFull > 0 ? (studentAns.earned / studentAns.studentFull) : 0;
                        earnedScore = fullScore * ratio;
                        earnedScore = Math.round(earnedScore * 10) / 10; 
                        
                        if (earnedScore >= fullScore && fullScore > 0) { earnedScore = fullScore; status = 'O'; } 
                        else if (earnedScore > 0) { status = '△'; } 
                        else { status = 'X'; }
                    } else {
                        const numAns = parseFloat(studentAns);
                        if (!isNaN(numAns)) {
                            earnedScore = numAns;
                            if (earnedScore >= fullScore && fullScore > 0) { earnedScore = fullScore; status = 'O'; } 
                            else if (earnedScore > 0) { status = '△'; } 
                            else { status = 'X'; }
                        }
                    }

                    totalScoreCalc += earnedScore;
                    const isCorrect = earnedScore > 0;
                    return { ...ex, isCorrect, studentAns, earnedScore, status, fullScore };
                });

                const maxPossibleScore = targetExams.reduce((sum, ex) => sum + (ex.score || 0), 0);
                const totalScore = maxPossibleScore > 0 ? Math.round(totalScoreCalc * 10) / 10 : Math.round((results.filter(r => r.isCorrect).length / results.length) * 100);

                const unitStats = {};
                results.forEach(r => {
                    const major = cleanMajorUnit(r.majorUnit);
                    if(!unitStats[major]) unitStats[major] = { total: 0, correct: 0 };
                    unitStats[major].total++; if(r.earnedScore > 0) unitStats[major].correct++;
                });
                const unitData = Object.entries(unitStats).map(([name, stats]) => ({ name, ...stats }));

                const diffOrder = ['하', '중', '상', '최상'];
                const diffStats = { '상': {total:0, correct:0}, '중': {total:0, correct:0}, '하': {total:0, correct:0} };
                results.forEach(r => {
                    let d = String(r.difficulty || '중');
                    if (d.includes('상') || d.includes('어려움') || d.includes('7') || d.includes('8')) d = '상';
                    else if (d.includes('하') || d.includes('쉬움') || d.includes('1') || d.includes('2')) d = '하';
                    else d = '중';
                    if(!diffStats[d]) diffStats[d] = {total:0, correct:0};
                    diffStats[d].total++; if(r.earnedScore > 0) diffStats[d].correct++;
                });
                
                const diffData = Object.entries(diffStats).map(([name, stats]) => {
                    let itemColor = '#10b981'; 
                    if (name === '상') itemColor = '#f97316'; 
                    else if (name === '중') itemColor = '#10b981'; 
                    else if (name === '하') itemColor = '#fde047'; 
                    return { name, ...stats, color: itemColor };
                }).filter(d=>d.total>0).sort((a,b) => diffOrder.indexOf(b.name) - diffOrder.indexOf(a.name));

                const typeStats = {};
                results.forEach(r => {
                    let t = String(r.type || '기타');
                    if (t.includes('객관')) t = '객관식'; else if (t.includes('주관') || t.includes('서술')) t = '주관식/서술형'; else t = '기타';
                    if(!typeStats[t]) typeStats[t] = { total: 0, correct: 0 };
                    typeStats[t].total++; if(r.earnedScore > 0) typeStats[t].correct++;
                });

                let schoolName = targetExams[0]?.school || '';
                const rawPeriod = targetExams[0]?.rawPeriod || ''; 
                if (schoolName) {
                    const yearMatch = String(rawPeriod).match(/20\d{2}/);
                    if (yearMatch && !schoolName.includes('년')) schoolName = `${yearMatch[0]}년 ${schoolName}`;
                }

                return { targetPeriod, results, totalScore, unitData, diffData, typeStats, schoolName };
            }, [exams, students, filters, viewMode]);

            const examReportData = useMemo(() => {
                if (viewMode !== 'exam' || !filters.semester || !filters.examType) return null;
                const targetPeriod = `${filters.semester} ${filters.examType}`;
                const targetExams = exams.filter(e => e.period === targetPeriod).sort((a,b) => a.qNum - b.qNum);
                
                if (targetExams.length === 0) return null;

                let schoolName = targetExams[0]?.school || '';
                const rawPeriod = targetExams[0]?.rawPeriod || ''; 
                if (schoolName) {
                    const yearMatch = String(rawPeriod).match(/20\d{2}/);
                    if (yearMatch && !schoolName.includes('년')) schoolName = `${yearMatch[0]}년 ${schoolName}`;
                }
                
                const scopes = [...new Set(targetExams.map(e => cleanMajorUnit(e.majorUnit)))].filter(Boolean);
                
                const unitCounts = {};
                targetExams.forEach(e => { 
                    const major = cleanMajorUnit(e.majorUnit);
                    unitCounts[major] = (unitCounts[major] || 0) + 1; 
                });
                const unitDistribution = Object.entries(unitCounts).map(([name, count]) => ({
                    name, count, total: targetExams.length, percent: Math.round((count / targetExams.length) * 100)
                })).sort((a,b) => b.count - a.count);

                const diffLevels = { '1~2단계': 0, '3~4단계': 0, '5~6단계': 0, '7~8단계': 0 };
                
                const processedExams = targetExams.map(e => {
                    let level = 4;
                    const match = String(e.difficulty).match(/\d+/);
                    if (match) level = parseInt(match[0]);
                    else {
                        if (e.difficulty.includes('상')) level = 7;
                        else if (e.difficulty.includes('하')) level = 2;
                        else level = 4;
                    }
                    
                    if (level <= 2) diffLevels['1~2단계']++;
                    else if (level <= 4) diffLevels['3~4단계']++;
                    else if (level <= 6) diffLevels['5~6단계']++;
                    else diffLevels['7~8단계']++;

                    const getMathStrategy = (unit) => {
                        if (unit.includes('복소수')) return "복소수의 상등 조건과 켤레복소수의 성질을 활용하여 식을 정리합니다.";
                        if (unit.includes('방정식')) return "주어진 조건을 만족하는 미지수를 설정하고, 근과 계수의 관계 또는 판별식을 적용합니다.";
                        if (unit.includes('부등식')) return "부등식의 영역을 수직선 또는 좌표평면에 나타내고 경곗값을 주의하여 해를 구합니다.";
                        if (unit.includes('함수') || unit.includes('그래프')) return "함수의 그래프 개형을 그리고, x절편, y절편, 꼭짓점 등의 기하학적 의미 파악이 필요합니다.";
                        if (unit.includes('도형') || unit.includes('기하') || unit.includes('삼각') || unit.includes('피타고라스')) return "보조선을 긋고 닮음비나 피타고라스 정리를 활용하여 길이나 넓이를 구합니다.";
                        if (unit.includes('확률') || unit.includes('경우의')) return "빠짐없이 중복되지 않게 수형도나 표를 이용하여 모든 경우를 분류해야 합니다.";
                        if (unit.includes('다항식') || unit.includes('인수분해')) return "공통인수로 묶거나 곱셈공식을 역으로 적용하여 식을 인수분해합니다.";
                        if (unit.includes('수') || unit.includes('연산') || unit.includes('제곱근')) return "실수 성질을 명확히 이해하고, 빠르고 정확한 연산을 요구합니다.";
                        return "주어진 조건을 해석하고 수식으로 세워 논리적으로 풀이합니다.";
                    };
                    
                    const fallbackStrategy = getMathStrategy((e.concept || e.minorUnit) + " " + e.majorUnit);
                    const cleanMajor = cleanMajorUnit(e.majorUnit);

                    // 🌟 AI가 추출해준 전략/포인트가 있으면 우선 적용하고, 없으면 빈칸이나 기본값 🌟
                    return { 
                        ...e, 
                        numericDifficulty: level, 
                        aiShortStrategy: e.aiStrategy || fallbackStrategy, 
                        aiStrategy: e.aiStrategy || fallbackStrategy,
                        aiPoint: e.aiPoint || "복합 개념 적용 및 계산의 복잡성",
                        aiConcept: e.aiConcept || e.concept || e.minorUnit,
                        cleanMajor 
                    };
                });

                const diffLevelsList = [
                    { name: '1~2단계', total: targetExams.length, correct: diffLevels['1~2단계'], percent: Math.round((diffLevels['1~2단계']/targetExams.length)*100), color: '#fef08a' },
                    { name: '3~4단계', total: targetExams.length, correct: diffLevels['3~4단계'], percent: Math.round((diffLevels['3~4단계']/targetExams.length)*100), color: '#d9f99d' },
                    { name: '5~6단계', total: targetExams.length, correct: diffLevels['5~6단계'], percent: Math.round((diffLevels['5~6단계']/targetExams.length)*100), color: '#fecaca' },
                    { name: '7~8단계', total: targetExams.length, correct: diffLevels['7~8단계'], percent: Math.round((diffLevels['7~8단계']/targetExams.length)*100), color: '#f87171' } 
                ].filter(d => d.correct > 0);

                let hardestUnit = unitDistribution.length > 0 ? unitDistribution[0].name : '전체';
                if (unitDistribution.length > 0) {
                    let maxDiffAvg = 0;
                    Object.entries(unitCounts).forEach(([u, count]) => {
                        const sumDiff = processedExams.filter(e => e.cleanMajor === u).reduce((s,e)=>s+e.numericDifficulty,0);
                        const avg = sumDiff / count;
                        if (avg > maxDiffAvg) { maxDiffAvg = avg; hardestUnit = u; }
                    });
                }
                
                const mainUnit = unitDistribution.length > 0 ? unitDistribution[0].name : '전체';
                const trendComment = `이번 ${schoolName} ${targetPeriod} 시험은 총 ${targetExams.length}문항으로 구성되었으며, 주로 [${mainUnit}] 단원을 중심으로 출제되었습니다.\n특히 [${hardestUnit}] 단원에서 고난도 변별력 문항이 집중 배치되어 전반적인 체감 난이도를 상승시키는 요인으로 작용했습니다. 단순 개념 암기를 넘어 주어진 조건을 정확히 해석하고 복합적인 원리를 적용해야 하는 문항이 포함되어 있으므로, 취약 유형에 대한 심층적인 분석과 단계별 풀이 훈련이 요구됩니다.`;

                // 🌟 하드코딩 덮어씌우기 버그 삭제 -> AI가 만든 결과 그대로 보존 🌟
                const coreQuestions = [...processedExams].sort((a,b) => b.numericDifficulty - a.numericDifficulty).slice(0, 2).map(q => {
                    return { ...q }; 
                });

                const fileName = targetExams[0]?.fileName || (schoolName ? `${schoolName} ${targetPeriod}` : targetPeriod);

                return { targetPeriod, schoolName, fileName, scopes, unitDistribution, diffLevelsList, targetExams: processedExams, trendComment, coreQuestions };
            }, [exams, filters.semester, filters.examType, viewMode]);

            const comments = useMemo(() => generateAIComment(analysisData), [analysisData]);

            // 🌟 100% 통합 데이터 업로드 핸들러 🌟
            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                setIsGenerating(true);
                showToast("데이터를 분석 중입니다. PDF가 포함된 경우 약 10초 정도 소요됩니다...", "info");

                let addedExams = [];
                let addedStudents = [];
                let addedMediaCount = 0;
                let isMasterDBUpdated = false;
                let currentMasterDB = { ...masterDB };

                const pdfFile = files.find(f => f.name.toLowerCase().endsWith('.pdf'));
                const imageFiles = files.filter(f => f.type.startsWith('image/'));
                const otherFiles = files.filter(f => !f.type.startsWith('image/') && !f.name.toLowerCase().endsWith('.pdf'));

                try {
                    // 1. 일반 엑셀/CSV 파일 먼저 처리
                    for (const file of otherFiles) {
                        if (file.name.toLowerCase().endsWith('.csv') || file.name.toLowerCase().endsWith('.tsv') || file.name.toLowerCase().endsWith('.xlsx') || file.name.toLowerCase().endsWith('.xls')) {
                            await new Promise((resolve) => {
                                const reader = new FileReader();
                                reader.onload = (evt) => {
                                    try {
                                        const buffer = evt.target.result;
                                        let text = ""; 
                                        try { text = new TextDecoder('utf-8', {fatal:true}).decode(new Uint8Array(buffer)); } 
                                        catch(err) { text = new TextDecoder('euc-kr').decode(new Uint8Array(buffer)); }
                                        
                                        let aoa = [];
                                        if (file.name.toLowerCase().endsWith('.csv') || file.name.toLowerCase().endsWith('.tsv')) {
                                            text = text.replace(/\r/g, ''); 
                                            const sep = text.includes('\t') ? '\t' : ',';
                                            aoa = text.trim().split('\n').map(l => l.split(sep));
                                        } else {
                                            const tempWb = window.XLSX.read(new Uint8Array(buffer), { type: 'array' });
                                            aoa = window.XLSX.utils.sheet_to_json(tempWb.Sheets[tempWb.SheetNames[0]], { header: 1, defval: "" });
                                        }

                                        if (aoa.length > 0) {
                                            const firstRowStr = aoa[0].join('').replace(/\s+/g, '');
                                            // 🌟 마스터 DB (문항분류코드) 스캔 및 저장 🌟
                                            if (firstRowStr.includes('풀코드') || firstRowStr.includes('과목코드')) {
                                                for(let i = 1; i < aoa.length; i++) {
                                                    const cols = aoa[i];
                                                    if (cols.length > 10 && cols[0]) {
                                                        const code = String(cols[0]).trim();
                                                        let normCode = normalizeCode(code);
                                                        currentMasterDB[normCode] = {
                                                            major: cols[4] ? String(cols[4]).trim() : '',
                                                            minor: cols[6] ? String(cols[6]).trim() : '',
                                                            concept: cols[10] ? String(cols[10]).trim() : ''
                                                        };
                                                    }
                                                }
                                                isMasterDBUpdated = true;
                                                return resolve();
                                            }

                                            // 🌟 일반 학생/기출 엑셀 스캔 🌟
                                            let headerIdx = -1;
                                            let fileType = 'UNKNOWN';
                                            for (let i = 0; i < Math.min(aoa.length, 15); i++) {
                                                if (!aoa[i]) continue;
                                                const rowStr = aoa[i].join(',').replace(/\s+/g, ''); 
                                                if (rowStr.includes('대단원') || rowStr.includes('단원') || rowStr.includes('난이도') || rowStr.includes('배점') || rowStr.includes('출제내용') || rowStr.includes('출제시기')) { 
                                                    headerIdx = i; fileType = 'EXAM'; break; 
                                                }
                                                if (rowStr.includes('쓴답') || (rowStr.includes('문제') && (rowStr.includes('정답') || rowStr.includes('취득점수')))) { 
                                                    headerIdx = i; fileType = 'V_STUDENT'; break; 
                                                }
                                                if (rowStr.includes('이름') || rowStr.includes('성명') || rowStr.includes('학생')) { 
                                                    headerIdx = i; fileType = 'H_STUDENT'; break; 
                                                }
                                            }

                                            if (headerIdx > -1) {
                                                const headers = aoa[headerIdx].map(h => String(h).trim().replace(/\s+/g, ''));
                                                const cleanJson = aoa.slice(headerIdx + 1).filter(r => r.some(c => String(c).trim() !== '')).map(row => {
                                                    const obj = {};
                                                    headers.forEach((h, idx) => { obj[h] = row[idx]; });
                                                    return obj;
                                                });

                                                if (fileType === 'EXAM') {
                                                    const parsedExams = cleanJson.map(row => {
                                                        const getVal = (keywords, excludes = []) => {
                                                            const key = Object.keys(row).find(k => {
                                                                const cleanK = String(k).replace(/\s+/g, '');
                                                                const isMatch = keywords.some(kw => cleanK.includes(kw.replace(/\s+/g, '')));
                                                                const isExcluded = excludes.some(ex => cleanK.includes(ex.replace(/\s+/g, '')));
                                                                return isMatch && !isExcluded;
                                                            });
                                                            return key ? String(row[key]).trim() : '';
                                                        };
                                                        
                                                        const rawPeriod = getVal(['출제시기', '시기']); 
                                                        const rawGrade = getVal(['학년']); 
                                                        const parsedPeriod = parsePeriodString(rawPeriod, rawGrade, file.name);
                                                        const concept = getVal(['출제내용', '세부유형', '유형내용', '문항내용', '핵심개념']);
                                                        
                                                        let rawMajor = getVal(['대단원']);
                                                        if(!rawMajor) rawMajor = getVal(['단원명', '단원', '영역'], ['소단원', '중단원', '세부']);
                                                        
                                                        let minorUnit = getVal(['중단원']);
                                                        if(!minorUnit) minorUnit = getVal(['소단원', '세부']);

                                                        let schoolStr = getVal(['학교명', '학교']);
                                                        if (!schoolStr) {
                                                            const match = file.name.match(/[가-힣a-zA-Z0-9]+(?:중|고|여중|남중|여고|남고|중학교|고등학교)/);
                                                            if (match) schoolStr = match[0];
                                                        }
                                                        
                                                        return {
                                                            period: parsedPeriod,
                                                            rawPeriod: rawPeriod,
                                                            school: schoolStr,
                                                            qNum: parseInt(getVal(['문항번호', '번호', '문항', '순번', 'no', 'No'])) || 0,
                                                            type: getVal(['문항유형', '유형', '형태']),
                                                            difficulty: getVal(['난이도', '수준']),
                                                            majorUnit: rawMajor || '수학 종합',
                                                            minorUnit: minorUnit,
                                                            concept: concept,
                                                            score: parseFloat(getVal(['배점', '점수'])) || 0,
                                                            fileName: file.name.split('.')[0].trim() 
                                                        };
                                                    }).filter(e => e.qNum > 0);
                                                    addedExams.push(...parsedExams);
                                                } 
                                                else if (fileType === 'V_STUDENT') {
                                                    const fileName = file.name.replace(/\.[^/.]+$/, "").trim();
                                                    let studentName = "학생";
                                                    let finalPeriod = "";
                                                    if (fileName.includes('_')) {
                                                        studentName = fileName.split('_')[0].trim();
                                                        finalPeriod = parsePeriodString(fileName.substring(fileName.indexOf('_') + 1), '', file.name);
                                                    } else {
                                                        studentName = fileName;
                                                    }
                                                    const responses = {};
                                                    cleanJson.forEach(row => {
                                                        const getVal = (keywords) => {
                                                            const key = Object.keys(row).find(k => {
                                                                const cleanK = String(k).replace(/\s+/g, '');
                                                                return keywords.some(kw => cleanK.includes(kw.replace(/\s+/g, '')));
                                                            });
                                                            return key ? String(row[key]).trim() : '';
                                                        };
                                                        const qNumStr = getVal(['문제', '문항', '번호', '순번']).replace(/[^0-9]/g, '');
                                                        if (qNumStr) {
                                                            const qNum = parseInt(qNumStr);
                                                            const rawScore = getVal(['점수', '취득점수']);
                                                            const rawStudentFull = getVal(['배점']); 
                                                            const numericMatch = rawScore.replace(/[^0-9.]/g, ''); 
                                                            const numericFullMatch = rawStudentFull.replace(/[^0-9.]/g, ''); 
                                                            if (numericMatch !== '') {
                                                                const earned = parseFloat(numericMatch);
                                                                const sFull = parseFloat(numericFullMatch);
                                                                if (!isNaN(sFull) && sFull > 0) responses[qNum] = { earned, studentFull: sFull };
                                                                else responses[qNum] = earned;
                                                            } else {
                                                                responses[qNum] = (rawScore.toUpperCase() === 'O' || rawScore === '정답') ? 'O' : 'X';
                                                            }
                                                        }
