<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; color: #1e293b; }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const React = window.React;
        const ReactDOM = window.ReactDOM;
        const { useState, useMemo, useRef, useEffect } = React;

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyC82hnDtesWHC2Xm3P36V1kKQfl-1RIhtM",
            authDomain: "math-evaluation-system.firebaseapp.com",
            projectId: "math-evaluation-system",
            storageBucket: "math-evaluation-system.firebasestorage.app",
            messagingSenderId: "795313813853",
            appId: "1:795313813853:web:6a8e1224a0a4eb30b590b4"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = firebaseConfig.projectId;

        // --- 🌟 똑똑한 시험 기간 문자열 분석기 (괄호 및 기말고사 완벽 인식) ---
        const parsePeriodString = (rawStr, rawGradeStr = '', fileName = '') => {
            const parseLogic = (str, gradeStr) => {
                if (!str) return '';
                str = String(str).trim();
                
                // 패턴 1: 괄호 포함 (예: 공통수학1 성취도 평가(복소수~연립방정식))
                const parenMatch = str.match(/(.*?)\((.*?)\)/);
                if (parenMatch) {
                    let sem = parenMatch[1].replace(/성취도\s*평가/g, '').replace(/테스트/g, '').trim();
                    sem = sem.replace(/\s+/g, ''); 
                    let exam = parenMatch[2].trim(); 
                    exam = exam.replace(/고사$/, ''); 
                    if (sem && exam) return `${sem} ${exam}`;
                }
                
                // 패턴 2: 기존 중/고등 방식 (예: 3-1 기말)
                let gMatch = (String(gradeStr) || str).match(/\d/);
                let grade = gMatch ? gMatch[0] : '';
                let tMatch = str.match(/(\d)\s*학기/);
                let term = tMatch ? tMatch[1] : '';
                
                let semester = (grade && term) ? `${grade}-${term}` : str.replace(/중간|기말|고사/g, '').trim();
                if (!semester && str.includes('-')) {
                    let sMatch = str.match(/(\d)[^\d]*(\d)/); 
                    if (sMatch) semester = `${sMatch[1]}-${sMatch[2]}`;
                }
                semester = semester.replace(/\s+/g, '');
                let exam = str.includes('중간') ? '중간' : (str.includes('기말') ? '기말' : '');
                
                if (semester && exam) return `${semester} ${exam}`;
                if (semester) return semester;
                return str;
            };

            // 1순위: 파일명에서 괄호 구조 파악
            if (fileName) {
                const baseName = fileName.replace(/\.[^/.]+$/, "").trim();
                const parenMatch = baseName.match(/(.*?)\((.*?)\)/);
                if (parenMatch) {
                    const fileResult = parseLogic(baseName, '');
                    if (fileResult && fileResult.includes(' ')) return fileResult;
                }
            }
            
            // 2순위: 엑셀 내부 데이터 파싱
            let result = parseLogic(rawStr, rawGradeStr);
            
            // 3순위: 내부 데이터로 파싱 실패 시 파일명으로 재시도
            if ((!result || result.length < 2 || !result.includes(' ')) && fileName) {
                const baseName = fileName.replace(/\.[^/.]+$/, "").trim();
                const fbResult = parseLogic(baseName, '');
                if (fbResult && fbResult.includes(' ')) {
                    result = fbResult;
                }
            }
            
            return result;
        };

        // --- URL 초압축 / 해제 엔진 ---
        const encodeReportData = (analysisData, studentName) => {
            const dictMap = new Map();
            const dict = [];
            const getDictIdx = (str) => {
                const s = String(str || '');
                if (!dictMap.has(s)) {
                    dictMap.set(s, dict.length);
                    dict.push(s);
                }
                return dictMap.get(s);
            };

            const r = analysisData.results.map(res => [
                res.qNum, getDictIdx(res.majorUnit), getDictIdx(res.minorUnit),
                getDictIdx(res.type), getDictIdx(res.difficulty), res.isCorrect ? 1 : 0, res.score || 0
            ]);

            const payload = { 
                p: analysisData.targetPeriod, 
                n: studentName, 
                d: dict, 
                r: r,
                s: analysisData.schoolName || '' 
            };

            try {
                const jsonStr = JSON.stringify(payload);
                return window.LZString.compressToEncodedURIComponent(jsonStr);
            } catch(e) {
                console.error("인코딩 에러", e);
                return null;
            }
        };

        const decodeReportData = (encodedStr) => {
            try {
                let jsonStr = window.LZString.decompressFromEncodedURIComponent(encodedStr);
                let payload;
                
                if (jsonStr) {
                    payload = JSON.parse(jsonStr);
                } else {
                    const safeStr = encodedStr.replace(/ /g, '+');
                    try { jsonStr = decodeURIComponent(escape(window.atob(safeStr))); }
                    catch(e) { jsonStr = decodeURIComponent(window.atob(safeStr)); }
                    payload = JSON.parse(jsonStr);
                }
                
                if (payload.period) return payload; // 구버전 호환

                const dict = payload.d;
                const results = payload.r.map(item => ({
                    qNum: item[0], majorUnit: dict[item[1]], minorUnit: dict[item[2]],
                    type: dict[item[3]], difficulty: dict[item[4]], isCorrect: item[5] === 1, score: item[6]
                }));

                let totalScoreCalc = 0;
                let maxScore = 0;
                const unitStats = {};
                const diffStats = { '상': {total:0, correct:0}, '중': {total:0, correct:0}, '하': {total:0, correct:0} };
                const typeStats = {};

                results.forEach(r => {
                    totalScoreCalc += r.isCorrect ? r.score : 0;
                    maxScore += r.score;
                    if(!unitStats[r.majorUnit]) unitStats[r.majorUnit] = { total: 0, correct: 0 };
                    unitStats[r.majorUnit].total++; if(r.isCorrect) unitStats[r.majorUnit].correct++;

                    let d = String(r.difficulty || '중');
                    if (d.includes('상') || d.includes('어려움') || d.includes('7') || d.includes('8')) d = '상';
                    else if (d.includes('하') || d.includes('쉬움') || d.includes('1') || d.includes('2')) d = '하';
                    else d = '중';
                    
                    if(!diffStats[d]) diffStats[d] = {total:0, correct:0};
                    diffStats[d].total++; if(r.isCorrect) diffStats[d].correct++;

                    let t = String(r.type || '기타');
                    if (t.includes('객관')) t = '객관식'; else if (t.includes('주관') || t.includes('서술')) t = '주관식/서술형'; else t = '기타';
                    if(!typeStats[t]) typeStats[t] = { total: 0, correct: 0 };
                    typeStats[t].total++; if(r.isCorrect) typeStats[t].correct++;
                });

                const totalScore = maxScore > 0 ? Math.round(totalScoreCalc * 10) / 10 : Math.round((results.filter(r => r.isCorrect).length / results.length) * 100);
                const diffOrder = ['하', '중', '상', '최상'];
                const unitData = Object.entries(unitStats).map(([name, stats]) => ({ name, ...stats }));
                const diffData = Object.entries(diffStats).map(([name, stats]) => ({ name, ...stats })).filter(d=>d.total>0).sort((a,b) => diffOrder.indexOf(b.name) - diffOrder.indexOf(a.name));

                const analysisDataProxy = { unitData, totalScore, results, targetPeriod: payload.p, typeStats };
                const comments = generateAIComment(analysisDataProxy);

                return {
                    period: payload.p, name: payload.n, score: totalScore, schoolName: payload.s || '',
                    results: results.map(r => ({q: r.qNum, m: r.majorUnit, i: r.minorUnit, t: r.type, d: r.difficulty, c: r.isCorrect, s: r.score})),
                    units: unitData, diffs: diffData, types: typeStats, comments: comments
                };
            } catch(e) {
                console.error("데이터 디코딩 실패:", e);
                return null;
            }
        };

        // --- 🌟 KICE 전문 학습 가이드 생성 로직 ---
        const generateAIComment = (analysisData) => {
            if (!analysisData) return {};
            const { unitData, totalScore, results } = analysisData;
            
            const maxScore = results.reduce((acc, r) => acc + (r.score || r.s || 0), 0);
            const percentage = maxScore > 0 ? (totalScore / maxScore) * 100 : (results.filter(r => r.isCorrect).length / results.length) * 100;
            
            const unitsWithPct = unitData.map(u => ({
                name: u.name,
                pct: (u.correct / u.total) * 100
            })).sort((a, b) => b.pct - a.pct);

            let strongText = "-";
            let weakText = "-";
            let primaryWeakUnit = "-";

            if (unitsWithPct.length > 0) {
                const bestScore = unitsWithPct[0].pct;
                const strongUnits = unitsWithPct.filter(u => u.pct === bestScore || u.pct >= 90).slice(0, 2);
                strongText = strongUnits.map(u => u.name).join(', ');

                // 70% 이하 보완 기준 엄격 적용
                const weakCandidates = unitsWithPct.filter(u => u.pct <= 70).sort((a, b) => a.pct - b.pct);
                if (weakCandidates.length > 0) {
                    weakText = weakCandidates.slice(0, 2).map(u => u.name).join(', ');
                    primaryWeakUnit = weakCandidates[0].name;
                } else {
                    const nextWeak = unitsWithPct.filter(u => u.pct < 100).sort((a, b) => a.pct - b.pct);
                    if (nextWeak.length > 0) {
                        weakText = "전반적으로 양호함";
                        primaryWeakUnit = nextWeak[0].name;
                    } else {
                        weakText = "취약 단원 없음 (완벽함!)";
                        primaryWeakUnit = unitsWithPct[unitsWithPct.length - 1]?.name || "-";
                    }
                }
            }

            // KICE 가이드라인 DB
            const kiceGuidelines = {
                "유리수와 순환소수": "순환소수를 분수로 고치는 기계적 계산보다는 유리수와 순환소수의 관계를 깊이 있게 이해하는 데 중점을 두어야 합니다.",
                "식의 계산": "지수법칙을 이해하고, 다항식의 사칙계산을 정확히 수행하는 능력이 필요합니다. 지나치게 복잡한 식보다는 기본 법칙의 정확한 적용을 연습하세요.",
                "일차부등식": "부등식의 성질을 이해하고, 해를 수직선 위에 나타내는 시각적 접근이 필요합니다. 실생활 상황을 부등식으로 표현하는 연습을 권장합니다.",
                "연립일차방정식": "미지수를 소거하는 원리를 파악하고, 대입법과 가감법 중 상황에 맞는 적절한 방법을 선택하여 식을 전개하는 능력이 요구됩니다.",
                "일차함수와 그래프": "함수의 개념을 바탕으로 x절편, y절편, 기울기의 의미를 기하학적으로 파악하고 그래프를 능숙하게 그릴 수 있어야 합니다.",
                "삼각형의 성질": "이등변삼각형과 직각삼각형, 내심과 외심의 성질을 단순 암기하지 말고, 논리적으로 정당화(증명)해보는 과정이 매우 중요합니다.",
                "사각형의 성질": "여러 가지 사각형 사이의 포함 관계를 명확히 이해하고, 평행사변형이 되는 조건을 찾아내는 논리적 추론 능력이 필요합니다.",
                "도형의 닮음": "닮음의 뜻과 성질을 이해하고, 삼각형의 닮음 조건을 활용하여 평면도형과 입체도형의 성질을 유추해 내는 공간 지각력이 요구됩니다.",
                "피타고라스 정리": "피타고라스 정리가 성립함을 다양한 방법으로 직접 설명해보고, 이를 평면도형의 길이나 넓이를 구하는 데 활용하는 훈련이 필요합니다.",
                "경우의 수": "일상생활의 다양한 상황에서 일어날 수 있는 경우의 수를 빠짐없이, 중복되지 않게 논리적으로 구하는 사고방식이 필요합니다.",
                "확률": "확률의 기본 성질을 이해하고, 상대도수로서의 확률의 의미를 바탕으로 실생활의 불확실한 상황을 수학적으로 해석하는 능력이 요구됩니다.",
                "제곱근과 실수": "무리수의 개념을 직관적으로 이해하고, 수직선 위에 무리수를 나타내어 실수 체계의 구조를 파악하는 것이 핵심입니다.",
                "다항식의 곱셈과 인수분해": "전개와 인수분해가 역관계임을 이해해야 합니다. 곱셈 공식을 기계적으로 외우기보다 도형의 넓이 등을 이용해 직접 유도해 보는 과정이 필요합니다.",
                "이차방정식의 풀이": "인수분해나 완전제곱식을 이용해 해를 구하는 원리를 정확히 이해해야 합니다. 평가원 지침에 따르면 근의 공식 유도 과정을 직접 써보는 것이 중요합니다.",
                "이차방정식의 활용": "주어진 실생활 문제를 이차방정식으로 모델링하고, 구한 해가 문제 상황(길이, 시간 등 양수 조건)에 맞는지 확인하는 습관을 들여보세요.",
                "이차함수의 그래프": "이차함수 식을 일반형에서 표준형으로 능숙하게 변형하여 꼭짓점과 축의 방정식을 찾고, 그래프의 평행이동과 대칭이동을 시각적으로 연결해야 합니다.",
                "이차함수의 일반형": "일반형을 표준형으로 고치는 대수적 조작 능력이 요구됩니다. 그래프의 평행이동과 대칭이동을 통해 식의 형태가 어떻게 변하는지 비교해 보세요.",
                "이차함수의 최댓값과 최솟값": "제한된 범위에서 이차함수 그래프의 개형을 그리고, 축의 위치에 따른 최댓값과 최솟값을 찾아내는 해석 능력이 필요합니다.",
                "삼각비": "직각삼각형의 닮음을 이용하여 삼각비의 개념을 이해하고, 특수한 각(30, 45, 60도)의 삼각비 값을 기하학적으로 유도해보는 과정이 필수적입니다.",
                "원의 성질": "현, 접선, 원주각의 성질을 관찰을 통해 발견하고, 이를 논리적으로 정당화하며 복잡하지 않은 도형 문제에 적용하는 연습이 요구됩니다.",
                "대푯값과 산포도": "평균, 중앙값, 최빈값 등 대푯값의 특징을 구분하고, 자료의 분포 상태를 분산과 표준편차로 정확히 해석하는 통계적 사고력이 중요합니다.",
                "접선의 방정식": "미분계수의 기하학적 의미(접선의 기울기)를 명확히 이해하고, 곡선 위의 점과 밖의 점 등 다양한 조건에서 접선의 방정식을 구하는 논리적 과정을 세밀하게 점검해야 합니다.",
                "함수의 극한": "직관적인 그래프 해석을 통해 극한의 개념을 이해하고, 극한에 대한 기본 성질을 이용하여 함수의 극한값을 구하는 능력이 필요합니다."
            };

            // 유사도 기반 매칭
            let matchedGuideline = "";
            const cleanWeakUnit = primaryWeakUnit.replace(/\s+/g, '');
            for (const key in kiceGuidelines) {
                const cleanKey = key.replace(/\s+/g, '');
                if (cleanWeakUnit.includes(cleanKey) || cleanKey.includes(cleanWeakUnit)) {
                    matchedGuideline = kiceGuidelines[key];
                    break;
                }
            }

            if (!matchedGuideline) {
                matchedGuideline = primaryWeakUnit !== "-" ? `해당 단원([${primaryWeakUnit}])의 교과서 예제와 기본 개념을 다시 한번 꼼꼼히 점검해 주세요.` : "전반적인 수학 기본 개념을 탄탄히 다지는 것이 중요합니다.";
            }

            let method = "";

            if (percentage >= 100) {
                method = `모든 단원의 개념을 완벽하게 이해하고 있습니다! 🎉 현재의 훌륭한 학습 패턴을 유지하며, 심화 문제나 선행 학습을 가볍게 시작해 보는 것을 적극 추천합니다.`;
                weakText = "취약 단원 없음 (완벽함!)";
            }
            else if (percentage >= 90) {
                if (weakText === "취약 단원 없음 (완벽함!)" || weakText === "전반적으로 양호함") {
                    method = `전체적인 개념 이해도가 매우 우수합니다. 간혹 실수하는 문제나 고난도 심화 문제를 집중적으로 풀어보며 100점을 향한 훈련을 진행하세요.`;
                    weakText = "전반적으로 우수함";
                } else {
                    method = `전체적인 개념 이해도가 매우 우수합니다. 간혹 실수하는 문제나 고난도 심화 문제를 집중적으로 풀어보며 100점을 향한 훈련을 진행하세요.\n\n📌 [KICE 평가원 기준 학습 조언]\n${matchedGuideline}`;
                }
            }
            else if (percentage >= 70) {
                if (weakText === "취약 단원 없음 (완벽함!)" || weakText === "전반적으로 양호함") {
                    method = `기본적인 개념은 잘 잡혀 있습니다. 틀린 문제들의 오답 노트를 작성하고 기본 예제를 다시 한 번 풀어보며 실수를 줄여보세요.`;
                    weakText = "전반적으로 양호함";
                } else {
                    method = `기본적인 개념은 잘 잡혀 있으나 특정 단원([${weakText}])에서 오답이 발생하고 있습니다.\n\n📌 [KICE 평가원 기준 학습 조언]\n${matchedGuideline}\n\n위 지침을 바탕으로 오답 노트를 작성하며 빈틈을 메워주세요.`;
                }
            }
            else {
                method = `전반적인 기초 개념 다지기가 우선되어야 합니다. 어려운 문제보다는 교과서 위주의 기본 문제를 반복해서 풀며 원리를 정확히 이해하는 학습이 필요합니다.\n\n📌 [최우선 보완 단원 조언]\n${matchedGuideline}`;
            }

            return { strong: strongText, weak: weakText, method };
        };

        // --- 공통 아이콘 및 차트 컴포넌트 ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = ''; 
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    i.style.width = `${size}px`; i.style.height = `${size}px`;
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons();
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const DonutChart = ({ data, title }) => {
            const total = data.reduce((sum, d) => sum + d.value, 0);
            let cumulative = 0;
            if (total === 0) return null;

            return (
                <div className="flex flex-col items-center bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex-1 min-w-[140px] max-w-[200px]">
                    <h4 className="text-[13px] font-black text-slate-700 mb-3 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200 w-full text-center truncate">{title}</h4>
                    <div className="relative flex items-center justify-center w-full">
                        <svg viewBox="-1.2 -1.2 2.4 2.4" className="w-full h-full transform -rotate-90 drop-shadow-sm max-w-[90px] max-h-[90px]">
                            {data.map((slice, i) => {
                                const pct = slice.value / total;
                                if (pct === 0) return null;
                                const startX = Math.cos(2 * Math.PI * cumulative);
                                const startY = Math.sin(2 * Math.PI * cumulative);
                                cumulative += pct;
                                const endX = Math.cos(2 * Math.PI * cumulative);
                                const endY = Math.sin(2 * Math.PI * cumulative);
                                const largeArc = pct > 0.5 ? 1 : 0;
                                const path = pct === 1 
                                    ? `M 1 0 A 1 1 0 1 1 -1 0 A 1 1 0 1 1 1 0` 
                                    : `M ${startX} ${startY} A 1 1 0 ${largeArc} 1 ${endX} ${endY} L 0 0`;
                                return <path key={i} d={path} fill={slice.color} stroke="#fff" strokeWidth="0.1" strokeLinejoin="round" />;
                            })}
                            <circle cx="0" cy="0" r="0.65" fill="#fff" />
                            <text x="0" y="0.05" textAnchor="middle" dominantBaseline="middle" className="text-[0.45px] font-black fill-indigo-600" style={{transform: 'rotate(90deg)'}}>{Math.round((data[0]?.value/total)*100 || 0)}%</text>
                        </svg>
                    </div>
                    <div className="flex flex-col gap-1.5 mt-4 w-full px-1">
                        {data.map((d, i) => (
                            <div key={i} className="flex items-center justify-between text-xs w-full">
                                <div className="flex items-center gap-1.5 shrink-0">
                                    <span className="w-2.5 h-2.5 rounded-full shadow-sm" style={{ backgroundColor: d.color }}></span>
                                    <span className="font-bold text-slate-600">{d.name}</span>
                                </div>
                                <span className="text-slate-500 font-bold shrink-0">{d.value}개</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const HorizontalBarChart = ({ data, color }) => {
            return (
                <div className="flex flex-col gap-4 w-full">
                    {data.map((item, i) => {
                        const pct = item.total === 0 ? 0 : Math.round((item.correct / item.total) * 100);
                        return (
                            <div key={i} className="flex flex-col gap-1.5 w-full">
                                <div className="flex justify-between items-end w-full">
                                    <span className="text-[14px] font-bold text-slate-700 leading-tight flex-1 pr-2 whitespace-normal break-keep">{item.name}</span>
                                    <span className="text-xs text-slate-400 font-bold shrink-0">{item.correct}/{item.total}</span>
                                </div>
                                <div className="w-full h-4 bg-slate-100 rounded-full overflow-hidden flex relative shadow-inner">
                                    <div className="h-full rounded-full flex items-center justify-end px-2" style={{ width: `${pct}%`, backgroundColor: color || '#4f46e5', transition: 'width 1s' }}>
                                        {pct > 15 && <span className="text-[10px] text-white font-bold">{pct}%</span>}
                                    </div>
                                    {pct <= 15 && <span className="absolute left-2 top-1/2 transform -translate-y-1/2 text-[10px] text-slate-500 font-bold">{pct}%</span>}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const DetailRowItem = ({ r }) => {
            const qNum = r.q !== undefined ? r.q : r.qNum;
            const major = r.m !== undefined ? r.m : r.majorUnit;
            const minor = r.i !== undefined ? r.i : r.minorUnit;
            const type = r.t !== undefined ? r.t : r.type;
            const diff = r.d !== undefined ? r.d : r.difficulty;
            const score = r.s !== undefined ? r.s : r.score;
            const isCorrect = r.c !== undefined ? r.c : r.isCorrect;

            return (
                <div className="flex items-start justify-between p-3.5 bg-white rounded-xl border border-slate-200 shadow-sm h-auto break-inside-avoid">
                    <div className="flex items-start gap-3 w-full">
                        <div className="mt-0.5 w-8 h-8 rounded-full bg-slate-100 text-slate-700 font-black flex items-center justify-center shrink-0 text-sm shadow-sm border border-slate-200">
                            {qNum || '-'}
                        </div>
                        <div className="flex flex-col flex-1 min-w-0 pr-2">
                            <span className="text-[14px] font-bold text-slate-800 mb-1.5 leading-snug break-words whitespace-normal">
                                {major || '-'} <span className="text-slate-400 font-normal text-[12px] inline-block">| {minor || '-'}</span>
                            </span>
                            <div className="flex flex-wrap gap-1.5 text-[10px]">
                                <span className="bg-slate-50 text-slate-500 px-1.5 py-0.5 rounded border border-slate-200 font-bold whitespace-nowrap">{type || '-'}</span>
                                <span className={`px-1.5 py-0.5 rounded font-bold border whitespace-nowrap ${diff==='상'?'text-rose-600 bg-rose-50 border-rose-100':(diff==='하'?'text-emerald-600 bg-emerald-50 border-emerald-100':'text-amber-600 bg-amber-50 border-amber-100')}`}>{diff || '-'}</span>
                                {score > 0 && <span className="text-indigo-500 font-bold px-1.5 py-0.5 whitespace-nowrap">{score}점</span>}
                            </div>
                        </div>
                        <div className="shrink-0 flex items-center justify-center ml-1 mt-0.5">
                            {isCorrect ? 
                                <div className="w-9 h-9 rounded-full border-2 border-emerald-500 text-emerald-500 flex items-center justify-center font-black text-[15px] bg-emerald-50">O</div> : 
                                <div className="w-9 h-9 rounded-full border-2 border-rose-500 text-rose-500 flex items-center justify-center font-black text-[15px] bg-rose-50">X</div>
                            }
                        </div>
                    </div>
                </div>
            );
        };

        // --- 모바일 전용 학생 뷰 컴포넌트 ---
        const StudentReportMobileView = ({ data }) => {
            if (!data) return <div className="p-8 text-center h-screen flex items-center justify-center font-bold text-slate-500">데이터를 불러올 수 없습니다.</div>;

            return (
                <div className="min-h-screen bg-slate-100 md:py-8 font-sans">
                    <div className="max-w-md mx-auto bg-white md:rounded-3xl shadow-2xl overflow-hidden min-h-screen md:min-h-0 pb-12">
                        <div className="bg-indigo-600 p-6 pt-10 text-white text-center relative overflow-hidden">
                            <div className="absolute opacity-10 -right-6 -top-6"><Icon name="award" size={150} /></div>
                            <p className="text-indigo-200 font-bold text-xs tracking-widest mb-1 relative z-10 uppercase">Math Report</p>
                            <div className="flex flex-col items-center justify-center relative z-10 mb-6 gap-1">
                                <h1 className="text-2xl font-black text-center">{data.period} 수학 성취도</h1>
                                {data.schoolName && (
                                    <span className="text-sm font-bold text-indigo-200 bg-indigo-800/50 px-3 py-0.5 rounded-full">{data.schoolName}</span>
                                )}
                            </div>
                            
                            <div className="bg-white/10 p-5 rounded-2xl backdrop-blur-sm relative z-10 flex flex-col items-center border border-white/20 shadow-lg">
                                <span className="text-sm font-bold text-indigo-100 mb-1">{data.name} 학생 종합 점수</span>
                                <div className="flex items-baseline gap-1">
                                    <span className="text-6xl font-black tracking-tighter">{data.score}</span>
                                    <span className="text-xl font-bold">점</span>
                                </div>
                            </div>
                        </div>

                        <div className="p-5 space-y-8 mt-2">
                            <div className="bg-slate-50 border border-slate-100 rounded-2xl p-5 shadow-sm">
                                <h3 className="font-black text-slate-800 mb-4 flex items-center gap-2 text-sm"><Icon name="sparkles" size={18} className="text-amber-500"/> 학습 종합 분석</h3>
                                <div className="flex gap-3 mb-4">
                                    <div className="flex-1 bg-white p-3 rounded-xl border border-emerald-100 flex items-start gap-3 shadow-sm">
                                        <div className="bg-emerald-100 p-2 rounded-lg text-emerald-600 shrink-0"><Icon name="trending-up" size={18}/></div>
                                        <div className="min-w-0 flex-1">
                                            <p className="text-[10px] text-slate-400 font-bold mb-1">강한 단원</p>
                                            <p className="text-[13px] font-black text-slate-800 whitespace-normal break-keep leading-snug">{data.comments.strong}</p>
                                        </div>
                                    </div>
                                    <div className="flex-1 bg-white p-3 rounded-xl border border-rose-100 flex items-start gap-3 shadow-sm">
                                        <div className="bg-rose-100 p-2 rounded-lg text-rose-600 shrink-0"><Icon name="trending-down" size={18}/></div>
                                        <div className="min-w-0 flex-1">
                                            <p className="text-[10px] text-slate-400 font-bold mb-1">
                                                {data.comments.weak.includes('완벽함') || data.comments.weak.includes('우수함') || data.comments.weak.includes('양호함') ? '특이사항' : '보완 단원'}
                                            </p>
                                            <p className={`text-[13px] font-black whitespace-normal break-keep leading-snug ${data.comments.weak.includes('완벽함') || data.comments.weak.includes('우수함') || data.comments.weak.includes('양호함') ? 'text-emerald-600' : 'text-rose-600'}`}>
                                                {data.comments.weak}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                                <p className="text-[13px] text-slate-600 leading-relaxed font-medium bg-white p-4 rounded-xl border border-slate-100 shadow-sm whitespace-pre-wrap">
                                    <span className="font-bold text-indigo-600 block mb-1">💡 전문 학습 가이드</span><br/>{data.comments.method}
                                </p>
                            </div>

                            <div>
                                <h3 className="font-black text-slate-800 mb-4 border-b-2 border-slate-100 pb-2 flex items-center gap-2 text-[15px]"><Icon name="bar-chart-2" size={18} className="text-indigo-500"/> 단원별 성취도</h3>
                                <HorizontalBarChart data={data.units || data.unitData} color="#4f46e5" />
                            </div>

                            <div>
                                <h3 className="font-black text-slate-800 mb-4 border-b-2 border-slate-100 pb-2 flex items-center gap-2 text-[15px]"><Icon name="layers" size={18} className="text-emerald-500"/> 난이도별 성취도</h3>
                                <HorizontalBarChart data={data.diffs || data.diffData} color="#10b981" />
                            </div>

                            {data.types && Object.keys(data.types).length > 0 && (
                                <div>
                                    <h3 className="font-black text-slate-800 mb-4 border-b-2 border-slate-100 pb-2 flex items-center gap-2 text-[15px]"><Icon name="pie-chart" size={18} className="text-amber-500"/> 문제유형별 정답률</h3>
                                    <div className="flex flex-wrap gap-4 justify-center w-full">
                                        {Object.entries(data.types).map(([type, stats]) => (
                                            <DonutChart key={type} data={[{name: '정답', value: stats.correct, color: '#4f46e5'}, {name: '오답', value: stats.total-stats.correct, color: '#e2e8f0'}]} title={type} />
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div>
                                <h3 className="font-black text-slate-800 mb-4 border-b-2 border-slate-100 pb-2 flex items-center gap-2 text-[15px]"><Icon name="check-square" size={18} className="text-indigo-600"/> 상세 정오표</h3>
                                <div className="grid grid-cols-1 gap-y-3 flex-1 items-start content-start">
                                    {data.results.map((r, idx) => (
                                        <DetailRowItem key={idx} r={r} />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 메인 App 컴포넌트 ---
        function App() {
            const urlParams = new URLSearchParams(window.location.search);
            const reportParam = urlParams.get('report');
            
            // UI를 대체하는 Custom Modal/Toast State
            const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
            const [confirmModal, setConfirmModal] = useState({ show: false, message: '', onConfirm: null });
            const [linkModal, setLinkModal] = useState({ show: false, url: '' });
            
            const [isStudentView, setIsStudentView] = useState(false);
            const [studentReportData, setStudentReportData] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);

            // 기본 데이터를 localStorage 캐시로 초기화
            const [exams, setExams] = useState(() => JSON.parse(localStorage.getItem('math_exams_cache') || '[]'));
            const [students, setStudents] = useState(() => JSON.parse(localStorage.getItem('math_students_cache') || '[]'));
            
            const [filters, setFilters] = useState({
                semester: '', 
                examType: '', 
                studentName: ''
            });

            const [showDataModal, setShowDataModal] = useState(false);

            // 알림 헬퍼 함수
            const showToast = (message, type = 'info') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 3500);
            };

            const requestConfirm = (message, onConfirm) => {
                setConfirmModal({ show: true, message, onConfirm });
            };

            // Firebase 익명 인증 및 실시간 동기화
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        await auth.signInAnonymously().catch(err => {
                            console.warn("Firebase 익명 로그인 실패. 콘솔 설정을 확인하세요:", err);
                        });
                        
                        auth.onAuthStateChanged((u) => {
                            if (u) {
                                const examsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams');
                                const studentsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students');

                                examsRef.onSnapshot(snap => {
                                    const data = snap.docs.map(d => d.data());
                                    setExams(data);
                                    localStorage.setItem('math_exams_cache', JSON.stringify(data));
                                });
                                
                                studentsRef.onSnapshot(snap => {
                                    const data = snap.docs.map(d => d.data());
                                    setStudents(data);
                                    localStorage.setItem('math_students_cache', JSON.stringify(data));
                                });
                            }
                        });
                    } catch(e) { console.error("Firebase 초기화 에러:", e); }
                };
                initFirebase();
            }, []);

            // 링크 복사 뷰 확인
            useEffect(() => {
                if (reportParam) {
                    const decoded = decodeReportData(reportParam);
                    if (decoded) {
                        setStudentReportData(decoded);
                        setIsStudentView(true);
                    } else {
                        showToast('유효하지 않은 링크이거나 손상된 데이터입니다.', 'error');
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }
            }, [reportParam]);

            // 드롭다운 옵션 자동 계산
            const optionsData = useMemo(() => {
                const allPeriods = [...new Set(exams.map(e => e.period))]; 
                const semesters = [...new Set(allPeriods.map(p => {
                    const idx = p.indexOf(' ');
                    return idx > -1 ? p.substring(0, idx) : p;
                }))].filter(Boolean).sort();
                
                const examTypes = [...new Set(allPeriods
                    .filter(p => filters.semester ? p.startsWith(filters.semester + ' ') : true)
                    .map(p => {
                        const idx = p.indexOf(' ');
                        return idx > -1 ? p.substring(idx + 1) : '';
                    })
                )].filter(Boolean);
                
                const targetPeriod = `${filters.semester} ${filters.examType}`.trim();
                const availableStudents = [...new Set(students.filter(s => s.period === targetPeriod).map(s => s.name))].sort();

                return { semesters, examTypes, students: availableStudents };
            }, [exams, students, filters.semester, filters.examType]);

            useEffect(() => {
                if (!filters.semester && optionsData.semesters.length > 0) setFilters(prev => ({ ...prev, semester: optionsData.semesters[0] }));
            }, [optionsData.semesters]);

            useEffect(() => {
                if (optionsData.examTypes.length > 0 && (!filters.examType || !optionsData.examTypes.includes(filters.examType))) {
                    setFilters(prev => ({ ...prev, examType: optionsData.examTypes[0], studentName: '' }));
                }
            }, [optionsData.examTypes, filters.examType]);

            // 선택된 학생의 분석 데이터 
            const analysisData = useMemo(() => {
                if (!filters.semester || !filters.examType || !filters.studentName) return null;
                const targetPeriod = `${filters.semester} ${filters.examType}`;
                
                const targetExams = exams.filter(e => e.period === targetPeriod).sort((a,b) => a.qNum - b.qNum);
                const targetStudent = students.find(s => s.name === filters.studentName && s.period === targetPeriod);
                
                if (targetExams.length === 0 || !targetStudent) return null;

                let totalScoreCalc = 0;
                const results = targetExams.map(ex => {
                    const studentAns = targetStudent.responses[ex.qNum];
                    const isCorrect = String(studentAns).trim().toUpperCase() === 'O' || String(studentAns).trim() === '정답';
                    if (isCorrect) {
                        totalScoreCalc += (ex.score || 0);
                    }
                    return { ...ex, isCorrect, studentAns };
                });

                const maxPossibleScore = targetExams.reduce((sum, ex) => sum + (ex.score || 0), 0);
                const totalScore = maxPossibleScore > 0 
                    ? Math.round(totalScoreCalc * 10) / 10 
                    : Math.round((results.filter(r => r.isCorrect).length / results.length) * 100);

                const unitStats = {};
                results.forEach(r => {
                    if(!unitStats[r.majorUnit]) unitStats[r.majorUnit] = { total: 0, correct: 0 };
                    unitStats[r.majorUnit].total++;
                    if(r.isCorrect) unitStats[r.majorUnit].correct++;
                });
                const unitData = Object.entries(unitStats).map(([name, stats]) => ({ name, ...stats }));

                const diffOrder = ['하', '중', '상', '최상'];
                const diffStats = { '상': {total:0, correct:0}, '중': {total:0, correct:0}, '하': {total:0, correct:0} };
                results.forEach(r => {
                    let d = String(r.difficulty || '중');
                    if (d.includes('상') || d.includes('어려움') || d.includes('어려운') || d.includes('7') || d.includes('8')) d = '상';
                    else if (d.includes('하') || d.includes('쉬움') || d.includes('쉬운') || d.includes('1') || d.includes('2')) d = '하';
                    else d = '중';
                    
                    if(!diffStats[d]) diffStats[d] = {total:0, correct:0};
                    diffStats[d].total++;
                    if(r.isCorrect) diffStats[d].correct++;
                });
                const diffData = Object.entries(diffStats).map(([name, stats]) => ({ name, ...stats })).filter(d=>d.total>0).sort((a,b) => diffOrder.indexOf(b.name) - diffOrder.indexOf(a.name));

                const typeStats = {};
                results.forEach(r => {
                    let t = String(r.type || '기타');
                    if (t.includes('객관')) t = '객관식';
                    else if (t.includes('주관') || t.includes('서술')) t = '주관식/서술형';
                    else t = '기타';

                    if(!typeStats[t]) typeStats[t] = { total: 0, correct: 0 };
                    typeStats[t].total++;
                    if(r.isCorrect) typeStats[t].correct++;
                });

                // 학교명 추출 및 연도 결합 로직
                let schoolName = targetExams[0]?.school || '';
                const rawPeriod = targetExams[0]?.rawPeriod || ''; // 파싱할 때 보존해둔 원본 출제시기 문자열
                if (schoolName) {
                    const yearMatch = String(rawPeriod).match(/20\d{2}/);
                    if (yearMatch && !schoolName.includes('년')) {
                        schoolName = `${yearMatch[0]}년 ${schoolName}`;
                    }
                }

                return { targetPeriod, results, totalScore, unitData, diffData, typeStats, schoolName };
            }, [exams, students, filters]);

            const comments = useMemo(() => generateAIComment(analysisData), [analysisData]);

            // 파일 업로드 - 즉시 화면 반영 및 온라인 동시 전송
            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                let addedExams = 0;
                let addedStudents = 0;

                const readFile = (file) => new Promise((resolve) => {
                    const processWorkbook = (workbook) => {
                        try {
                            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                            if (json.length === 0) return resolve();

                            const keys = Object.keys(json[0]).map(k => String(k).trim()).join(',');
                            
                            if (keys.includes('단원') || keys.includes('난이도') || keys.includes('출제시기')) {
                                const parsedExams = json.map(row => {
                                    const getVal = (keywords) => {
                                        const key = Object.keys(row).find(k => keywords.some(kw => String(k).includes(kw)));
                                        return key ? String(row[key]).trim() : '';
                                    };
                                    
                                    const rawPeriod = getVal(['출제시기', '시기']); 
                                    const rawGrade = getVal(['학년']); 
                                    const parsedPeriod = parsePeriodString(rawPeriod, rawGrade, file.name);
                                    
                                    return {
                                        period: parsedPeriod,
                                        rawPeriod: rawPeriod, // 연도 추출을 위해 원본 유지
                                        school: getVal(['학교명', '학교']),
                                        qNum: parseInt(getVal(['문항번호', '번호', '문항'])) || 0,
                                        type: getVal(['문항유형', '유형', '형태']),
                                        difficulty: getVal(['난이도', '수준']),
                                        majorUnit: getVal(['대단원']),
                                        minorUnit: getVal(['소단원']),
                                        score: parseFloat(getVal(['배점', '점수'])) || 0
                                    };
                                }).filter(e => e.qNum > 0);
                                
                                // 화면에 즉시 업데이트
                                setExams(prev => [...prev.filter(p => !parsedExams.some(n => n.period === p.period)), ...parsedExams]);
                                addedExams += parsedExams.length;

                                // 파이어베이스 백그라운드 전송
                                parsedExams.forEach(ex => {
                                    db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams').doc(`${ex.period}_${ex.qNum}`).set(ex).catch(e => console.warn(e));
                                });
                            } 
                            else if (keys.includes('문제') && (keys.includes('정답') || keys.includes('점수'))) {
                                // 세로형 학생 데이터 파싱 (강동원_중2-1.csv 같은 형태)
                                setExams(prevExams => {
                                    const fallbackPeriod = prevExams.length > 0 ? prevExams[0].period : '';
                                    let studentName = "학생";
                                    let finalPeriod = fallbackPeriod;

                                    const fileName = file.name.replace(/\.[^/.]+$/, "").trim();
                                    if (fileName.includes('_')) {
                                        studentName = fileName.split('_')[0].trim();
                                        const restStr = fileName.substring(fileName.indexOf('_') + 1);
                                        finalPeriod = parsePeriodString(restStr, '', file.name) || fallbackPeriod;
                                    } else {
                                        studentName = fileName;
                                    }

                                    if (!finalPeriod || finalPeriod === '-' || finalPeriod.split(' ').length < 2) {
                                        finalPeriod = fallbackPeriod;
                                    }

                                    const responses = {};
                                    json.forEach(row => {
                                        const getVal = (keywords) => {
                                            const key = Object.keys(row).find(k => keywords.some(kw => String(k).includes(kw)));
                                            return key ? String(row[key]).trim() : '';
                                        };
                                        const qNumStr = getVal(['문제', '문항']).replace(/[^0-9]/g, '');
                                        if (qNumStr) {
                                            const qNum = parseInt(qNumStr);
                                            const score = parseFloat(getVal(['점수'])) || 0;
                                            responses[qNum] = score > 0 ? 'O' : 'X';
                                        }
                                    });

                                    const parsedStudents = [{ name: studentName, period: finalPeriod, responses }];
                                    
                                    setStudents(prev => [...prev.filter(p => !(p.name === studentName && p.period === finalPeriod)), ...parsedStudents]);
                                    addedStudents += 1;

                                    db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(`${studentName}_${finalPeriod}`).set({ name: studentName, period: finalPeriod, responses }).catch(e => console.warn(e));

                                    return prevExams;
                                });
                            }
                            else if (keys.includes('이름') || keys.includes('학생') || keys.includes('성명') || (keys.includes('1') && keys.includes('2'))) {
                                // 가로형 학생 데이터 파싱
                                setExams(prevExams => {
                                    const fallbackPeriod = prevExams.length > 0 ? prevExams[0].period : '';

                                    const parsedStudents = json.map(row => {
                                        const getVal = (keywords) => {
                                            const key = Object.keys(row).find(k => keywords.some(kw => String(k).includes(kw)));
                                            return key ? String(row[key]).trim() : '';
                                        };
                                        
                                        const name = getVal(['이름', '학생', '성명']);
                                        if (!name) return null;
                                        
                                        const rawPeriod = getVal(['시험시기', '시기', '학년학기', '출제시기']); 
                                        let finalPeriod = parsePeriodString(rawPeriod, '', file.name);

                                        if (!finalPeriod || finalPeriod.split(' ').length < 2) {
                                            let fullRowText = Object.values(row).join(' ');
                                            const parenMatch = fullRowText.match(/([가-힣a-zA-Z0-9\s]+?)(?:성취도\s*평가)?\s*\((.+?)\)/);
                                            if (parenMatch) {
                                                let sem = parenMatch[1].replace(/성취도\s*평가/g, '').replace(/테스트/g, '').replace(/\s+/g, '');
                                                finalPeriod = `${sem} ${parenMatch[2].trim()}`;
                                            } else {
                                                let examStr = fullRowText.includes('중간') ? '중간' : (fullRowText.includes('기말') ? '기말' : '');
                                                const fallbackSem = fallbackPeriod.split(' ')[0] || '';
                                                if (examStr && fallbackSem) finalPeriod = `${fallbackSem} ${examStr}`;
                                                else finalPeriod = fallbackPeriod;
                                            }
                                        }
                                        
                                        const responses = {};
                                        Object.keys(row).forEach(k => {
                                            const qNumStr = String(k).replace(/[^0-9]/g, '');
                                            if (qNumStr) {
                                                const qNum = parseInt(qNumStr);
                                                if (qNum > 0 && qNum <= 100) {
                                                    responses[qNum] = String(row[k]).trim().toUpperCase();
                                                }
                                            }
                                        });

                                        return { name, period: finalPeriod, responses };
                                    }).filter(Boolean);
                                    
                                    if (parsedStudents.length > 0) {
                                        setStudents(prev => [...prev.filter(p => !parsedStudents.some(n => n.name === p.name && n.period === p.period)), ...parsedStudents]);
                                        addedStudents += parsedStudents.length;

                                        parsedStudents.forEach(s => {
                                            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(`${s.name}_${s.period}`).set(s).catch(e => console.warn(e));
                                        });
                                    }

                                    return prevExams;
                                });
                            }
                        } catch (err) {
                            console.error(err);
                        }
                        resolve();
                    };

                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        try {
                            const buffer = evt.target.result;
                            let text = ""; 
                            try { 
                                text = new TextDecoder('utf-8', {fatal:true}).decode(new Uint8Array(buffer)); 
                            } catch(e) { 
                                text = new TextDecoder('euc-kr').decode(new Uint8Array(buffer)); 
                            }
                            
                            let wb;
                            // 🌟 탭 분리형 CSV 파일 강제 인식 엔진 적용
                            if (file.name.toLowerCase().endsWith('.csv') || file.name.toLowerCase().endsWith('.tsv')) {
                                if (text.includes('\t')) {
                                    const lines = text.trim().split(/\r?\n/).filter(l => l.trim() !== '');
                                    if(lines.length > 0) {
                                        const headers = lines[0].split('\t').map(h => h.trim());
                                        const json = [];
                                        for(let i=1; i<lines.length; i++){
                                            const cols = lines[i].split('\t');
                                            const rowObj = {};
                                            headers.forEach((h, idx) => rowObj[h] = cols[idx] ? cols[idx].trim() : '');
                                            json.push(rowObj);
                                        }
                                        wb = { Sheets: { Sheet1: XLSX.utils.json_to_sheet(json) }, SheetNames: ['Sheet1'] };
                                    } else {
                                        wb = XLSX.read(text, { type: 'string' });
                                    }
                                } else {
                                    wb = XLSX.read(text, { type: 'string' });
                                }
                            } else {
                                wb = XLSX.read(new Uint8Array(buffer), { type: 'array' });
                            }
                            
                            if (wb) processWorkbook(wb);
                            else resolve();
                        } catch (err) {
                            console.error(err);
                            resolve();
                        }
                    };
                    reader.readAsArrayBuffer(file);
                });

                await Promise.all(files.map(f => readFile(f)));

                if (addedExams > 0 || addedStudents > 0) {
                    showToast(`✅ 업로드 완료! (시험 ${addedExams}건, 학생 ${addedStudents}명)`, 'success');
                } else {
                    showToast(`❌ 인식된 데이터가 없습니다. 파일 양식을 다시 확인해주세요.`, 'error');
                }
                
                e.target.value = '';
            };

            // is.gd 단축 URL API
            const handleCopyLink = async () => {
                if (!analysisData) {
                    showToast("데이터 분석이 완료되지 않았습니다.", "error");
                    return;
                }
                
                setIsGenerating(true);

                const encoded = encodeReportData(analysisData, filters.studentName);
                if (!encoded) {
                    setIsGenerating(false);
                    return showToast('링크 생성에 실패했습니다.', 'error');
                }
                
                const baseUrl = window.location.origin + window.location.pathname;
                const reportUrl = `${baseUrl}?report=${encoded}`;
                let finalUrl = reportUrl;

                try {
                    finalUrl = await new Promise((resolve, reject) => {
                        const callbackName = 'isgd_callback_' + Math.floor(Math.random() * 100000);
                        window[callbackName] = function(data) {
                            delete window[callbackName];
                            const script = document.getElementById(callbackName);
                            if (script) script.remove();
                            if (data && data.shorturl) {
                                resolve(data.shorturl);
                            } else {
                                reject(new Error("URL 단축 실패"));
                            }
                        };
                        const script = document.createElement('script');
                        script.id = callbackName;
                        script.src = `https://is.gd/create.php?format=json&url=${encodeURIComponent(reportUrl)}&callback=${callbackName}`;
                        script.onerror = () => {
                            delete window[callbackName];
                            script.remove();
                            reject(new Error("네트워크 오류"));
                        };
                        document.body.appendChild(script);
                        
                        setTimeout(() => {
                            if(window[callbackName]) reject(new Error("타임아웃"));
                        }, 3000);
                    });
                } catch (err) {
                    console.warn("단축 URL 변환 실패, 기본 압축 링크 사용됨");
                }
                
                setIsGenerating(false);
                setLinkModal({ show: true, url: finalUrl });
            };

            const handlePrint = () => {
                if (!analysisData) {
                    showToast("데이터 분석이 완료되지 않았습니다.", "error");
                    return;
                }
                try {
                    window.print();
                } catch(e) {
                    showToast("이 환경에서는 인쇄 기능을 직접 실행할 수 없습니다. 키보드 단축키(Ctrl+P)를 이용해주세요.", "error");
                }
            };

            // --- 데이터 관리 (삭제) 함수 모음 ---
            const deleteStudent = (studentName, period) => {
                requestConfirm(`[${period}] 시험의 '${studentName}' 학생 데이터를 영구 삭제하시겠습니까?`, async () => {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(`${studentName}_${period}`).delete();
                        showToast("✅ 해당 학생의 데이터가 삭제되었습니다.", "success");
                        if (filters.studentName === studentName && filters.semester + " " + filters.examType === period) {
                            setFilters({ ...filters, studentName: '' });
                        }
                    } catch (e) {
                        console.error(e);
                        showToast("삭제 중 오류가 발생했습니다.", "error");
                    }
                });
            };

            const deletePeriod = (period) => {
                requestConfirm(`⚠️ [${period}] 시험의 모든 문항 및 학생 데이터를 정말 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`, async () => {
                    try {
                        const batch = db.batch();
                        const examsSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams').where('period', '==', period).get();
                        const studentsSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').where('period', '==', period).get();
                        
                        examsSnap.forEach(doc => batch.delete(doc.ref));
                        studentsSnap.forEach(doc => batch.delete(doc.ref));
                        
                        await batch.commit();
                        showToast(`✅ [${period}] 관련 모든 데이터가 삭제되었습니다.`, "success");
                        
                        if (filters.semester + " " + filters.examType === period) {
                            setFilters({ semester: '', examType: '', studentName: '' });
                        }
                    } catch (e) {
                        console.error(e);
                        showToast("삭제 중 오류가 발생했습니다.", "error");
                    }
                });
            };

            const handleClearAll = () => {
                requestConfirm("🚨 경고: 클라우드와 현재 기기에 저장된 [모든 시험 및 학생 데이터]를 영구적으로 삭제합니다.\n계속 진행하시겠습니까?", async () => {
                    try {
                        const examsSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams').get();
                        const studentsSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').get();
                        
                        const promises = [];
                        examsSnap.forEach(doc => promises.push(doc.ref.delete()));
                        studentsSnap.forEach(doc => promises.push(doc.ref.delete()));
                        await Promise.all(promises);

                        localStorage.removeItem('math_exams_cache');
                        localStorage.removeItem('math_students_cache');
                        setFilters({ semester: '', examType: '', studentName: '' });
                        setShowDataModal(false);
                        showToast("✅ 모든 데이터가 성공적으로 초기화되었습니다.", "success");
                    } catch (error) {
                        console.error("데이터 삭제 중 오류 발생:", error);
                        showToast("데이터 삭제에 실패했습니다.", "error");
                    }
                });
            };

            if (isStudentView) {
                return <StudentReportMobileView data={studentReportData} />;
            }

            return (
                <div className="min-h-screen pb-12 relative">
                    {/* --- Toast 알림창 --- */}
                    {toast.show && (
                        <div className={`fixed bottom-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-lg z-[200] font-bold text-white transition-all animate-in fade-in slide-in-from-bottom-5 ${toast.type === 'error' ? 'bg-rose-500' : 'bg-emerald-600'}`}>
                            {toast.message}
                        </div>
                    )}

                    {/* --- 삭제 확인 모달창 --- */}
                    {confirmModal.show && (
                        <div className="fixed inset-0 bg-slate-900/40 z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full animate-in zoom-in-95">
                                <h3 className="text-[15px] font-black text-slate-800 mb-6 whitespace-pre-wrap leading-relaxed">{confirmModal.message}</h3>
                                <div className="flex gap-3 justify-end">
                                    <button onClick={() => setConfirmModal({ show: false, message: '', onConfirm: null })} className="px-4 py-2 bg-slate-100 text-slate-700 font-bold rounded-lg hover:bg-slate-200 transition-colors">취소</button>
                                    <button onClick={() => { confirmModal.onConfirm(); setConfirmModal({ show: false, message: '', onConfirm: null }); }} className="px-4 py-2 bg-rose-500 text-white font-bold rounded-lg hover:bg-rose-600 transition-colors">확인</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- 링크 복사 모달창 --- */}
                    {linkModal.show && (
                        <div className="fixed inset-0 bg-slate-900/40 z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-md w-full animate-in zoom-in-95">
                                <h3 className="text-lg font-black text-slate-800 mb-2">✅ 링크 생성 완료</h3>
                                <p className="text-sm text-slate-500 mb-4 font-medium">아래 주소를 복사하여 학생/학부모님께 전송하세요.</p>
                                <input type="text" value={linkModal.url} readOnly className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-sm font-bold text-slate-700 mb-4 focus:outline-none" onClick={e => e.target.select()} />
                                <div className="flex gap-3 justify-end">
                                    <button onClick={() => {
                                        navigator.clipboard.writeText(linkModal.url).then(()=>showToast("복사되었습니다!", "success")).catch(()=>{});
                                    }} className="px-4 py-2 bg-indigo-500 text-white font-bold rounded-lg hover:bg-indigo-600 transition-colors">복사하기</button>
                                    <button onClick={() => setLinkModal({ show: false, url: '' })} className="px-4 py-2 bg-slate-100 text-slate-700 font-bold rounded-lg hover:bg-slate-200 transition-colors">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="bg-white border-b shadow-sm p-4 sticky top-0 z-40 no-print flex flex-wrap gap-4 items-center justify-between">
                        <div className="flex items-center gap-6">
                            <h1 className="text-xl font-black text-indigo-900 flex items-center gap-2">
                                <Icon name="graduation-cap" size={24} className="text-indigo-600"/>
                                학생 성취도 분석
                                <span className="text-[10px] bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded border border-emerald-100 tracking-tighter uppercase font-bold">Cloud Sync</span>
                            </h1>
                            
                            <div className="flex gap-2 bg-slate-50 p-1.5 rounded-lg border text-sm font-bold">
                                <select className="bg-transparent outline-none cursor-pointer" 
                                        value={filters.semester} onChange={e => setFilters(p => ({...p, semester: e.target.value, studentName: ''}))}>
                                    <option value="">학년학기</option>
                                    {optionsData.semesters.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                <select className="bg-transparent outline-none cursor-pointer max-w-[150px] truncate"
                                        value={filters.examType} onChange={e => setFilters(p => ({...p, examType: e.target.value, studentName: ''}))}>
                                    <option value="">시험 선택</option>
                                    {optionsData.examTypes.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                <select className="bg-transparent outline-none text-indigo-600 cursor-pointer max-w-[150px] truncate"
                                        value={filters.studentName} onChange={e => setFilters(p => ({...p, studentName: e.target.value}))}>
                                    <option value="">학생 이름 선택</option>
                                    {optionsData.students.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="flex items-center gap-2">
                            <label className="cursor-pointer bg-slate-100 px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-1.5 border hover:bg-slate-200 transition-colors">
                                <Icon name="file-up" size={16}/> 데이터 업로드
                                <input type="file" accept=".xlsx, .xls, .csv, .tsv" multiple className="hidden" onClick={(e) => (e.target.value = '')} onChange={handleFileUpload} />
                            </label>

                            <button onClick={() => setShowDataModal(true)} className="bg-slate-100 text-slate-700 px-3 py-2 rounded-lg text-sm font-bold border hover:bg-slate-200 transition-colors flex items-center gap-1.5 shadow-sm" title="데이터 개별/전체 삭제 관리">
                                <Icon name="settings" size={16}/> 데이터 관리
                            </button>
                        
                            <button onClick={handleCopyLink} className="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-1.5 shadow-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled={!analysisData || isGenerating}>
                                {isGenerating ? <Icon name="loader-2" size={16} className="animate-spin-slow" /> : <Icon name="link" size={16}/>}
                                {isGenerating ? '링크 생성 중...' : '링크 복사'}
                            </button>

                            <button onClick={handlePrint} className="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-1.5 shadow-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled={!analysisData || isGenerating}>
                                <Icon name="printer" size={16}/> A4 출력
                            </button>
                        </div>
                    </div>

                    {!analysisData && (
                        <div className="mt-40 flex flex-col items-center justify-center text-slate-300 font-bold no-print px-6 text-center">
                            <Icon name="cloud" size={64} className="mx-auto mb-4 opacity-20" />
                            <h2 className="text-xl font-black mb-2 uppercase tracking-tight text-slate-400">Database Ready</h2>
                            <p className="text-sm font-medium text-slate-400">
                                우측 상단의 <strong>[데이터 업로드]</strong> 버튼을 눌러 파일을 올려주세요.<br/>
                                <span className="opacity-70">업로드된 내용은 화면에 즉시 나타나며, 클라우드에 안전하게 영구 저장됩니다.</span>
                            </p>
                        </div>
                    )}

                    {analysisData && (
                        <div className="pt-8 no-print:bg-slate-100">
                            {/* --- Page 1: 종합 성취도 --- */}
                            <div className="a4-page bg-white">
                                <div className="border-b-4 border-indigo-900 pb-6 mb-8 flex justify-between items-end">
                                    <div>
                                        <div className="text-indigo-600 font-black text-xs tracking-widest mb-1 uppercase tracking-tighter">Achievement Report</div>
                                        <div className="flex items-baseline gap-3">
                                            <h1 className="text-[28px] font-black text-slate-900 leading-tight">{analysisData.targetPeriod} 수학 성취도 리포트</h1>
                                            {analysisData.schoolName && (
                                                <span className="text-[17px] font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-md">{analysisData.schoolName}</span>
                                            )}
                                        </div>
                                    </div>
                                    <div className="text-right flex items-center gap-4">
                                        <div>
                                            <p className="text-sm text-slate-500 font-bold mb-1 uppercase tracking-tighter">Student Name</p>
                                            <p className="text-2xl font-black text-slate-800 bg-indigo-50 px-4 py-1 rounded-lg shadow-sm border border-indigo-100">{filters.studentName}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex gap-6 mb-10">
                                    <div className="w-1/3 bg-indigo-600 rounded-2xl p-6 text-white flex flex-col justify-center items-center relative overflow-hidden shadow-xl">
                                        <div className="absolute -right-4 -top-4 opacity-10"><Icon name="target" size={120}/></div>
                                        <span className="text-[10px] font-bold uppercase opacity-70 tracking-widest z-10">Total Score</span>
                                        <div className="flex items-baseline gap-1 z-10">
                                            <span className="text-6xl font-black tracking-tighter">{analysisData.totalScore}</span>
                                            <span className="text-2xl font-bold">점</span>
                                        </div>
                                        <div className="mt-3 text-xs font-bold opacity-80 z-10 bg-indigo-800/50 px-4 py-1.5 rounded-full">
                                            {analysisData.results.filter(r=>r.isCorrect).length} / {analysisData.results.length} 문항 정답
                                        </div>
                                    </div>

                                    <div className="w-2/3 bg-slate-50 rounded-2xl border border-slate-200 p-6 flex flex-col justify-center shadow-sm">
                                        <h3 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2 font-sans tracking-tight"><Icon name="sparkles" size={18} className="text-amber-500"/> 학습 종합 분석</h3>
                                        <div className="grid grid-cols-2 gap-4 mb-4">
                                            <div className="bg-white p-3 rounded-xl border border-emerald-100 flex items-start gap-3 shadow-sm">
                                                <div className="bg-emerald-100 p-2 rounded-lg text-emerald-600 shrink-0"><Icon name="trending-up" size={18}/></div>
                                                <div className="min-w-0 flex-1">
                                                    <p className="text-[10px] text-slate-400 font-bold mb-1">강한 단원</p>
                                                    <p className="text-[13px] font-black text-slate-800 whitespace-normal break-keep leading-snug">{comments.strong}</p>
                                                </div>
                                            </div>
                                            <div className="bg-white p-3 rounded-xl border border-rose-100 flex items-start gap-3 shadow-sm">
                                                <div className="bg-rose-100 p-2 rounded-lg text-rose-600 shrink-0"><Icon name="trending-down" size={18}/></div>
                                                <div className="min-w-0 flex-1">
                                                    <p className="text-[10px] text-slate-400 font-bold mb-1">
                                                        {comments.weak.includes('완벽함') || comments.weak.includes('양호함') ? '특이사항' : '보완 단원'}
                                                    </p>
                                                    <p className={`text-[13px] font-black whitespace-normal break-keep leading-snug ${comments.weak.includes('완벽함') ? 'text-emerald-600' : 'text-slate-800'}`}>
                                                        {comments.weak}
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="text-[13.5px] text-slate-700 leading-relaxed font-medium bg-white p-4 rounded-xl border border-slate-100 shadow-sm whitespace-pre-wrap break-keep">
                                            <span className="font-bold text-indigo-600 block mb-1">💡 전문 학습 가이드</span><br/>{comments.method}
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-10 mb-8">
                                    <div className="col-span-1 border-r border-slate-100 pr-10">
                                        <h3 className="text-lg font-black text-slate-800 mb-6 flex items-center gap-2 border-b-2 border-indigo-50 pb-2 tracking-tight"><Icon name="bar-chart-2" className="text-indigo-500" size={18}/> 단원별 성취도</h3>
                                        <HorizontalBarChart data={analysisData.unitData} color="#4f46e5" />
                                    </div>
                                    
                                    <div className="col-span-1 flex flex-col gap-8">
                                        <div>
                                            <h3 className="text-lg font-black text-slate-800 mb-6 flex items-center gap-2 border-b-2 border-emerald-50 pb-2 tracking-tight"><Icon name="layers" className="text-emerald-500" size={18}/> 난이도별 성취도</h3>
                                            <HorizontalBarChart data={analysisData.diffData} color="#10b981" />
                                        </div>
                                        
                                        {analysisData.typeStats && Object.keys(analysisData.typeStats).length > 0 && (
                                            <div>
                                                <h3 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2 border-b-2 border-amber-50 pb-2 tracking-tight"><Icon name="pie-chart" className="text-amber-500" size={18}/> 문제유형별 정답률</h3>
                                                <div className="flex flex-wrap gap-4 justify-center md:justify-start w-full">
                                                    {Object.entries(analysisData.typeStats).map(([type, stats]) => (
                                                        <DonutChart key={type} data={[{name: '정답', value: stats.correct, color: '#4f46e5'}, {name: '오답', value: stats.total-stats.correct, color: '#e2e8f0'}]} title={type} />
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="absolute bottom-10 left-0 right-0 text-center text-[10px] text-slate-300 font-bold tracking-[0.2em] uppercase font-sans">
                                    Academic Analysis System — Page 1
                                </div>
                            </div>

                            {/* --- Page 2: 상세 정오표 --- */}
                            <div className="a4-page bg-white flex flex-col">
                                <div className="border-b-2 border-slate-200 pb-4 mb-6 flex items-center justify-between">
                                    <h2 className="text-2xl font-black text-slate-900 flex items-center gap-2 tracking-tight">
                                        <Icon name="check-square" size={24} className="text-indigo-600"/> 문항별 상세 정오표
                                    </h2>
                                    <span className="text-sm font-bold text-slate-400 uppercase tracking-widest">{analysisData.results.length} Questions</span>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-3 flex-1 items-start content-start">
                                    {analysisData.results.map((row, idx) => (
                                        <DetailRowItem key={idx} r={row} />
                                    ))}
                                </div>

                                <div className="mt-8 text-center text-[10px] text-slate-300 font-bold tracking-[0.2em] uppercase pt-4 border-t border-slate-50 font-sans">
                                    Academic Analysis System — Page 2
