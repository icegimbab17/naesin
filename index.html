<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>학생 성취도 분석 리포트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- URL 압축을 위한 LZString 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            height: auto; 
            background: white;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 20mm;
            position: relative;
            box-sizing: border-box;
            border-radius: 8px;
            margin-bottom: 2rem;
            overflow: visible; 
        }

        @media print {
            body { background-color: white; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            .a4-page {
                box-shadow: none;
                margin: 0;
                padding: 10mm; 
                border-radius: 0;
                page-break-after: always;
                min-height: auto;
                height: auto !important; 
                overflow: visible !important;
            }
            .a4-page:last-child { page-break-after: auto; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .break-inside-avoid { break-inside: avoid; page-break-inside: avoid; }
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 2s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const React = window.React;
        const ReactDOM = window.ReactDOM;
        const { useState, useMemo, useRef, useEffect } = React;

        // --- 데이터 초압축 인코딩 및 디코딩 로직 ---
        const encodeReportData = (analysisData, studentName) => {
            const dictMap = new Map();
            const dict = [];
            const getDictIdx = (str) => {
                const s = String(str || '');
                if (!dictMap.has(s)) {
                    dictMap.set(s, dict.length);
                    dict.push(s);
                }
                return dictMap.get(s);
            };

            const r = analysisData.results.map(res => [
                res.qNum,
                getDictIdx(res.majorUnit),
                getDictIdx(res.minorUnit),
                getDictIdx(res.type),
                getDictIdx(res.difficulty),
                res.isCorrect ? 1 : 0,
                res.score || 0
            ]);

            const payload = {
                p: analysisData.targetPeriod,
                n: studentName,
                d: dict,
                r: r
            };

            try {
                const jsonStr = JSON.stringify(payload);
                return window.LZString.compressToEncodedURIComponent(jsonStr);
            } catch(e) {
                console.error("인코딩 에러", e);
                return null;
            }
        };

        const decodeReportData = (encodedStr) => {
            try {
                let jsonStr = window.LZString.decompressFromEncodedURIComponent(encodedStr);
                let payload;
                
                if (jsonStr) {
                    payload = JSON.parse(jsonStr);
                } else {
                    const safeStr = encodedStr.replace(/ /g, '+');
                    try {
                        jsonStr = decodeURIComponent(escape(window.atob(safeStr)));
                    } catch(e) {
                        jsonStr = decodeURIComponent(window.atob(safeStr));
                    }
                    payload = JSON.parse(jsonStr);
                }
                
                if (payload.period) return payload;

                const dict = payload.d;
                const results = payload.r.map(item => ({
                    qNum: item[0],
                    majorUnit: dict[item[1]],
                    minorUnit: dict[item[2]],
                    type: dict[item[3]],
                    difficulty: dict[item[4]],
                    isCorrect: item[5] === 1,
                    score: item[6]
                }));

                let totalScoreCalc = 0;
                let maxScore = 0;
                const unitStats = {};
                const diffStats = { '상': {total:0, correct:0}, '중': {total:0, correct:0}, '하': {total:0, correct:0} };
                const typeStats = {};

                results.forEach(r => {
                    totalScoreCalc += r.isCorrect ? r.score : 0;
                    maxScore += r.score;

                    if(!unitStats[r.majorUnit]) unitStats[r.majorUnit] = { total: 0, correct: 0 };
                    unitStats[r.majorUnit].total++;
                    if(r.isCorrect) unitStats[r.majorUnit].correct++;

                    let d = String(r.difficulty || '중');
                    if (d.includes('상') || d.includes('어려움') || d.includes('어려운') || d.includes('7') || d.includes('8')) d = '상';
                    else if (d.includes('하') || d.includes('쉬움') || d.includes('쉬운') || d.includes('1') || d.includes('2')) d = '하';
                    else d = '중';
                    
                    if(!diffStats[d]) diffStats[d] = {total:0, correct:0};
                    diffStats[d].total++;
                    if(r.isCorrect) diffStats[d].correct++;

                    let t = String(r.type || '기타');
                    if (t.includes('객관')) t = '객관식';
                    else if (t.includes('주관') || t.includes('서술')) t = '주관식/서술형';
                    else t = '기타';

                    if(!typeStats[t]) typeStats[t] = { total: 0, correct: 0 };
                    typeStats[t].total++;
                    if(r.isCorrect) typeStats[t].correct++;
                });

                const totalScore = maxScore > 0 ? Math.round(totalScoreCalc * 10) / 10 : Math.round((results.filter(r => r.isCorrect).length / results.length) * 100);
                const unitData = Object.entries(unitStats).map(([name, stats]) => ({ name, ...stats }));
                const diffData = Object.entries(diffStats).map(([name, stats]) => ({ name, ...stats })).filter(d=>d.total>0).sort((a,b) => ['하','중','상'].indexOf(b.name) - ['하','중','상'].indexOf(a.name));

                // 코멘트 분석 객체 생성
                const analysisDataProxy = { unitData, totalScore, results, targetPeriod: payload.p, typeStats };
                const comments = generateAIComment(analysisDataProxy);

                return {
                    period: payload.p,
                    name: payload.n,
                    score: totalScore,
                    results: results.map(r => ({q: r.qNum, m: r.majorUnit, i: r.minorUnit, t: r.type, d: r.difficulty, c: r.isCorrect, s: r.score})),
                    units: unitData,
                    diffs: diffData,
                    types: typeStats,
                    comments: comments
                };
            } catch(e) {
                console.error("데이터 디코딩 실패:", e);
                return null;
            }
        };

        // --- 전문 학습 가이드 생성 로직 (요청하신 로직 반영) ---
        const generateAIComment = (analysisData) => {
            if (!analysisData) return {};
            const { unitData, totalScore, results } = analysisData;
            
            const maxScore = results.reduce((acc, r) => acc + (r.score || r.s || 0), 0);
            const percentage = maxScore > 0 ? (totalScore / maxScore) * 100 : (results.filter(r => r.isCorrect).length / results.length) * 100;
            
            const unitsWithPct = unitData.map(u => ({
                name: u.name,
                pct: (u.correct / u.total) * 100
            })).sort((a, b) => b.pct - a.pct);

            let strongText = "-";
            let weakText = "-";
            let primaryWeakUnit = "-";

            if (unitsWithPct.length > 0) {
                const bestScore = unitsWithPct[0].pct;
                const strongUnits = unitsWithPct.filter(u => u.pct === bestScore || u.pct >= 90).slice(0, 2);
                strongText = strongUnits.map(u => u.name).join(', ');

                // 70% 이하인 단원만 보완 단원으로 엄격하게 분류
                const weakCandidates = unitsWithPct.filter(u => u.pct <= 70).sort((a, b) => a.pct - b.pct);
                if (weakCandidates.length > 0) {
                    weakText = weakCandidates.slice(0, 2).map(u => u.name).join(', ');
                    primaryWeakUnit = weakCandidates[0].name;
                } else {
                    // 70% 이하인 단원이 없을 경우
                    const nextWeak = unitsWithPct.filter(u => u.pct < 100).sort((a, b) => a.pct - b.pct);
                    if (nextWeak.length > 0) {
                        weakText = "전반적으로 양호함";
                        primaryWeakUnit = nextWeak[0].name;
                    } else {
                        weakText = "취약 단원 없음 (완벽함!)";
                    }
                }
            }

            // 🌟 KICE 가이드라인 데이터베이스
            const kiceGuidelines = {
                "유리수와 순환소수": "순환소수를 분수로 고치는 기계적 계산보다는 유리수와 순환소수의 관계를 깊이 있게 이해하는 데 중점을 두어야 합니다.",
                "식의 계산": "지수법칙을 이해하고, 다항식의 사칙계산을 정확히 수행하는 능력이 필요합니다. 지나치게 복잡한 식보다는 기본 법칙의 정확한 적용을 연습하세요.",
                "일차부등식": "부등식의 성질을 이해하고, 해를 수직선 위에 나타내는 시각적 접근이 필요합니다. 실생활 상황을 부등식으로 표현하는 연습을 권장합니다.",
                "연립일차방정식": "미지수를 소거하는 원리를 파악하고, 대입법과 가감법 중 상황에 맞는 적절한 방법을 선택하여 식을 전개하는 능력이 요구됩니다.",
                "일차함수와 그래프": "함수의 개념을 바탕으로 x절편, y절편, 기울기의 의미를 기하학적으로 파악하고 그래프를 능숙하게 그릴 수 있어야 합니다.",
                "일차함수와 일차방정식의 관계": "연립방정식의 해가 두 직선의 교점임을 이해하고, 대수적 풀이(계산)와 기하학적 의미(그래프)를 연결하는 통합적 사고가 필요합니다.",
                "삼각형의 성질": "이등변삼각형과 직각삼각형, 내심과 외심의 성질을 단순 암기하지 말고, 논리적으로 정당화(증명)해보는 과정이 매우 중요합니다.",
                "사각형의 성질": "여러 가지 사각형 사이의 포함 관계를 명확히 이해하고, 평행사변형이 되는 조건을 찾아내는 논리적 추론 능력이 필요합니다.",
                "도형의 닮음": "닮음의 뜻과 성질을 이해하고, 삼각형의 닮음 조건을 활용하여 평면도형과 입체도형의 성질을 유추해 내는 공간 지각력이 요구됩니다.",
                "피타고라스 정리": "피타고라스 정리가 성립함을 다양한 방법으로 직접 설명해보고, 이를 평면도형의 길이나 넓이를 구하는 데 활용하는 훈련이 필요합니다.",
                "경우의 수": "일상생활의 다양한 상황에서 일어날 수 있는 경우의 수를 빠짐없이, 중복되지 않게 논리적으로 구하는 사고방식이 필요합니다.",
                "확률": "확률의 기본 성질을 이해하고, 상대도수로서의 확률의 의미를 바탕으로 실생활의 불확실한 상황을 수학적으로 해석하는 능력이 요구됩니다.",
                "제곱근과 실수": "무리수의 개념을 직관적으로 이해하고, 수직선 위에 무리수를 나타내어 실수 체계의 구조를 파악하는 것이 핵심입니다.",
                "다항식의 곱셈과 인수분해": "전개와 인수분해가 역관계임을 이해해야 합니다. 곱셈 공식을 기계적으로 외우기보다 도형의 넓이 등을 이용해 직접 유도해 보는 과정이 필요합니다.",
                "이차방정식의 풀이": "인수분해나 완전제곱식을 이용해 해를 구하는 원리를 정확히 이해해야 합니다. 단순 계산보다 근의 공식 유도 과정을 직접 써보는 것이 중요합니다.",
                "이차방정식의 활용": "주어진 실생활 문제를 이차방정식으로 모델링하고, 구한 해가 문제 상황(길이, 시간 등 양수 조건)에 맞는지 확인하는 습관을 들여보세요.",
                "이차함수의 그래프": "이차함수 식을 일반형에서 표준형으로 능숙하게 변형하여 꼭짓점과 축의 방정식을 찾고, 그래프의 이동을 시각적으로 연결해야 합니다.",
                "이차함수의 일반형": "일반형을 표준형으로 고치는 대수적 조작 능력이 요구됩니다. 그래프의 평행이동과 대칭이동을 통해 식의 형태가 어떻게 변하는지 비교해 보세요.",
                "이차함수의 최댓값과 최솟값": "제한된 범위에서 이차함수 그래프의 개형을 그리고, 축의 위치에 따른 최댓값과 최솟값을 찾아내는 해석 능력이 필요합니다.",
                "삼각비": "직각삼각형의 닮음을 이용하여 삼각비의 개념을 이해하고, 특수한 각(30, 45, 60도)의 삼각비 값을 기하학적으로 유도해보는 과정이 필수적입니다.",
                "원의 성질": "현, 접선, 원주각의 성질을 관찰을 통해 발견하고, 이를 논리적으로 정당화하며 복잡하지 않은 도형 문제에 적용하는 연습이 요구됩니다.",
                "대푯값과 산포도": "평균, 중앙값, 최빈값 등 대푯값의 특징을 구분하고, 자료의 분포 상태를 분산과 표준편차로 정확히 해석하는 통계적 사고력이 중요합니다.",
                "접선의 방정식": "미분계수의 기하학적 의미(접선의 기울기)를 명확히 이해하고, 곡선 위의 점과 밖의 점 등 다양한 조건에서 접선의 방정식을 구하는 논리적 과정을 세밀하게 점검해야 합니다.",
                "함수의 극한": "직관적인 그래프 해석을 통해 극한의 개념을 이해하고, 극한에 대한 기본 성질을 이용하여 함수의 극한값을 구하는 능력이 필요합니다."
            };

            let matchedGuideline = "";
            const cleanWeakUnit = primaryWeakUnit.replace(/\s+/g, '');
            for (const key in kiceGuidelines) {
                const cleanKey = key.replace(/\s+/g, '');
                if (cleanWeakUnit.includes(cleanKey) || cleanKey.includes(cleanWeakUnit)) {
                    matchedGuideline = kiceGuidelines[key];
                    break;
                }
            }
            if (!matchedGuideline) {
                matchedGuideline = primaryWeakUnit !== "-" ? `해당 단원([${primaryWeakUnit}])의 교과서 예제와 기본 개념을 다시 한번 꼼꼼히 점검해 주세요.` : "전반적인 수학 기본 개념을 탄탄히 다지는 것이 중요합니다.";
            }

            let method = "";
            const evalAdvice = "※ 학교 내신의 출제 및 평가권은 담당 선생님에게 있습니다. 학교 수업 시간에 선생님이 강조한 내용을 최우선으로 복습하고, 교과서의 기본 문제부터 심화 문제까지 철저하게 풀어보세요.";

            if (percentage >= 100) {
                method = `모든 단원의 개념을 완벽하게 이해하고 있습니다! 🎉 현재의 훌륭한 학습 패턴을 유지하며, 심화 문제나 선행 학습을 가볍게 시작해 보는 것을 적극 추천합니다.\n\n${evalAdvice}`;
            }
            else if (percentage >= 90) {
                method = `전체적인 개념 이해도가 매우 우수합니다. 간혹 실수하는 문제나 고난도 심화 문제를 집중적으로 풀어보며 100점을 향한 훈련을 진행하세요.\n\n📌 [평가원 기준 학습 조언]\n${matchedGuideline}\n\n${evalAdvice}`;
            }
            else if (percentage >= 70) {
                method = `기본적인 개념은 잘 잡혀 있으나 특정 단원([${weakText}])에서 오답이 발생하고 있습니다.\n\n📌 [평가원 기준 학습 조언]\n${matchedGuideline}\n\n위 지침을 바탕으로 오답 노트를 작성하며 빈틈을 메워주세요.\n\n${evalAdvice}`;
            }
            else {
                method = `전반적인 기초 개념 다지기가 우선되어야 합니다. 어려운 문제보다는 교과서 위주의 기본 문제를 반복해서 풀며 원리를 정확히 이해하는 학습이 필요합니다.\n\n📌 [최우선 보완 단원 조언]\n${matchedGuideline}\n\n${evalAdvice}`;
            }

            return { strong: strongText, weak: weakText, method };
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = ''; 
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    i.style.width = `${size}px`; i.style.height = `${size}px`;
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons();
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        // --- 차트 및 행 컴포넌트 ---
        const DonutChart = ({ data, title }) => {
            const total = data.reduce((sum, d) => sum + d.value, 0);
            let cumulative = 0;
            if (total === 0) return null;
            return (
                <div className="flex flex-col items-center bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex-1 min-w-[140px] max-w-[200px]">
                    <h4 className="text-[13px] font-black text-slate-700 mb-3 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200 w-full text-center truncate">{title}</h4>
                    <div className="relative flex items-center justify-center w-full">
                        <svg viewBox="-1.2 -1.2 2.4 2.4" className="w-full h-full transform -rotate-90 drop-shadow-sm max-w-[90px] max-h-[90px]">
                            {data.map((slice, i) => {
                                const pct = slice.value / total;
                                if (pct === 0) return null;
                                const startX = Math.cos(2 * Math.PI * cumulative);
                                const startY = Math.sin(2 * Math.PI * cumulative);
                                cumulative += pct;
                                const endX = Math.cos(2 * Math.PI * cumulative);
                                const endY = Math.sin(2 * Math.PI * cumulative);
                                const largeArc = pct > 0.5 ? 1 : 0;
                                const path = pct === 1 ? `M 1 0 A 1 1 0 1 1 -1 0 A 1 1 0 1 1 1 0` : `M ${startX} ${startY} A 1 1 0 ${largeArc} 1 ${endX} ${endY} L 0 0`;
                                return <path key={i} d={path} fill={slice.color} stroke="#fff" strokeWidth="0.1" strokeLinejoin="round" />;
                            })}
                            <circle cx="0" cy="0" r="0.65" fill="#fff" />
                            <text x="0" y="0.05" textAnchor="middle" dominantBaseline="middle" className="text-[0.45px] font-black fill-indigo-600" style={{transform: 'rotate(90deg)'}}>{Math.round((data[0]?.value/total)*100 || 0)}%</text>
                        </svg>
                    </div>
                    <div className="flex flex-col gap-1.5 mt-4 w-full px-1">
                        {data.map((d, i) => (
                            <div key={i} className="flex items-center justify-between text-xs w-full">
                                <div className="flex items-center gap-1.5 shrink-0">
                                    <span className="w-2.5 h-2.5 rounded-full shadow-sm" style={{ backgroundColor: d.color }}></span>
                                    <span className="font-bold text-slate-600">{d.name}</span>
                                </div>
                                <span className="text-slate-500 font-bold shrink-0">{d.value}개</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const HorizontalBarChart = ({ data, color }) => (
            <div className="flex flex-col gap-4 w-full">
                {data.map((item, i) => {
                    const pct = item.total === 0 ? 0 : Math.round((item.correct / item.total) * 100);
                    return (
                        <div key={i} className="flex flex-col gap-1.5 w-full">
                            <div className="flex justify-between items-end w-full">
                                <span className="text-[14px] font-bold text-slate-700 leading-tight flex-1 pr-2 whitespace-normal break-words">{item.name}</span>
                                <span className="text-xs text-slate-400 font-bold shrink-0">{item.correct}/{item.total}</span>
                            </div>
                            <div className="w-full h-4 bg-slate-100 rounded-full overflow-hidden flex relative shadow-inner">
                                <div className="h-full rounded-full flex items-center justify-end px-2" style={{ width: `${pct}%`, backgroundColor: color || '#4f46e5', transition: 'width 1s' }}>
                                    {pct > 15 && <span className="text-[10px] text-white font-bold">{pct}%</span>}
                                </div>
                                {pct <= 15 && <span className="absolute left-2 top-1/2 transform -translate-y-1/2 text-[10px] text-slate-500 font-bold">{pct}%</span>}
                            </div>
                        </div>
                    );
                })}
            </div>
        );

        const DetailRowItem = ({ r }) => {
            const qNum = r.q !== undefined ? r.q : r.qNum;
            const major = r.m !== undefined ? r.m : r.majorUnit;
            const minor = r.i !== undefined ? r.i : r.minorUnit;
            const type = r.t !== undefined ? r.t : r.type;
            const diff = r.d !== undefined ? r.d : r.difficulty;
            const score = r.s !== undefined ? r.s : r.score;
            const isCorrect = r.c !== undefined ? r.c : r.isCorrect;
            return (
                <div className="flex items-start justify-between p-3.5 bg-white rounded-xl border border-slate-200 shadow-sm h-auto break-inside-avoid">
                    <div className="flex items-start gap-3 w-full">
                        <div className="mt-0.5 w-8 h-8 rounded-full bg-slate-100 text-slate-700 font-black flex items-center justify-center shrink-0 text-sm shadow-sm border border-slate-200">{qNum}</div>
                        <div className="flex flex-col flex-1 min-w-0 pr-2">
                            <span className="text-[14px] font-bold text-slate-800 mb-1.5 leading-snug break-words whitespace-normal">{major} <span className="text-slate-400 font-normal text-[12px] inline-block">| {minor}</span></span>
                            <div className="flex flex-wrap gap-1.5 text-[10px]">
                                <span className="bg-slate-50 text-slate-500 px-1.5 py-0.5 rounded border border-slate-200 font-bold whitespace-nowrap">{type}</span>
                                <span className={`px-1.5 py-0.5 rounded font-bold border whitespace-nowrap ${diff==='상'?'text-rose-600 bg-rose-50 border-rose-100':(diff==='하'?'text-emerald-600 bg-emerald-50 border-emerald-100':'text-amber-600 bg-amber-50 border-amber-100')}`}>{diff}</span>
                                {score > 0 && <span className="text-indigo-500 font-bold px-1.5 py-0.5 whitespace-nowrap">{score}점</span>}
                            </div>
                        </div>
                        <div className="shrink-0 flex items-center justify-center ml-1 mt-0.5">
                            {isCorrect ? <div className="w-9 h-9 rounded-full border-2 border-emerald-500 text-emerald-500 flex items-center justify-center font-black text-[15px] bg-emerald-50">O</div> : <div className="w-9 h-9 rounded-full border-2 border-rose-500 text-rose-500 flex items-center justify-center font-black text-[15px] bg-rose-50">X</div>}
                        </div>
                    </div>
                </div>
            );
        };

        // --- 모바일 전용 학생 뷰 ---
        const StudentReportMobileView = ({ data }) => {
            if (!data) return <div className="p-8 text-center h-screen flex items-center justify-center font-bold text-slate-500">데이터를 불러올 수 없습니다.</div>;
            return (
                <div className="min-h-screen bg-slate-100 md:py-8 font-sans">
                    <div className="max-w-md mx-auto bg-white md:rounded-3xl shadow-2xl overflow-hidden min-h-screen md:min-h-0 pb-12">
                        <div className="bg-indigo-600 p-6 pt-10 text-white text-center relative overflow-hidden">
                            <div className="absolute opacity-10 -right-6 -top-6"><Icon name="award" size={150} /></div>
                            <p className="text-indigo-200 font-bold text-xs tracking-widest mb-1 relative z-10">MATH REPORT</p>
                            <h1 className="text-2xl font-black mb-6 relative z-10">{data.period} 수학 성취도</h1>
                            <div className="bg-white/10 p-5 rounded-2xl backdrop-blur-sm relative z-10 flex flex-col items-center border border-white/20 shadow-lg">
                                <span className="text-sm font-bold text-indigo-100 mb-1">{data.name} 학생 종합 점수</span>
                                <div className="flex items-baseline gap-1">
                                    <span className="text-6xl font-black tracking-tighter">{data.score}</span>
                                    <span className="text-xl font-bold">점</span>
                                </div>
                            </div>
                        </div>
                        <div className="p-5 space-y-8 mt-2">
                            <div className="bg-slate-50 border border-slate-100 rounded-2xl p-5 shadow-sm">
                                <h3 className="font-black text-slate-800 mb-4 flex items-center gap-2 text-sm"><Icon name="sparkles" className="text-amber-500" size={18}/> 학습 종합 분석</h3>
                                <div className="flex gap-3 mb-4">
                                    <div className="flex-1 bg-white p-3 rounded-xl border border-emerald-100 text-center shadow-sm">
                                        <span className="block text-[10px] text-slate-400 font-bold mb-1">강한 단원</span>
                                        <span className="text-[13px] font-black text-slate-800 whitespace-normal break-words leading-tight block">{data.comments.strong}</span>
                                    </div>
                                    <div className="flex-1 bg-white p-3 rounded-xl border border-rose-100 text-center shadow-sm">
                                        <span className="block text-[10px] text-slate-400 font-bold mb-1">{data.comments.weak.includes('완벽함') || data.comments.weak.includes('우수함') || data.comments.weak.includes('양호함') ? '특이사항' : '보완 단원'}</span>
                                        <span className={`text-[13px] font-black whitespace-normal break-words leading-tight block ${data.comments.weak.includes('완벽함') ? 'text-emerald-600' : 'text-slate-800'}`}>{data.comments.weak}</span>
                                    </div>
                                </div>
                                <p className="text-[13px] text-slate-600 leading-relaxed font-medium bg-white p-4 rounded-xl border border-slate-100 shadow-sm whitespace-pre-wrap"><span className="font-bold text-indigo-600 mr-1 block mb-1">💡 학습 가이드</span>{data.comments.method}</p>
                            </div>
                            <div>
                                <h3 className="font-black text-slate-800 mb-4 border-b-2 border-slate-100 pb-2 flex items-center gap-2 text-[15px]"><Icon name="bar-chart-2" className="text-indigo-500" size={18}/> 단원별 성취도</h3>
                                <HorizontalBarChart data={data.units} color="#4f46e5" />
                            </div>
                            <div>
                                <h3 className="font-black text-slate-800 mb-4 border-b-2 border-slate-100 pb-2 flex items-center gap-2 text-[15px]"><Icon name="layers" className="text-emerald-500" size={18}/> 난이도별 성취도</h3>
                                <HorizontalBarChart data={data.diffs} color="#10b981" />
                            </div>
                            {data.types && Object.keys(data.types).length > 0 && (
                                <div>
                                    <h3 className="font-black text-slate-800 mb-4 border-b-2 border-slate-100 pb-2 flex items-center gap-2 text-[15px]"><Icon name="pie-chart" className="text-amber-500" size={18}/> 문제유형별 정답률</h3>
                                    <div className="flex flex-wrap gap-4 justify-center w-full">
                                        {Object.entries(data.types).map(([type, stats]) => (
                                            <DonutChart key={type} data={[{name: '정답', value: stats.correct, color: '#4f46e5'}, {name: '오답', value: stats.total-stats.correct, color: '#e2e8f0'}]} title={type} />
                                        ))}
                                    </div>
                                </div>
                            )}
                            <div>
                                <h3 className="font-black text-slate-800 mb-4 border-b-2 border-slate-100 pb-2 flex items-center gap-2 text-[15px]"><Icon name="check-square" className="text-indigo-600" size={18}/> 상세 정오표</h3>
                                <div className="grid grid-cols-1 gap-y-3 flex-1 items-start content-start">
                                    {data.results.map((r, idx) => <DetailRowItem key={idx} r={r} />)}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 메인 앱 컴포넌트 ---
        function App() {
            const urlParams = new URLSearchParams(window.location.search);
            const reportParam = urlParams.get('report');
            const [isStudentView, setIsStudentView] = useState(false);
            const [studentReportData, setStudentReportData] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);

            // 로컬 스토리지 데이터 유지 기능
            const [exams, setExams] = useState(() => {
                const s = localStorage.getItem('math_exams_db');
                return s ? JSON.parse(s) : [];
            });
            const [students, setStudents] = useState(() => {
                const s = localStorage.getItem('math_students_db');
                return s ? JSON.parse(s) : [];
            });
            const [filters, setFilters] = useState({ semester: '', examType: '', studentName: '' });

            useEffect(() => {
                localStorage.setItem('math_exams_db', JSON.stringify(exams));
            }, [exams]);
            useEffect(() => {
                localStorage.setItem('math_students_db', JSON.stringify(students));
            }, [students]);

            useEffect(() => {
                if (reportParam) {
                    const decoded = decodeReportData(reportParam);
                    if (decoded) { setStudentReportData(decoded); setIsStudentView(true); }
                    else { alert('손상된 링크입니다.'); window.history.replaceState({}, '', window.location.pathname); }
                }
            }, [reportParam]);

            const options = useMemo(() => {
                const allP = [...new Set(exams.map(e => e.period))];
                const sem = [...new Set(allP.map(p => p.split(' ')[0]))].filter(Boolean).sort();
                const targetP = `${filters.semester} ${filters.examType}`.trim();
                const avS = [...new Set(students.filter(s => s.period === targetP).map(s => s.name))].sort();
                return { semesters: sem, examTypes: ['중간', '기말'], students: avS };
            }, [exams, students, filters.semester, filters.examType]);

            useEffect(() => {
                if (!filters.semester && options.semesters.length > 0) setFilters(p => ({...p, semester: options.semesters[0]}));
                if (!filters.examType) setFilters(p => ({...p, examType: '기말'}));
            }, [options.semesters]);

            const analysisData = useMemo(() => {
                if (!filters.semester || !filters.examType || !filters.studentName) return null;
                const targetP = `${filters.semester} ${filters.examType}`;
                const tExams = exams.filter(e => e.period === targetP).sort((a,b) => a.qNum - b.qNum);
                const tSt = students.find(s => s.name === filters.studentName && s.period === targetP);
                if (tExams.length === 0 || !tSt) return null;

                let totalScoreCalc = 0;
                const results = tExams.map(ex => {
                    const sAns = tSt.responses[ex.qNum];
                    const isC = String(sAns).toUpperCase() === 'O' || String(sAns) === '정답';
                    if (isC) totalScoreCalc += (ex.score || 0);
                    return { ...ex, isCorrect: isC, studentAns: sAns };
                });

                const maxPossible = tExams.reduce((sum, ex) => sum + (ex.score || 0), 0);
                const totalScore = maxPossible > 0 ? Math.round(totalScoreCalc * 10) / 10 : Math.round((results.filter(r => r.isCorrect).length / results.length) * 100);

                const unitStats = {};
                results.forEach(r => {
                    if(!unitStats[r.majorUnit]) unitStats[r.majorUnit] = { total: 0, correct: 0 };
                    unitStats[r.majorUnit].total++;
                    if(r.isCorrect) unitStats[r.majorUnit].correct++;
                });
                const unitData = Object.entries(unitStats).map(([name, stats]) => ({ name, ...stats }));
                
                const diffStats = { '상': {total:0, correct:0}, '중': {total:0, correct:0}, '하': {total:0, correct:0} };
                results.forEach(r => {
                    let d = String(r.difficulty || '중');
                    if (d.includes('상') || d.includes('7') || d.includes('8')) d = '상';
                    else if (d.includes('하') || d.includes('1') || d.includes('2')) d = '하';
                    else d = '중';
                    if(!diffStats[d]) diffStats[d] = {total:0, correct:0};
                    diffStats[d].total++; if(r.isCorrect) diffStats[d].correct++;
                });
                const diffData = Object.entries(diffStats).map(([name, stats]) => ({ name, ...stats })).filter(d=>d.total>0).sort((a,b) => ['하','중','상'].indexOf(b.name) - ['하','중','상'].indexOf(a.name));

                const typeStats = {};
                results.forEach(r => {
                    let t = String(r.type || '기타');
                    if (t.includes('객관')) t = '객관식'; else if (t.includes('주관') || t.includes('서술')) t = '주관식/서술형'; else t = '기타';
                    if(!typeStats[t]) typeStats[t] = { total: 0, correct: 0 };
                    typeStats[t].total++; if(r.isCorrect) typeStats[t].correct++;
                });

                return { targetPeriod: targetP, results, totalScore, unitData, diffData, typeStats };
            }, [exams, students, filters]);

            const comments = useMemo(() => generateAIComment(analysisData), [analysisData]);

            // 다중 파일 업로드 처리
            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                let addedE = 0, addedS = 0;

                const readFile = (file) => new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        try {
                            const buffer = evt.target.result;
                            let decodedText = "";
                            const uint8 = new Uint8Array(buffer);
                            try { decodedText = new TextDecoder('utf-8', { fatal: true }).decode(uint8); }
                            catch (e) { decodedText = new TextDecoder('euc-kr').decode(uint8); }

                            let workbook;
                            if (decodedText.includes('\t')) {
                                const lines = decodedText.split(/\r?\n/).filter(l => l.trim() !== '');
                                const headers = lines[0].split('\t').map(h => h.trim());
                                const data = lines.slice(1).map(l => {
                                    const cols = l.split('\t');
                                    const obj = {};
                                    headers.forEach((h, idx) => obj[h] = cols[idx] ? cols[idx].trim() : '');
                                    return obj;
                                });
                                workbook = { Sheets: { Sheet1: XLSX.utils.json_to_sheet(data) }, SheetNames: ['Sheet1'] };
                            } else {
                                workbook = XLSX.read(new Uint8Array(buffer), { type: 'array' });
                            }

                            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });
                            const keys = Object.keys(json[0] || {}).join(',');

                            if (keys.includes('단원') || keys.includes('난이도')) {
                                const parsed = json.map(row => {
                                    const gv = (kws) => { const k = Object.keys(row).find(x => kws.some(kw => String(x).includes(kw))); return k ? String(row[k]).trim() : ''; };
                                    const rp = gv(['출제시기', '시기']), rg = gv(['학년']);
                                    let gMatch = rg.match(/\d/), tMatch = rp.match(/(\d)\s*학기/);
                                    let semester = (gMatch && tMatch) ? `${gMatch[0]}-${tMatch[1]}` : gv(['학년학기']);
                                    let exam = rp.includes('중간') ? '중간' : (rp.includes('기말') ? '기말' : '');
                                    return {
                                        period: `${semester} ${exam}`.trim(),
                                        qNum: parseInt(gv(['문항번호', '번호', '문항'])) || 0,
                                        type: gv(['문항유형', '유형', '형태']),
                                        difficulty: gv(['난이도', '수준']),
                                        majorUnit: gv(['대단원']),
                                        minorUnit: gv(['소단원']),
                                        score: parseFloat(gv(['배점', '점수'])) || 0
                                    };
                                }).filter(e => e.qNum > 0);
                                setExams(prev => [...prev.filter(p => !parsed.some(n => n.period === p.period)), ...parsed]);
                                addedE += parsed.length;
                            } else if (keys.includes('이름') || keys.includes('성명') || (keys.includes('1') && keys.includes('2'))) {
                                const parsed = json.map(row => {
                                    const gv = (kws) => { const k = Object.keys(row).find(x => kws.some(kw => String(x).includes(kw))); return k ? String(row[k]).trim() : ''; };
                                    const name = gv(['이름', '성명', '학생']);
                                    const rp = gv(['시험시기', '시기', '학년학기']);
                                    let sMatch = rp.match(/(\d)[^\d]*(\d)/);
                                    let semester = sMatch ? `${sMatch[1]}-${sMatch[2]}` : rp;
                                    let rowT = Object.values(row).join(' ');
                                    let exam = rowT.includes('중간') ? '중간' : (rowT.includes('기말') ? '기말' : '');
                                    let finalP = `${semester} ${exam}`.trim();
                                    if (!finalP || finalP.length < 3) finalP = exams[0]?.period || '';
                                    const res = {};
                                    Object.keys(row).forEach(k => {
                                        const q = String(k).replace(/[^0-9]/g, '');
                                        if (q) res[parseInt(q)] = String(row[k]).trim().toUpperCase();
                                    });
                                    return { name, period: finalP, responses: res };
                                }).filter(s => s.name);
                                setStudents(prev => [...prev.filter(p => !parsed.some(n => n.name === p.name && n.period === p.period)), ...parsed]);
                                addedS += parsed.length;
                            }
                            resolve();
                        } catch (e) { resolve(); }
                    };
                    reader.readAsArrayBuffer(file);
                });

                await Promise.all(files.map(f => readFile(f)));
                alert(`✅ 업로드 완료 (시험정보: ${addedE}건, 학생: ${addedS}명)`);
                e.target.value = '';
            };

            const handleCopyLink = async () => {
                if (!analysisData) return alert("학생을 선택해주세요.");
                setIsGenerating(true);
                const encoded = encodeReportData(analysisData, filters.studentName);
                const baseUrl = window.location.origin + window.location.pathname;
                const reportUrl = `${baseUrl}?report=${encoded}`;
                let finalUrl = reportUrl;

                try {
                    finalUrl = await new Promise((resolve, reject) => {
                        const cbName = 'isgd_cb_' + Date.now();
                        window[cbName] = (d) => { resolve(d.shorturl); delete window[cbName]; };
                        const s = document.createElement('script');
                        s.src = `https://is.gd/create.php?format=json&url=${encodeURIComponent(reportUrl)}&callback=${cbName}`;
                        document.body.appendChild(s);
                        setTimeout(() => reject(), 4000);
                    });
                } catch(e) {}
                
                setIsGenerating(false);
                const textArea = document.createElement("textarea");
                textArea.value = finalUrl; textArea.style.position = "fixed"; textArea.style.opacity = "0";
                document.body.appendChild(textArea); textArea.select();
                try {
                    document.execCommand('copy');
                    alert(`✅ 광고 없는 짧은 링크가 복사되었습니다!\n\n${finalUrl}`);
                } catch(e) { prompt('링크를 직접 복사해주세요:', finalUrl); }
                document.body.removeChild(textArea);
            };

            if (isStudentView) return <StudentReportMobileView data={studentReportData} />;

            return (
                <div className="min-h-screen pb-12">
                    <div className="bg-white border-b shadow-sm p-4 sticky top-0 z-50 no-print flex flex-wrap gap-4 items-center justify-between">
                        <div className="flex items-center gap-6">
                            <h1 className="text-xl font-black text-indigo-900 flex items-center gap-2"><Icon name="graduation-cap" className="text-indigo-600"/>학생 성취도 분석</h1>
                            <div className="flex gap-2 bg-slate-50 p-1.5 rounded-lg border">
                                <select className="px-3 py-1.5 bg-white border rounded text-sm font-bold text-slate-700 outline-none" value={filters.semester} onChange={e => setFilters(p => ({...p, semester: e.target.value, studentName: ''}))}>
                                    <option value="">학년학기 선택</option>
                                    {options.semesters.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                <select className="px-3 py-1.5 bg-white border rounded text-sm font-bold text-slate-700 outline-none" value={filters.examType} onChange={e => setFilters(p => ({...p, examType: e.target.value, studentName: ''}))}>
                                    <option value="">시험 시기</option>
                                    {options.examTypes.map(s => <option key={s} value={s}>{s}고사</option>)}
                                </select>
                                <select className="px-3 py-1.5 bg-white border rounded text-sm font-bold text-indigo-700 outline-none min-w-[120px]" value={filters.studentName} onChange={e => setFilters(p => ({...p, studentName: e.target.value}))}>
                                    <option value="">학생 이름 선택</option>
                                    {options.students.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <label className="cursor-pointer bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-1.5 transition-colors border">
                                <Icon name="file-up" size={16}/> 데이터 업로드
                                <input type="file" accept=".xlsx, .xls, .csv, .tsv" multiple className="hidden" onClick={e => e.target.value = ''} onChange={handleFileUpload} />
                            </label>
                            <button onClick={handleCopyLink} className="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-1.5 shadow-md transition-colors disabled:opacity-50" disabled={!analysisData || isGenerating}>
                                {isGenerating ? <Icon name="loader-2" size={16} className="animate-spin-slow" /> : <Icon name="link" size={16}/>}
                                {isGenerating ? '생성 중...' : '링크 복사'}
                            </button>
                            <button onClick={() => window.print()} className="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-1.5 shadow-md transition-colors disabled:opacity-50" disabled={!analysisData}>
                                <Icon name="printer" size={16}/> A4 출력
                            </button>
                            <button onClick={() => { if(confirm('모든 데이터를 초기화할까요?')) { localStorage.clear(); location.reload(); }}} className="bg-rose-50 text-rose-600 px-3 py-2 rounded-lg text-sm font-bold border border-rose-100"><Icon name="trash-2" size={16}/></button>
                        </div>
                    </div>

                    {!analysisData && (
                        <div className="mt-20 flex flex-col items-center justify-center text-slate-400 no-print px-6 text-center">
                            <Icon name="clipboard-list" size={64} className="mb-4 text-slate-300" />
                            <h2 className="text-xl font-bold mb-2">데이터를 업로드하고 학생을 선택해주세요.</h2>
                            <p className="text-sm">시험지 엑셀과 학생 CSV 파일(여러 개 가능)을 차례로 업로드하세요.<br/>데이터는 브라우저에 안전하게 자동 저장됩니다.</p>
                        </div>
                    )}

                    {analysisData && (
                        <div className="pt-8 no-print:bg-slate-100">
                            <div className="a4-page bg-white">
                                <div className="border-b-4 border-indigo-900 pb-6 mb-8 flex justify-between items-end">
                                    <div>
                                        <div className="text-indigo-600 font-black tracking-widest mb-1 text-sm uppercase">Achievement Report</div>
                                        <h1 className="text-4xl font-black text-slate-900">{analysisData.targetPeriod} 수학 성취도 리포트</h1>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-sm text-slate-500 font-bold mb-1 uppercase tracking-tighter">Student Name</p>
                                        <p className="text-2xl font-black text-slate-800 bg-indigo-50 px-4 py-1 rounded-lg">{filters.studentName}</p>
                                    </div>
                                </div>

                                <div className="flex gap-6 mb-10">
                                    <div className="w-1/3 bg-indigo-600 rounded-2xl p-6 text-white flex flex-col justify-center items-center relative overflow-hidden shadow-xl">
                                        <div className="absolute -right-4 -top-4 opacity-10"><Icon name="target" size={120}/></div>
                                        <span className="text-indigo-200 font-bold mb-2 z-10 uppercase tracking-widest text-xs">Total Score</span>
                                        <div className="flex items-baseline gap-1 z-10"><span className="text-6xl font-black tracking-tighter">{analysisData.totalScore}</span><span className="text-2xl font-bold">점</span></div>
                                        <div className="mt-4 bg-indigo-800/50 px-4 py-1.5 rounded-full text-sm font-bold z-10">{analysisData.results.filter(r=>r.isCorrect).length} / {analysisData.results.length} 문항 정답</div>
                                    </div>
                                    <div className="w-2/3 bg-slate-50 rounded-2xl border border-slate-200 p-6 flex flex-col justify-center shadow-sm">
                                        <h3 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2"><Icon name="sparkles" className="text-amber-500"/> 학습 종합 분석</h3>
                                        <div className="grid grid-cols-2 gap-4 mb-4">
                                            <div className="bg-white p-3 rounded-xl border border-emerald-100 flex items-center gap-3">
                                                <div className="bg-emerald-100 p-2 rounded-lg text-emerald-600"><Icon name="trending-up"/></div>
                                                <div><p className="text-xs text-slate-500 font-bold uppercase">Strong</p><p className="text-[14px] font-black text-slate-800 whitespace-normal break-words leading-tight">{comments.strong}</p></div>
                                            </div>
                                            <div className="bg-white p-3 rounded-xl border border-rose-100 flex items-center gap-3">
                                                <div className="bg-rose-100 p-2 rounded-lg text-rose-600"><Icon name="trending-down"/></div>
                                                <div><p className="text-xs text-slate-500 font-bold uppercase">{comments.weak.includes('완벽') || comments.weak.includes('우수') || comments.weak.includes('양호') ? 'Status' : 'Weak'}</p><p className={`text-[14px] font-black whitespace-normal break-words leading-tight ${comments.weak.includes('완벽함') ? 'text-emerald-600' : 'text-slate-800'}`}>{comments.weak}</p></div>
                                            </div>
                                        </div>
                                        <p className="text-[13px] text-slate-700 leading-relaxed font-medium bg-white p-4 rounded-xl border border-slate-100 shadow-sm whitespace-pre-wrap"><span className="font-bold text-indigo-600 mr-1 block mb-1">💡 학습 가이드</span>{comments.method}</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-8 mb-8">
                                    <div className="col-span-1 border-r border-slate-100 pr-8">
                                        <h3 className="text-lg font-black text-slate-800 mb-6 flex items-center gap-2 border-b pb-2"><Icon name="bar-chart-2" className="text-indigo-500"/> 단원별 성취도</h3>
                                        <HorizontalBarChart data={analysisData.unitData} color="#4f46e5" />
                                    </div>
                                    <div className="col-span-1 flex flex-col gap-8">
                                        <div>
                                            <h3 className="text-lg font-black text-slate-800 mb-6 flex items-center gap-2 border-b pb-2"><Icon name="layers" className="text-emerald-500"/> 난이도별 성취도</h3>
                                            <HorizontalBarChart data={analysisData.diffData} color="#10b981" />
                                        </div>
                                        <div>
                                            <h3 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2 border-b pb-2"><Icon name="pie-chart" className="text-amber-500"/> 문제유형별 정답률</h3>
                                            <div className="flex flex-wrap gap-4 justify-center md:justify-start w-full">
                                                {Object.entries(analysisData.typeStats).map(([type, stats]) => (
                                                    <DonutChart key={type} data={[{name: '정답', value: stats.correct, color: '#4f46e5'}, {name: '오답', value: stats.total-stats.correct, color: '#e2e8f0'}]} title={type} />
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="absolute bottom-10 left-0 right-0 text-center text-xs text-slate-400 font-bold tracking-widest uppercase">Page 1</div>
                            </div>

                            <div className="a4-page bg-white flex flex-col">
                                <div className="border-b-2 border-slate-200 pb-4 mb-6"><h2 className="text-2xl font-black text-slate-900 flex items-center gap-2"><Icon name="check-square" className="text-indigo-600"/> 문항별 상세 정오표</h2></div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-3 flex-1 items-start content-start">
                                    {analysisData.results.map((row, idx) => <DetailRowItem key={idx} r={row} />)}
                                </div>
                                <div className="mt-8 text-center text-xs text-slate-400 font-bold tracking-widest pt-4 border-t uppercase">Page 2</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
