                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- 데이터 관리 (개별 삭제 / 전체 삭제) 모달 --- */}
                    {showDataModal && (
                        <div className="fixed inset-0 bg-slate-900/40 z-[100] flex items-center justify-center p-4 backdrop-blur-sm no-print">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg flex flex-col max-h-[85vh] animate-in fade-in zoom-in duration-200">
                                <div className="p-5 border-b flex justify-between items-center bg-slate-50 rounded-t-2xl">
                                    <h2 className="text-lg font-black text-slate-800 flex items-center gap-2"><Icon name="database" className="text-indigo-600"/> 데이터 관리</h2>
                                    <button onClick={() => setShowDataModal(false)} className="text-slate-400 hover:text-slate-700 bg-white rounded-full p-1 border shadow-sm transition-colors"><Icon name="x" size={18}/></button>
                                </div>
                                
                                <div className="p-5 overflow-y-auto flex-1 space-y-6">
                                    {optionsData.semesters.length === 0 ? (
                                        <div className="text-center text-slate-400 py-10 font-bold">저장된 데이터가 없습니다.</div>
                                    ) : (
                                        [...new Set(exams.map(e => e.period))].sort().map(period => (
                                            <div key={period} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                                <div className="bg-slate-50 px-4 py-3 flex justify-between items-center border-b border-slate-200">
                                                    <span className="font-black text-indigo-700">{period} 시험</span>
                                                    <button onClick={() => deletePeriod(period)} className="text-xs text-rose-600 font-bold hover:bg-rose-50 px-2 py-1 rounded border border-rose-200 transition-colors">이 시험 전체 삭제</button>
                                                </div>
                                                <ul className="divide-y divide-slate-100">
                                                    {students.filter(s => s.period === period).map(s => (
                                                        <li key={s.name} className="flex justify-between items-center px-4 py-3 hover:bg-slate-50 transition-colors">
                                                            <span className="text-sm font-bold text-slate-700">{s.name} 학생</span>
                                                            <button onClick={() => deleteStudent(s.name, period)} className="text-slate-400 hover:text-rose-500 transition-colors p-1" title={`${s.name} 삭제`}><Icon name="trash-2" size={16}/></button>
                                                        </li>
                                                    ))}
                                                    {students.filter(s => s.period === period).length === 0 && (
                                                        <li className="px-4 py-3 text-xs text-slate-400 text-center">등록된 학생이 없습니다.</li>
                                                    )}
                                                </ul>
                                            </div>
                                        ))
                                    )}
                                </div>
                                
                                <div className="p-5 border-t bg-slate-50 flex justify-between items-center rounded-b-2xl">
                                    <span className="text-xs text-slate-500 font-bold">⚠️ 삭제 시 클라우드 서버에서도 지워집니다.</span>
                                    <button onClick={handleClearAll} disabled={optionsData.semesters.length === 0} className="bg-rose-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-rose-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                                        모든 데이터 초기화
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
