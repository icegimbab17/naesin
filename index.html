                                            majorUnit: { type: "STRING", description: "대단원 이름 (이미지에 없으면 AI가 스스로 판단)" },
                                            minorUnit: { type: "STRING", description: "소단원 이름 (이미지에 없으면 AI가 스스로 판단)" },
                                            concept: { type: "STRING", description: "출제내용 (이미지에 없으면 AI가 스스로 판단)" },
                                            aiPoint: { type: "STRING", description: "LaTeX 형식을 적용한 어려운 포인트" },
                                            aiConcept: { type: "STRING", description: "LaTeX 형식을 적용한 필요 개념" },
                                            aiStrategy: { type: "STRING", description: "LaTeX 형식을 적용한 단계별 풀이 전략" }
                                        },
                                        required: ["qNum", "code", "score", "difficulty", "aiPoint", "aiConcept", "aiStrategy"]
                                    }
                                }
                            }
                        };

                        let retries = 3;
                        let delay = 1000;
                        let data = null;
                        
                        while(retries > 0) {
                            try {
                                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                                
                                if (!response.ok) {
                                    const errTxt = await response.text();
                                    console.error("API Response Fail", errTxt);
                                    throw new Error(`API Fail: ${response.status}`);
                                }
                                
                                data = await response.json();
                                break;
                            } catch(e) {
                                retries--;
                                if(retries === 0) throw e;
                                await new Promise(r => setTimeout(r, delay));
                                delay *= 2;
                            }
                        }

                        if(data && data.candidates && data.candidates[0].content) {
                            let text = data.candidates[0].content.parts[0].text;
                            
                            let jsonResult = [];
                            try { jsonResult = JSON.parse(text); } catch(e) { console.error("JSON 파싱 에러"); }

                            const imgFileName = imageFiles[0].name.replace(/\.[^/.]+$/, "").replace(/_유형분석|유형분석/g, '').trim();
                            const parsedInfo = parseExamInfo(imgFileName);

                            const newExamsFromImg = jsonResult.map(res => {
                                const rawCode = res.code ? String(res.code) : '';
                                let normCode = normalizeCode(rawCode);

                                const mapped = currentMasterDB[normCode] || {};

                                const major = mapped.major || res.majorUnit || '미분류 단원';
                                const minor = mapped.sub || mapped.minor || res.minorUnit || '분류확인필요';
                                const conceptStr = mapped.concept || res.concept || rawCode || '분석불가';

                                const safeQNum = parseInt(String(res.qNum).replace(/[^0-9]/g, '')) || 0;
                                const safeScore = parseFloat(String(res.score).replace(/[^0-9.]/g, '')) || 5;
                                const safeDiff = parseInt(String(res.difficulty).replace(/[^0-9]/g, '')) || 4;

                                return {
                                    period: imgFileName, 
                                    rawPeriod: imgFileName,
                                    fileName: imgFileName,
                                    school: parsedInfo.school || "학교명 미상",
                                    qNum: safeQNum,
                                    type: "객관식",
                                    difficulty: safeDiff,
                                    majorUnit: cleanMajorUnit(major),
                                    minorUnit: minor, 
                                    concept: conceptStr,
                                    score: safeScore,
                                    aiStrategy: res.aiStrategy || "", 
                                    aiPoint: res.aiPoint || "",
                                    aiConcept: res.aiConcept || ""
                                };
                            }).filter(e => e.qNum > 0);

                            addedExams.push(...newExamsFromImg);
                        }
                    }

                    const currentTotalExams = [...exams, ...addedExams];
                    const fallbackPeriod = currentTotalExams.length > 0 ? currentTotalExams[0].period : '';

                    addedStudents = addedStudents.map(s => {
                        let finalPeriod = s.period;
                        let isExactMatch = currentTotalExams.some(ex => ex.period === finalPeriod);
                        
                        if (!isExactMatch && currentTotalExams.length > 0) {
                            const semPrefix = finalPeriod ? finalPeriod.split(' ')[0] : '';
                            const partialMatch = currentTotalExams.find(ex => ex.period.startsWith(semPrefix));
                            if (partialMatch) finalPeriod = partialMatch.period;
                            else finalPeriod = fallbackPeriod;
                        } else if (!finalPeriod || finalPeriod === '-' || finalPeriod.split(' ').length < 2) {
                            finalPeriod = fallbackPeriod;
                        }
                        s.period = finalPeriod;
                        return s;
                    });

                    if (addedExams.length > 0) {
                        setExams(prev => [...prev.filter(p => !addedExams.some(n => n.period === p.period && n.qNum === p.qNum)), ...addedExams]);
                        addedExams.forEach(ex => {
                            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams').doc(`${ex.period}_${ex.qNum}`).set(ex).catch(e => console.warn(e));
                        });
                        
                        const justAdded = addedExams[0];
                        const info = parseExamInfo(justAdded.fileName || justAdded.period);
                        
                        setFilters(prev => ({
                            ...prev,
                            examYear: info.year !== "미상" ? info.year : '',
                            examSchoolExam: info.schoolExamDisplay !== "분석 시험" ? info.schoolExamDisplay : ''
                        }));
                        setViewMode('exam'); 
                    }

                    if (addedStudents.length > 0) {
                        setStudents(prev => [...prev.filter(p => !addedStudents.some(n => n.name === p.name && n.period === p.period)), ...addedStudents]);
                        addedStudents.forEach(s => {
                            const saveObj = { name: s.name, period: s.period, responses: s.responses };
                            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(`${s.name}_${s.period}`).set(saveObj).catch(e => console.warn(e));
                        });
                    }

                    let msg = [];
                    if (isMasterDBUpdated) msg.push(`마스터DB 업데이트`);
                    if (addedExams.length > 0) msg.push(`기출 ${addedExams.length}문항 분석완료`);
                    if (addedStudents.length > 0) msg.push(`학생 데이터 추가`);
                    if (addedMediaCount > 0) msg.push(`원문 연결`);

                    if (msg.length > 0) showToast(`✅ 통합 데이터 처리 성공! (${msg.join(', ')})`, 'success');
                    else showToast(`❌ 추출된 데이터가 없습니다.`, 'error');

                } catch(error) {
                    console.error(error);
                    showToast("파일 처리 중 API 통신 지연 혹은 오류가 발생했습니다.", "error");
                } finally {
                    setIsGenerating(false);
                    e.target.value = '';
                }
            };

            const handleExportExcel = () => {
                if (!examReportData || !examReportData.targetExams) {
                    showToast("추출할 데이터가 없습니다.", "error");
                    return;
                }

                const dataForExcel = examReportData.targetExams.map(q => {
                    return {
                        "문항번호": q.qNum,
                        "형태": q.type || '객관식',
                        "출제단원": `${q.cleanMajor || '-'} > ${q.minorUnit || '-'}`,
                        "출제내용": q.concept || q.aiConcept || '-',
                        "난이도": q.numericDifficulty || q.difficulty || '-'
                    };
                });

                const worksheet = window.XLSX.utils.json_to_sheet(dataForExcel);
                
                worksheet['!cols'] = [
                    { wpx: 60 }, 
                    { wpx: 60 }, 
                    { wpx: 250 },
                    { wpx: 300 },
                    { wpx: 60 }  
                ];

                const reportData = examReportData.reportContent;
                let aoa = [
                    [],
                    ["========================================================================="],
                    ["[ 1. 시험 총평 ]"],
                    [reportData.summaryLine],
                    [reportData.summaryDetail],
                    [],
                    ["[ 2. 단원별 핵심 포인트 및 학습 전략 ]"]
                ];

                reportData.strategyUnits.forEach(u => {
                    aoa.push([`★ 단원: ${u.name} (총 ${u.count}문항 / 최고난이도 ${u.maxDiff})`]);
                    aoa.push(["- 출제경향:", u.trend]);
                    aoa.push(["- 대비전략:", u.strategy]);
                    aoa.push([]);
                });

                aoa.push(["[ 3. 상대적 고난도 문항 분석 ]"]);
                reportData.hardQuestionsList.forEach(q => {
                    aoa.push([`★ 문항 ${q.qNum}번 - ${q.concept}`]);
                    aoa.push(["- 출제의도:", q.intent]);
                    aoa.push(["- 공략(해결전략):", q.strategy]);
                    aoa.push([]);
                });

                const nextRow = examReportData.targetExams.length + 3;
                window.XLSX.utils.sheet_add_aoa(worksheet, aoa, { origin: `A${nextRow}` });

                const workbook = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(workbook, worksheet, "문항분석 및 기출보고서");

                const fileName = `${examReportData.fileName || '기출분석'}_문항분석_보고서.xlsx`;
                window.XLSX.writeFile(workbook, fileName);
                
                showToast("✅ 엑셀 보고서 파일이 다운로드되었습니다.", "success");
            };

            const handleCopyLink = async () => {
                if (!analysisData) { showToast("데이터 분석이 완료되지 않았습니다.", "error"); return; }
                setIsGenerating(true);

                const encoded = encodeReportData(analysisData, filters.studentName);
                if (!encoded) { setIsGenerating(false); return showToast('링크 생성에 실패했습니다.', 'error'); }
                
                const baseUrl = window.location.origin + window.location.pathname;
                const reportUrl = `${baseUrl}?report=${encoded}`;
                let finalUrl = reportUrl;

                try {
                    finalUrl = await new Promise((resolve, reject) => {
                        const callbackName = 'isgd_callback_' + Math.floor(Math.random() * 100000);
                        window[callbackName] = function(data) {
                            delete window[callbackName];
                            const script = document.getElementById(callbackName);
                            if (script) script.remove();
                            if (data && data.shorturl) resolve(data.shorturl);
                            else reject(new Error("URL 단축 실패"));
                        };
                        const script = document.createElement('script');
                        script.id = callbackName;
                        script.src = `https://is.gd/create.php?format=json&url=${encodeURIComponent(reportUrl)}&callback=${callbackName}`;
                        script.onerror = () => { delete window[callbackName]; script.remove(); reject(new Error("네트워크 오류")); };
                        document.body.appendChild(script);
                        setTimeout(() => { if(window[callbackName]) reject(new Error("타임아웃")); }, 3000);
                    });
                } catch (err) { console.warn("단축 URL 변환 실패, 기본 압축 링크 사용됨"); }
                
                setIsGenerating(false);
                setLinkModal({ show: true, url: finalUrl });
            };

            const handlePrint = () => {
                if (viewMode === 'student' && !analysisData) { showToast("학생 데이터를 먼저 선택해주세요.", "error"); return; }
                if (viewMode === 'exam' && !examReportData) { showToast("시험 데이터를 먼저 선택해주세요.", "error"); return; }
                try { window.print(); } catch(e) { showToast("키보드 단축키(Ctrl+P)를 이용해주세요.", "error"); }
            };

            const deleteStudent = (studentName, period) => {
                requestConfirm(`해당 학생 데이터를 영구 삭제하시겠습니까?`, async () => {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(`${studentName}_${period}`).delete();
                        showToast("✅ 해당 학생의 데이터가 삭제되었습니다.", "success");
                        if (filters.studentName === studentName) {
                            setFilters(p => ({ ...p, studentName: '' }));
                        }
                    } catch (e) { console.error(e); showToast("삭제 중 오류가 발생했습니다.", "error"); }
                });
            };

            const deletePeriod = (period) => {
                requestConfirm(`⚠️ 이 시험에 관련된 모든 기출 문항 및 학생 데이터를 정말 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`, async () => {
                    try {
                        const batch = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams').where('period', '==', period).get().then(snap => {
                            const batchOp = db.batch();
                            snap.forEach(doc => batchOp.delete(doc.ref));
                            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').where('period', '==', period).get().then(sSnap => {
                                sSnap.forEach(doc => batchOp.delete(doc.ref));
                                batchOp.commit().then(() => {
                                    showToast(`✅ 관련 모든 데이터가 삭제되었습니다.`, "success");
                                    setFilters({ studentCourse: '', studentExam: '', studentName: '', examYear: '', examSchoolExam: '' });
                                });
                            });
                        });
                    } catch (e) { console.error(e); showToast("삭제 중 오류가 발생했습니다.", "error"); }
                });
            };

            const handleClearAll = () => {
                requestConfirm("🚨 경고: 클라우드에 저장된 [모든 시험 및 학생 데이터]를 영구적으로 삭제합니다.\n계속 진행하시겠습니까?", async () => {
                    try {
                        const examsSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams').get();
                        const studentsSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').get();
                        
                        const promises = [];
                        examsSnap.forEach(doc => promises.push(doc.ref.delete()));
                        studentsSnap.forEach(doc => promises.push(doc.ref.delete()));
                        await Promise.all(promises);

                        localStorage.removeItem('math_exams_cache'); localStorage.removeItem('math_students_cache');
                        setFilters({ studentCourse: '', studentExam: '', studentName: '', examYear: '', examSchoolExam: '' });
                        setShowDataModal(false);
                        showToast("✅ 모든 데이터가 성공적으로 초기화되었습니다.", "success");
                    } catch (error) { console.error("데이터 삭제 중 오류 발생:", error); showToast("데이터 삭제에 실패했습니다.", "error"); }
                });
            };

            if (isStudentView) return <StudentReportMobileView data={studentReportData} />;

            return (
                <div className="min-h-screen pb-12 relative z-0">
                    
                    {toast.show && (
                        <div className={`fixed bottom-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-lg z-[9999999] font-bold text-white transition-all animate-in fade-in slide-in-from-bottom-5 ${toast.type === 'error' ? 'bg-rose-500' : 'bg-emerald-600'}`}>
                            {toast.message}
                        </div>
                    )}

                    {confirmModal.show && (
                        <div className="fixed inset-0 bg-slate-900/40 z-[9999999] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full animate-in zoom-in-95">
                                <h3 className="text-[15px] font-black text-slate-800 mb-6 whitespace-pre-wrap leading-relaxed">{confirmModal.message}</h3>
                                <div className="flex gap-3 justify-end">
                                    <button onClick={() => setConfirmModal({ show: false, message: '', onConfirm: null })} className="cursor-pointer px-4 py-2 bg-slate-100 text-slate-700 font-bold rounded-lg hover:bg-slate-200 transition-colors">취소</button>
                                    <button onClick={() => { confirmModal.onConfirm(); setConfirmModal({ show: false, message: '', onConfirm: null }); }} className="cursor-pointer px-4 py-2 bg-rose-500 text-white font-bold rounded-lg hover:bg-rose-600 transition-colors">확인</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {linkModal.show && (
                        <div className="fixed inset-0 bg-slate-900/40 z-[9999999] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-md w-full animate-in zoom-in-95">
                                <h3 className="text-lg font-black text-slate-800 mb-2">✅ 링크 생성 완료</h3>
                                <p className="text-sm text-slate-500 mb-4 font-medium">아래 주소를 복사하여 학생/학부모님께 전송하세요.</p>
                                <input type="text" value={linkModal.url} readOnly className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-sm font-bold text-slate-700 mb-4 focus:outline-none" onClick={e => e.target.select()} />
                                <div className="flex gap-3 justify-end">
                                    <button onClick={() => {
                                        navigator.clipboard.writeText(linkModal.url).then(()=>showToast("복사되었습니다!", "success")).catch(()=>{});
                                    }} className="cursor-pointer px-4 py-2 bg-indigo-500 text-white font-bold rounded-lg hover:bg-indigo-600 transition-colors">복사하기</button>
                                    <button onClick={() => setLinkModal({ show: false, url: '' })} className="cursor-pointer px-4 py-2 bg-slate-100 text-slate-700 font-bold rounded-lg hover:bg-slate-200 transition-colors">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {pdfModal.show && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[999999] flex items-center justify-center p-4 backdrop-blur-sm no-print">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl h-[90vh] flex flex-col animate-in fade-in zoom-in duration-200">
                                <div className="p-4 border-b flex justify-between items-center bg-slate-50 rounded-t-2xl">
                                    <h2 className="text-lg font-black text-slate-800 flex items-center gap-2">
                                        <Icon name={pdfModal.isImage ? "image" : "file-text"} className="text-orange-600"/> 원문 뷰어
                                    </h2>
                                    <button onClick={() => setPdfModal({ show: false, url: '', isImage: false })} className="cursor-pointer text-slate-400 hover:text-slate-700 bg-white rounded-full p-1 border shadow-sm transition-colors"><Icon name="x" size={18}/></button>
                                </div>
                                <div className="flex-1 w-full bg-slate-200 rounded-b-2xl overflow-hidden p-2 flex items-center justify-center">
                                    {pdfModal.isImage ? (
                                        <img src={pdfModal.url} className="max-w-full max-h-full object-contain rounded-xl shadow-sm" alt="원문 이미지" />
                                    ) : (
                                        <iframe src={pdfModal.url} className="w-full h-full rounded-xl border border-slate-300 bg-white" title="PDF Viewer"></iframe>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="bg-white border-b shadow-sm p-4 sticky top-0 z-40 no-print flex flex-wrap gap-4 items-center justify-between">
                        <div className="flex items-center gap-6 w-full max-w-[850px]">
                            <h1 className="text-xl font-black text-indigo-900 flex items-center gap-2 mr-2 shrink-0">
                                <Icon name="graduation-cap" size={24} className="text-indigo-600"/>
                                학습 분석 시스템
                            </h1>
                            
                            <div className="flex bg-slate-200 p-1 rounded-lg mr-2 shrink-0 shadow-inner">

                                {isGenerating ? 'AI 분석 중...' : '데이터 통합 업로드'}
                                <input type="file" accept=".xlsx, .xls, .csv, .tsv, .pdf, image/*" multiple className="hidden" onClick={(e) => (e.target.value = '')} onChange={handleFileUpload} />
                            </label>

                            <button onClick={() => setShowDataModal(true)} className="cursor-pointer bg-slate-100 text-slate-700 px-3 py-2 rounded-lg text-sm font-bold border hover:bg-slate-200 transition-colors flex items-center gap-1.5 shadow-sm" title="데이터 개별/전체 삭제 관리">
                                <Icon name="settings" size={16}/> 관리

                            {viewMode === 'student' && (
                                <button onClick={handleCopyLink} className="cursor-pointer bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-1.5 shadow-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled={!analysisData || isGenerating}>
                                    <Icon name="link" size={16}/> 링크 복사
                                </button>

                                <button onClick={handleExportExcel} className="cursor-pointer bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-1.5 shadow-md transition-colors ml-2">

                                <div className="p-5 overflow-y-auto flex-1 space-y-6">
                                    {allSavedPeriods.length === 0 ? (
                                        <div className="text-center text-slate-400 py-10 font-bold">저장된 데이터가 없습니다.</div>

                                        allSavedPeriods.map(period => {

                                            const displayPeriod = `${info.year !== '미상'? info.year : ''} ${info.schoolExamDisplay}`.trim();
                                            return (
                                            <div key={period} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                                <div className="bg-slate-50 px-4 py-3 flex justify-between items-center border-b border-slate-200">
                                                    <span className="font-black text-indigo-700">{displayPeriod} 시험</span>
                                                    <button onClick={() => deletePeriod(period)} className="cursor-pointer text-xs text-rose-600 font-bold hover:bg-rose-50 px-2 py-1 rounded border border-rose-200 transition-colors">이 시험 전체 삭제</button>

                                                <ul className="divide-y divide-slate-100">

                                                    ))}

                                                        <li className="px-4 py-3 text-xs text-slate-400 text-center">등록된 학생이 없습니다.</li>

                                    // 🚨 주의: 서버 배포 시 소스코드 상단(function App)의 apiKey 변수에 실제 Gemini API Key를 입력해야 자동 분석이 작동합니다.<br/>

                                                <span className="text-[17px] font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-md">{analysisData.schoolName}</span>

                                        <div className="mt-3 text-xs font-bold opacity-80 z-10 bg-indigo-800/50 px-4 py-1.5 rounded-full">

                                                    <p className="text-[10px] text-slate-400 font-bold mb-1">

                                                    </p>
                                                </div>
                                            </div>

                                        <HorizontalBarChart data={analysisData.unitData} color="#4f46e5" />
                                    </div>
                                    
                                    <div className="col-span-1 flex flex-col gap-8 print:gap-4">

                                            <h3 className="text-lg font-black text-slate-800 mb-6 print:mb-3 flex items-center gap-2 border-b-2 border-emerald-50 pb-2 tracking-tight"><Icon name="layers" className="text-emerald-500" size={18}/> 난이도별 성취도</h3>
                                            <HorizontalBarChart data={analysisData.diffData} color="#10b981" />
                                        </div>
                                        
                                        {analysisData.typeStats && Object.keys(analysisData.typeStats).length > 0 && (

                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                    Academic Analysis System — Page 1
                                </div>
                            </div>

                            {/* --- 🖨️ Page 2: 상세 정오표 --- */}
                            <div className="a4-page bg-white flex flex-col print-page-auto">
                                <div className="border-b-2 border-slate-200 pb-4 mb-6 flex items-center justify-between">
                                    <h2 className="text-2xl font-black text-slate-900 flex items-center gap-2 tracking-tight">
                                        <Icon name="check-square" size={24} className="text-indigo-600"/> 문항별 상세 정오표
                                    </h2>
                                    <span className="text-sm font-bold text-slate-400 uppercase tracking-widest">{analysisData.results.length} Questions</span>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-3 flex-1 items-start content-start">

                                    Academic Analysis System — Page 2
                                </div>
                            </div>
                        </div>
                    )}

                    {viewMode === 'exam' && examReportData && (
                        <div className="pt-8 no-print:bg-slate-100 font-sans">
                            <div className="a4-page bg-white print-page-auto mb-8 relative">
                                <div className="border-b-4 border-orange-500 pb-4 mb-6 flex justify-between items-end">
                                    <div>
                                        <div className="text-orange-500 font-black text-xs tracking-widest mb-1 uppercase tracking-tighter">Exam Analysis Report</div>
                                        {(() => {
                                            const parts = [examReportData.year !== "미상" ? examReportData.year : "", examReportData.schoolExamDisplay].filter(Boolean);
                                            return parts.length > 0 ? (
                                                <h1 className="text-[26px] font-black text-slate-900 leading-tight break-keep">
                                                    <span className="text-orange-600 mr-2">{parts.join(' ')}</span>분석

                                                <h1 className="text-[26px] font-black text-slate-900 leading-tight break-keep">
                                                    <span className="text-orange-600 mr-2">{examReportData.fileName}</span>분석

                                        })()}

                                </div>

                                                {/* 🌟 시험범위 무조건 순수 대단원만 나오게 됨 */}
                                                {examReportData.scopes.map((scope, idx) => (

                                        </div>
                                        <div className="grid grid-cols-2 gap-8 print:gap-4">

                                                <h3 className="text-sm font-bold text-slate-500 mb-3 flex items-center gap-1"><Icon name="pie-chart" size={16}/> 단원별 문항 분포</h3>

                                            </div>
                                            <div>
                                                <h3 className="text-sm font-bold text-slate-500 mb-3 flex items-center gap-1"><Icon name="bar-chart" size={16}/> 난이도별 문항 분포 (1~8단계)</h3>
                                                <HorizontalBarChart data={examReportData.diffLevelsList} isExamView={true} />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* 🌟 2. 종합 출제 경향 및 학습 전략 보고서 🌟 */}
                                <div className="mb-8 break-inside-avoid">
                                    <h2 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2 border-l-4 border-orange-500 pl-3">2. 종합 출제 경향 및 학습 전략</h2>
                                    
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                                        <div>
                                            <h3 className="text-[15px] font-black text-indigo-700 mb-2">📝 1. 시험 총평</h3>
                                            <p className="text-[14px] font-bold text-slate-800 mb-1 leading-snug">{examReportData.reportContent.summaryLine}</p>
                                            <p className="text-[13px] text-slate-600 leading-relaxed break-keep whitespace-pre-wrap">{examReportData.reportContent.summaryDetail}</p>
                                        </div>

                                        <div>
                                            <h3 className="text-[15px] font-black text-emerald-700 mb-3">🎯 2. 단원별 핵심 포인트 및 학습 전략</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {examReportData.reportContent.strategyUnits.map((u, i) => (
                                                    <div key={i} className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                        <p className="font-black text-[14px] text-slate-800 mb-2">📌 {u.name} <span className="text-[11px] text-slate-500 font-bold ml-1">(총 {u.count}문항 / 최고난이도 {u.maxDiff})</span></p>
                                                        <div className="text-[13px] text-slate-700 space-y-2 break-keep">
                                                            <div><strong className="text-emerald-600 block mb-0.5">출제경향:</strong> {u.trend}</div>
                                                            <div><strong className="text-indigo-600 block mb-0.5">대비전략:</strong> {u.strategy}</div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* 🌟 3. 상대적 고난도 문항 심층 분석 (이미지 업로드 칸 제거) 🌟 */}
                                {examReportData.reportContent.hardQuestionsList.length > 0 && (
                                    <div className="mb-8 break-inside-avoid">
                                        <h2 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2 border-l-4 border-orange-500 pl-3">3. 상대적 고난도 문항 심층 분석</h2>
                                        <div className="grid grid-cols-2 gap-4 print:gap-3">
                                            {examReportData.reportContent.hardQuestionsList.map((q, idx) => (
                                                <div key={idx} className="bg-white border border-orange-200 rounded-2xl shadow-sm relative overflow-hidden flex flex-col p-5 pt-7">
                                                    <div className="absolute top-0 right-0 bg-orange-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-lg z-10">고난도 문항</div>
                                                    
                                                    <div className="flex flex-col flex-1">
                                                        <h3 className="text-[16px] font-black text-slate-800 mb-3 flex items-center gap-2">
                                                            <div className="w-6 h-6 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center text-sm shrink-0">{q.qNum}</div>
                                                            <MathText text={q.concept} className="truncate text-sm font-bold" />
                                                        </h3>
                                                        <div className="space-y-3 flex-1 flex flex-col justify-end">
                                                            <div>
                                                                <p className="text-[11px] font-bold text-orange-500 mb-0.5">🎯 출제의도</p>
                                                                <MathText text={q.intent} className="text-[13px] text-slate-700 font-medium break-keep leading-tight" />
                                                            </div>
                                                            <div className="bg-orange-50 p-3 rounded-lg border border-orange-100 mt-2">
                                                                <p className="text-[11px] font-bold text-orange-600 mb-1">💡 공략 (해결전략)</p>
                                                                <MathText text={q.strategy} className="text-[12px] text-slate-800 font-bold leading-relaxed break-keep" />
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                
                                <div className="absolute bottom-10 print:bottom-6 left-0 right-0 text-center text-[10px] text-slate-300 font-bold tracking-[0.2em] uppercase font-sans">
                                    Exam Analysis Report — Page 1
                                </div>
                            </div>
                            
                            <div className="a4-page bg-white print-page-auto relative">
                                <div className="mb-4">
                                    <h2 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2 border-l-4 border-orange-500 pl-3">4. 문항별 상세 분석</h2>
                                    <div className="overflow-x-auto rounded-xl border border-slate-200">
                                        <table className="w-full text-left border-collapse text-[12px]">
                                            <thead>
                                                <tr className="bg-slate-50 border-b border-slate-200">
                                                    <th className="py-2.5 px-3 font-bold text-slate-500 text-center w-12 border-r">문항번호</th>
                                                    <th className="py-2.5 px-3 font-bold text-slate-500 text-center w-16 border-r">형태</th>
                                                    <th className="py-2.5 px-3 font-bold text-slate-500 border-r w-32">출제단원</th>
                                                    <th className="py-2.5 px-3 font-bold text-slate-500 border-r w-40">출제내용</th>
                                                    <th className="py-2.5 px-3 font-bold text-slate-500 text-center w-16 border-r">난이도</th>
                                                    <th className="py-2.5 px-3 font-bold text-slate-500">풀이 전략</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {examReportData.targetExams.map((q, idx) => (
                                                    <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                                        <td className="py-2.5 px-3 text-center font-black text-slate-700 border-r">{q.qNum}</td>
                                                        <td className="py-2.5 px-3 text-center font-bold text-slate-600 border-r">{q.type || '객관식'}</td>
                                                        <td className="py-2.5 px-3 border-r font-bold text-slate-800 break-keep">
                                                            {q.cleanMajor} &gt; {q.minorUnit || '-'}
                                                        </td>
                                                        <td className="py-2.5 px-3 border-r">
                                                            <MathText text={q.concept || q.aiConcept || '-'} className="font-bold text-slate-800 break-keep" />
                                                        </td>
                                                        <td className="py-2.5 px-3 text-center border-r">
                                                            <span className={`px-1.5 py-0.5 rounded font-bold whitespace-nowrap ${q.numericDifficulty >= 7 ? 'text-white bg-red-400 border border-red-500' : (q.numericDifficulty >= 5 ? 'text-red-800 bg-red-100 border border-red-200' : (q.numericDifficulty <= 2 ? 'text-yellow-800 bg-yellow-100 border border-yellow-200' : 'text-lime-800 bg-lime-100 border border-lime-200'))}`}>
                                                                {q.numericDifficulty || q.difficulty || '-'}
                                                            </span>
                                                        </td>
                                                        <td className="py-2.5 px-3 text-slate-700 font-medium break-keep leading-snug">
                                                            <MathText text={q.aiStrategy || q.aiShortStrategy} className="" />
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const urlParams = new URLSearchParams(window.location.search);
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
