                                                    });
                                                    addedStudents.push({ name: studentName, period: finalPeriod, responses });
                                                }
                                                else if (fileType === 'H_STUDENT') {
                                                    const parsedStudents = cleanJson.map(row => {
                                                        const getVal = (keywords) => {
                                                            const key = Object.keys(row).find(k => {
                                                                const cleanK = String(k).replace(/\s+/g, '');
                                                                return keywords.some(kw => cleanK.includes(kw.replace(/\s+/g, '')));
                                                            });
                                                            return key ? String(row[key]).trim() : '';
                                                        };
                                                        const name = getVal(['이름', '학생', '성명']);
                                                        if (!name) return null;
                                                        const rawPeriod = getVal(['시험시기', '시기', '학년학기', '출제시기']); 
                                                        let finalPeriod = parsePeriodString(rawPeriod, '', file.name);
                                                        const responses = {};
                                                        Object.keys(row).forEach(k => {
                                                            const qNumStr = String(k).replace(/[^0-9]/g, '');
                                                            if (qNumStr) {
                                                                const qNum = parseInt(qNumStr);
                                                                if (qNum > 0 && qNum <= 100) responses[qNum] = String(row[k]).trim().toUpperCase();
                                                            }
                                                        });
                                                        return { name, period: finalPeriod, responses };
                                                    }).filter(Boolean);
                                                    addedStudents.push(...parsedStudents);
                                                }
                                            }
                                        }
                                    } catch (err) { console.error(err); }
                                    resolve();
                                };
                                reader.readAsArrayBuffer(file);
                            });
                        }
                    }

                    // 마스터 DB가 새로 등록/갱신되었다면 즉각 적용
                    if (isMasterDBUpdated) {
                        setMasterDB(currentMasterDB);
                        localStorage.setItem('math_master_codes_cache', JSON.stringify(currentMasterDB));
                    }

                    // 2. 이미지 파일 자동 AI 분석 처리 및 PDF 연동
                    if (imageFiles.length > 0) {
                        let pdfBase64 = null;
                        if (pdfFile) {
                            const fileUrl = URL.createObjectURL(pdfFile);
                            setExamMedia({ url: fileUrl, isImage: false });
                            addedMediaCount++;
                            pdfBase64 = await new Promise((resolve) => {
                                const reader = new FileReader();
                                reader.onload = (e) => {
                                    const result = e.target.result;
                                    resolve(result.includes(',') ? result.split(',')[1] : result);
                                };
                                reader.readAsDataURL(pdfFile);
                            });
                        } else {
                            const fileUrl = URL.createObjectURL(imageFiles[0]);
                            setExamMedia({ url: fileUrl, isImage: true }); 
                            addedMediaCount++;
                        }

                        const apiKey = "";
                        // 🌟 프롬프트의 문자열 결합 방식으로 줄바꿈 오류 완벽 차단 및 PDF 풀이 전략 요청 🌟
                        const promptText = "첨부된 문항분석표 이미지와 시험지 PDF 원문을 분석하여 JSON 배열로 반환하세요. " + 
                                           "1. 이미지에서 '문제 번호(qNum)', '문항분류코드(code, 기호 상관없이 추출)', '배점(score)', '난이도(difficulty, 1~8)'를 추출하세요. " + 
                                           "2. 시험지 PDF의 실제 문제 내용을 직접 파악하여 해당 문제를 풀기 위한 '어려운 포인트(aiPoint)', '필요 개념(aiConcept)', '단계별 해결 전략(aiStrategy)'을 구체적으로 작성하세요. " + 
                                           "마크다운이나 다른 텍스트 없이 순수 JSON 배열만 반환하세요. " + 
                                           "예시: [{\"qNum\": 1, \"code\": \"MS130101\", \"score\": 5, \"difficulty\": 4, \"aiPoint\": \"어려운 포인트 내용\", \"aiConcept\": \"필요 개념 내용\", \"aiStrategy\": \"[1단계] ... [2단계] ...\"}]";
                        const parts = [ { text: promptText } ];

                        for(const file of imageFiles) {
                            const base64 = await new Promise((resolve) => {
                                const reader = new FileReader();
                                reader.onload = (e) => resolve(e.target.result.split(',')[1]);
                                reader.readAsDataURL(file);
                            });
                            parts.push({ inlineData: { mimeType: file.type, data: base64 } });
                        }

                        if (pdfBase64) {
                            parts.push({ inlineData: { mimeType: "application/pdf", data: pdfBase64 } });
                        }

                        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                        const payload = {
                            contents: [{ parts }],
                            generationConfig: { responseMimeType: "application/json" }
                        };

                        let retries = 3;
                        let delay = 1000;
                        let data = null;
                        while(retries > 0) {
                            try {
                                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                                if (!response.ok) throw new Error(`API Fail: ${response.status}`);
                                data = await response.json();
                                break;
                            } catch(e) {
                                retries--;
                                if(retries === 0) throw e;
                                await new Promise(r => setTimeout(r, delay));
                                delay *= 2;
                            }
                        }

                        if(data && data.candidates && data.candidates[0].content) {
                            let text = data.candidates[0].content.parts[0].text;
                            text = text.replace(/```json/gi, '').replace(/```/gi, '').trim(); 
                            
                            let jsonResult = [];
                            try { jsonResult = JSON.parse(text); } catch(e) { console.error("JSON 파싱 에러"); }

                            const imgFileName = imageFiles[0].name.replace(/\.[^/.]+$/, "").trim();
                            const parsedPeriod = parsePeriodString(imgFileName, '', imageFiles[0].name) || "미분류 시험";
                            let schoolStr = "";
                            const schoolMatch = imgFileName.match(/[가-힣a-zA-Z0-9]+(?:중|고|여중|남중|여고|남고|중학교|고등학교)/);
                            if (schoolMatch) schoolStr = schoolMatch[0];
                            else if (imgFileName.includes("신곡")) schoolStr = "신곡중";
                            else if (imgFileName.includes("해강")) schoolStr = "해강중";
                            else if (imgFileName.includes("남천")) schoolStr = "남천중";

                            const newExamsFromImg = jsonResult.map(res => {
                                const rawCode = res.code ? String(res.code) : '';
                                let normCode = normalizeCode(rawCode);

                                const mapped = currentMasterDB[normCode] || { major: '미분류 단원', minor: '분류확인필요', concept: rawCode || '분석불가' };

                                return {
                                    period: parsedPeriod,
                                    rawPeriod: imgFileName,
                                    school: schoolStr || "학교명 미상",
                                    qNum: res.qNum || 0,
                                    type: "객관식",
                                    difficulty: res.difficulty || 4,
                                    majorUnit: cleanMajorUnit(mapped.major),
                                    minorUnit: mapped.minor,
                                    concept: mapped.concept,
                                    score: res.score || 5,
                                    fileName: imgFileName,
                                    aiStrategy: res.aiStrategy || "", 
                                    aiPoint: res.aiPoint || "",
                                    aiConcept: res.aiConcept || ""
                                };
                            }).filter(e => e.qNum > 0);

                            addedExams.push(...newExamsFromImg);
                        }
                    }

                    // 🌟 3. 통합 저장 및 화면 자동 전환 🌟
                    const currentTotalExams = [...exams, ...addedExams];
                    const fallbackPeriod = currentTotalExams.length > 0 ? currentTotalExams[0].period : '';

                    addedStudents = addedStudents.map(s => {
                        let finalPeriod = s.period;
                        let isExactMatch = currentTotalExams.some(ex => ex.period === finalPeriod);
                        
                        if (!isExactMatch && currentTotalExams.length > 0) {
                            const semPrefix = finalPeriod ? finalPeriod.split(' ')[0] : '';
                            const partialMatch = currentTotalExams.find(ex => ex.period.startsWith(semPrefix));
                            if (partialMatch) finalPeriod = partialMatch.period;
                            else finalPeriod = fallbackPeriod;
                        } else if (!finalPeriod || finalPeriod === '-' || finalPeriod.split(' ').length < 2) {
                            finalPeriod = fallbackPeriod;
                        }
                        s.period = finalPeriod;
                        return s;
                    });

                    if (addedExams.length > 0) {
                        setExams(prev => [...prev.filter(p => !addedExams.some(n => n.period === p.period && n.qNum === p.qNum)), ...addedExams]);
                        addedExams.forEach(ex => {
                            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams').doc(`${ex.period}_${ex.qNum}`).set(ex).catch(e => console.warn(e));
                        });
                        
                        const latestPeriod = addedExams[addedExams.length - 1].period;
                        setFilters(prev => ({
                            ...prev,
                            semester: latestPeriod.split(' ')[0] || latestPeriod,
                            examType: latestPeriod.split(' ').slice(1).join(' ') || ''
                        }));
                        setViewMode('exam'); 
                    }

                    if (addedStudents.length > 0) {
                        setStudents(prev => [...prev.filter(p => !addedStudents.some(n => n.name === p.name && n.period === p.period)), ...addedStudents]);
                        addedStudents.forEach(s => {
                            const saveObj = { name: s.name, period: s.period, responses: s.responses };
                            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(`${s.name}_${s.period}`).set(saveObj).catch(e => console.warn(e));
                        });
                    }

                    let msg = [];
                    if (isMasterDBUpdated) msg.push(`마스터DB 업데이트`);
                    if (addedExams.length > 0) msg.push(`기출 ${addedExams.length}문항 분석완료`);
                    if (addedStudents.length > 0) msg.push(`학생 ${addedStudents.length}명 추가`);

                    if (msg.length > 0) showToast(`✅ 데이터 통합 분석 성공! (${msg.join(', ')})`, 'success');
                    else showToast(`❌ 처리된 데이터가 없습니다.`, 'error');

                } catch(error) {
                    console.error(error);
                    showToast("파일 처리 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.", "error");
                } finally {
                    setIsGenerating(false);
                    e.target.value = '';
                }
            };

            const handleCopyLink = async () => {
                if (!analysisData) { showToast("데이터 분석이 완료되지 않았습니다.", "error"); return; }
                setIsGenerating(true);

                const encoded = encodeReportData(analysisData, filters.studentName);
                if (!encoded) { setIsGenerating(false); return showToast('링크 생성에 실패했습니다.', 'error'); }
                
                const baseUrl = window.location.origin + window.location.pathname;
                const reportUrl = `${baseUrl}?report=${encoded}`;
                let finalUrl = reportUrl;

                try {
                    finalUrl = await new Promise((resolve, reject) => {
                        const callbackName = 'isgd_callback_' + Math.floor(Math.random() * 100000);
                        window[callbackName] = function(data) {
                            delete window[callbackName];
                            const script = document.getElementById(callbackName);
                            if (script) script.remove();
                            if (data && data.shorturl) resolve(data.shorturl);
                            else reject(new Error("URL 단축 실패"));
                        };
                        const script = document.createElement('script');
                        script.id = callbackName;
                        script.src = `https://is.gd/create.php?format=json&url=${encodeURIComponent(reportUrl)}&callback=${callbackName}`;
                        script.onerror = () => { delete window[callbackName]; script.remove(); reject(new Error("네트워크 오류")); };
                        document.body.appendChild(script);
                        setTimeout(() => { if(window[callbackName]) reject(new Error("타임아웃")); }, 3000);
                    });
                } catch (err) { console.warn("단축 URL 변환 실패, 기본 압축 링크 사용됨"); }
                
                setIsGenerating(false);
                setLinkModal({ show: true, url: finalUrl });
            };

            const handlePrint = () => {
                if (viewMode === 'student' && !analysisData) { showToast("학생 데이터를 먼저 선택해주세요.", "error"); return; }
                if (viewMode === 'exam' && !examReportData) { showToast("시험 데이터를 먼저 선택해주세요.", "error"); return; }
                try { window.print(); } catch(e) { showToast("키보드 단축키(Ctrl+P)를 이용해주세요.", "error"); }
            };

            const deleteStudent = (studentName, period) => {
                requestConfirm(`[${period}] 시험의 '${studentName}' 학생 데이터를 영구 삭제하시겠습니까?`, async () => {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').doc(`${studentName}_${period}`).delete();
                        showToast("✅ 해당 학생의 데이터가 삭제되었습니다.", "success");
                        if (filters.studentName === studentName && filters.semester + " " + filters.examType === period) {
                            setFilters({ ...filters, studentName: '' });
                        }
                    } catch (e) { console.error(e); showToast("삭제 중 오류가 발생했습니다.", "error"); }
                });
            };

            const deletePeriod = (period) => {
                requestConfirm(`⚠️ [${period}] 시험의 모든 문항 및 학생 데이터를 정말 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`, async () => {
                    try {
                        const batch = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams').where('period', '==', period).get().then(snap => {
                            const batchOp = db.batch();
                            snap.forEach(doc => batchOp.delete(doc.ref));
                            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').where('period', '==', period).get().then(sSnap => {
                                sSnap.forEach(doc => batchOp.delete(doc.ref));
                                batchOp.commit().then(() => {
                                    showToast(`✅ [${period}] 관련 모든 데이터가 삭제되었습니다.`, "success");
                                    if (filters.semester + " " + filters.examType === period) setFilters({ semester: '', examType: '', studentName: '' });
                                });
                            });
                        });
                    } catch (e) { console.error(e); showToast("삭제 중 오류가 발생했습니다.", "error"); }
                });
            };

            const handleClearAll = () => {
                requestConfirm("🚨 경고: 클라우드와 현재 기기에 저장된 [모든 시험 및 학생 데이터]를 영구적으로 삭제합니다.\n계속 진행하시겠습니까?", async () => {
                    try {
                        const examsSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('exams').get();
                        const studentsSnap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students').get();
                        
                        const promises = [];
                        examsSnap.forEach(doc => promises.push(doc.ref.delete()));
                        studentsSnap.forEach(doc => promises.push(doc.ref.delete()));
                        await Promise.all(promises);

                        localStorage.removeItem('math_exams_cache'); localStorage.removeItem('math_students_cache');
                        setFilters({ semester: '', examType: '', studentName: '' });
                        setShowDataModal(false);
                        showToast("✅ 모든 데이터가 성공적으로 초기화되었습니다.", "success");
                    } catch (error) { console.error("데이터 삭제 중 오류 발생:", error); showToast("데이터 삭제에 실패했습니다.", "error"); }
                });
            };

            if (isStudentView) return <StudentReportMobileView data={studentReportData} />;

            return (
                <div className="min-h-screen pb-12 relative z-0">
                    {/* 🌟 팝업 최우선 레이어 적용 🌟 */}
                    {toast.show && (
                        <div className={`fixed bottom-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-lg z-[999999] font-bold text-white transition-all animate-in fade-in slide-in-from-bottom-5 ${toast.type === 'error' ? 'bg-rose-500' : 'bg-emerald-600'}`}>
                            {toast.message}
                        </div>
                    )}

                    {confirmModal.show && (
                        <div className="fixed inset-0 bg-slate-900/40 z-[999999] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full animate-in zoom-in-95">
                                <h3 className="text-[15px] font-black text-slate-800 mb-6 whitespace-pre-wrap leading-relaxed">{confirmModal.message}</h3>
                                <div className="flex gap-3 justify-end">
                                    <button onClick={() => setConfirmModal({ show: false, message: '', onConfirm: null })} className="cursor-pointer px-4 py-2 bg-slate-100 text-slate-700 font-bold rounded-lg hover:bg-slate-200 transition-colors">취소</button>
                                    <button onClick={() => { confirmModal.onConfirm(); setConfirmModal({ show: false, message: '', onConfirm: null }); }} className="cursor-pointer px-4 py-2 bg-rose-500 text-white font-bold rounded-lg hover:bg-rose-600 transition-colors">확인</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {linkModal.show && (
                        <div className="fixed inset-0 bg-slate-900/40 z-[99999] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-md w-full animate-in zoom-in-95">
                                <h3 className="text-lg font-black text-slate-800 mb-2">✅ 링크 생성 완료</h3>
                                <p className="text-sm text-slate-500 mb-4 font-medium">아래 주소를 복사하여 학생/학부모님께 전송하세요.</p>
                                <input type="text" value={linkModal.url} readOnly className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-sm font-bold text-slate-700 mb-4 focus:outline-none" onClick={e => e.target.select()} />
                                <div className="flex gap-3 justify-end">
                                    <button onClick={() => {
                                        navigator.clipboard.writeText(linkModal.url).then(()=>showToast("복사되었습니다!", "success")).catch(()=>{});
                                    }} className="cursor-pointer px-4 py-2 bg-indigo-500 text-white font-bold rounded-lg hover:bg-indigo-600 transition-colors">복사하기</button>
                                    <button onClick={() => setLinkModal({ show: false, url: '' })} className="cursor-pointer px-4 py-2 bg-slate-100 text-slate-700 font-bold rounded-lg hover:bg-slate-200 transition-colors">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {pdfModal.show && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[9999] flex items-center justify-center p-4 backdrop-blur-sm no-print">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl h-[90vh] flex flex-col animate-in fade-in zoom-in duration-200">
                                <div className="p-4 border-b flex justify-between items-center bg-slate-50 rounded-t-2xl">
                                    <h2 className="text-lg font-black text-slate-800 flex items-center gap-2">
                                        <Icon name={pdfModal.isImage ? "image" : "file-text"} className="text-orange-600"/> 원문 뷰어
                                    </h2>
                                    <button onClick={() => setPdfModal({ show: false, url: '', isImage: false })} className="cursor-pointer text-slate-400 hover:text-slate-700 bg-white rounded-full p-1 border shadow-sm transition-colors"><Icon name="x" size={18}/></button>
                                </div>
                                <div className="flex-1 w-full bg-slate-200 rounded-b-2xl overflow-hidden p-2 flex items-center justify-center">
                                    {pdfModal.isImage ? (
                                        <img src={pdfModal.url} className="max-w-full max-h-full object-contain rounded-xl shadow-sm" alt="원문 이미지" />
                                    ) : (
                                        <iframe src={pdfModal.url} className="w-full h-full rounded-xl border border-slate-300 bg-white" title="PDF Viewer"></iframe>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="bg-white border-b shadow-sm p-4 sticky top-0 z-40 no-print flex flex-wrap gap-4 items-center justify-between">
                        <div className="flex items-center gap-6">
                            <h1 className="text-xl font-black text-indigo-900 flex items-center gap-2">
                                <Icon name="graduation-cap" size={24} className="text-indigo-600"/>
                                학습 분석 시스템
                                <span className="text-[10px] bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded border border-emerald-100 tracking-tighter uppercase font-bold">Cloud Sync</span>
                            </h1>
                            
                            <div className="flex gap-2 bg-slate-50 p-1.5 rounded-lg border text-sm font-bold items-center z-50">
                                <select className="bg-transparent outline-none cursor-pointer" 
                                        value={filters.semester} onChange={e => setFilters(p => ({...p, semester: e.target.value, studentName: ''}))}>
                                    <option value="">학년학기</option>
                                    {optionsData.semesters.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                <select className="bg-transparent outline-none cursor-pointer max-w-[150px] truncate ml-2"
                                        value={filters.examType} onChange={e => setFilters(p => ({...p, examType: e.target.value, studentName: ''}))}>
                                    <option value="">시험 선택</option>
                                    {optionsData.examTypes.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                
                                <div className="flex bg-slate-200 p-0.5 rounded ml-3">
                                    <button onClick={() => setViewMode('student')} className={`cursor-pointer px-3 py-1 rounded text-xs transition-colors ${viewMode==='student'?'bg-white shadow text-indigo-600':'text-slate-500'}`}>개별 성취도</button>
                                    <button onClick={() => setViewMode('exam')} className={`cursor-pointer px-3 py-1 rounded text-xs transition-colors ${viewMode==='exam'?'bg-white shadow text-orange-600':'text-slate-500'}`}>기출 분석</button>
                                </div>

                                {viewMode === 'student' && (
                                    <select className="bg-transparent outline-none text-indigo-600 cursor-pointer max-w-[150px] truncate ml-3"
                                            value={filters.studentName} onChange={e => setFilters(p => ({...p, studentName: e.target.value}))}>
                                        <option value="">학생 이름 선택</option>
                                        {optionsData.students.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                )}
                            </div>
                        </div>

                        <div className="flex items-center gap-2 z-50">
                            {examMedia && (
                                <button onClick={() => setPdfModal({ show: true, url: examMedia.url, isImage: examMedia.isImage })} className="cursor-pointer bg-orange-50 text-orange-700 px-3 py-2 rounded-lg text-sm font-bold border border-orange-200 hover:bg-orange-100 transition-colors flex items-center gap-1.5 shadow-sm mr-2" title="업로드된 원문 띄우기">
                                    <Icon name={examMedia.isImage ? "image" : "file-text"} size={16}/> 원문 보기
                                </button>
                            )}

                            {/* 🌟 궁극의 원클릭 데이터 통합 업로드 버튼 🌟 */}
                            <label className="cursor-pointer bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1.5 border hover:bg-indigo-700 transition-colors shadow-md" title="클릭하여 데이터(마스터DB, 엑셀, 이미지, PDF 등)를 한 번에 업로드하세요.">
                                {isGenerating ? <Icon name="loader-2" size={16} className="animate-spin-slow" /> : <Icon name="file-up" size={16} />}
                                {isGenerating ? 'AI 분석 중...' : '데이터 통합 업로드'}
                                <input type="file" accept=".xlsx, .xls, .csv, .tsv, .pdf, image/*" multiple className="hidden" onClick={(e) => (e.target.value = '')} onChange={handleFileUpload} />
                            </label>

                            <button onClick={() => setShowDataModal(true)} className="cursor-pointer bg-slate-100 text-slate-700 px-3 py-2 rounded-lg text-sm font-bold border hover:bg-slate-200 transition-colors flex items-center gap-1.5 shadow-sm" title="데이터 개별/전체 삭제 관리">
                                <Icon name="settings" size={16}/> 관리
                            </button>
                        
                            {viewMode === 'student' && (
                                <button onClick={handleCopyLink} className="cursor-pointer bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-1.5 shadow-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled={!analysisData || isGenerating}>
                                    <Icon name="link" size={16}/> 링크 복사
                                </button>
                            )}

                            <button onClick={handlePrint} className="cursor-pointer bg-slate-800 hover:bg-slate-900 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-1.5 shadow-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled={viewMode === 'student' ? !analysisData : !examReportData}>
                                <Icon name="printer" size={16}/> A4 출력
                            </button>
                        </div>
                    </div>

                    {/* --- 데이터 관리 모달 --- */}
                    {showDataModal && (
                        <div className="fixed inset-0 bg-slate-900/40 z-[99999] flex items-center justify-center p-4 backdrop-blur-sm no-print">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg flex flex-col max-h-[85vh] animate-in fade-in zoom-in duration-200">
                                <div className="p-5 border-b flex justify-between items-center bg-slate-50 rounded-t-2xl">
                                    <h2 className="text-lg font-black text-slate-800 flex items-center gap-2"><Icon name="database" className="text-indigo-600"/> 데이터 관리</h2>
                                    <button onClick={() => setShowDataModal(false)} className="cursor-pointer text-slate-400 hover:text-slate-700 bg-white rounded-full p-1 border shadow-sm transition-colors"><Icon name="x" size={18}/></button>
                                </div>
                                
                                <div className="p-5 overflow-y-auto flex-1 space-y-6">
                                    {optionsData.semesters.length === 0 ? (
                                        <div className="text-center text-slate-400 py-10 font-bold">저장된 데이터가 없습니다.</div>
                                    ) : (
                                        [...new Set(exams.map(e => e.period))].sort().map(period => (
                                            <div key={period} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                                <div className="bg-slate-50 px-4 py-3 flex justify-between items-center border-b border-slate-200">
                                                    <span className="font-black text-indigo-700">{period} 시험</span>
                                                    <button onClick={() => deletePeriod(period)} className="cursor-pointer text-xs text-rose-600 font-bold hover:bg-rose-50 px-2 py-1 rounded border border-rose-200 transition-colors">이 시험 전체 삭제</button>
                                                </div>
                                                <ul className="divide-y divide-slate-100">
                                                    {students.filter(s => s.period === period).map(s => (
                                                        <li key={s.name} className="flex justify-between items-center px-4 py-3 hover:bg-slate-50 transition-colors">
                                                            <span className="text-sm font-bold text-slate-700">{s.name} 학생</span>
                                                            <button onClick={() => deleteStudent(s.name, period)} className="cursor-pointer text-slate-400 hover:text-rose-500 transition-colors p-1" title={`${s.name} 삭제`}><Icon name="trash-2" size={16}/></button>
                                                        </li>
                                                    ))}
                                                    {students.filter(s => s.period === period).length === 0 && (
                                                        <li className="px-4 py-3 text-xs text-slate-400 text-center">등록된 학생이 없습니다.</li>
                                                    )}
                                                </ul>
                                            </div>
                                        ))
                                    )}
                                </div>
                                
                                <div className="p-5 border-t bg-slate-50 flex justify-between items-center rounded-b-2xl">
                                    <span className="text-xs text-slate-500 font-bold">⚠️ 삭제 시 클라우드 서버에서도 지워집니다.</span>
                                    <button onClick={handleClearAll} disabled={optionsData.semesters.length === 0} className="cursor-pointer bg-rose-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-rose-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                                        모든 데이터 초기화
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {((viewMode === 'student' && !analysisData) || (viewMode === 'exam' && !examReportData)) && (
                        <div className="mt-20 flex flex-col items-center justify-center text-slate-300 font-bold no-print px-6 text-center">
                            <Icon name="cloud" size={64} className="mx-auto mb-4 opacity-20" />
                            <h2 className="text-xl font-black mb-2 uppercase tracking-tight text-slate-400">Database Ready</h2>
                            <p className="text-sm font-medium text-slate-400 leading-relaxed">
                                상단의 <strong>[데이터 통합 업로드]</strong> 버튼을 눌러 작업을 시작하세요.<br/>
                                <span className="opacity-70">✅ 분류코드 마스터DB(최초1회), <strong>시험지 원문(PDF)</strong>, <strong>분석 이미지(JPG)</strong>를 동시에 올리면 AI가 즉시 자동 분석합니다.</span>
                            </p>
                            
                            <div className="mt-8 bg-slate-100 px-6 py-3 rounded-xl border border-slate-200 shadow-inner">
                                <span className="text-xs font-bold text-slate-500 flex items-center justify-center gap-1.5">
                                    <Icon name="database" size={14} className="text-indigo-500"/>
                                    현재 마스터 DB 로드 상태: <span className="text-indigo-600 font-black text-[15px] mx-1">{Object.keys(masterDB).length}</span> 개의 분류코드가 인식되어 있습니다.
                                </span>
                            </div>
                        </div>
                    )}

                    {viewMode === 'student' && analysisData && (
                        <div className="pt-8 no-print:bg-slate-100">
                            {/* --- 🖨️ Page 1: 종합 성취도 --- */}
                            <div className="a4-page bg-white print-page-1">
                                <div className="border-b-4 border-indigo-900 pb-6 mb-8 print:pb-4 print:mb-4 flex justify-between items-end">
                                    <div>
                                        <div className="text-indigo-600 font-black text-xs tracking-widest mb-1 uppercase tracking-tighter">Achievement Report</div>
                                        <div className="flex items-baseline gap-3">
                                            <h1 className="text-[28px] font-black text-slate-900 leading-tight">{analysisData.targetPeriod} 수학 성취도 리포트</h1>
                                            {analysisData.schoolName && (
                                                <span className="text-[17px] font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-md">{analysisData.schoolName}</span>
                                            )}
                                        </div>
                                    </div>
                                    <div className="text-right flex items-center gap-4">
                                        <div>
                                            <p className="text-sm text-slate-500 font-bold mb-1 uppercase tracking-tighter">Student Name</p>
                                            <p className="text-2xl font-black text-slate-800 bg-indigo-50 px-4 py-1 rounded-lg shadow-sm border border-indigo-100">{filters.studentName}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex gap-6 mb-10 print:mb-5">
                                    <div className="w-1/3 bg-indigo-600 rounded-2xl p-6 text-white flex flex-col justify-center items-center relative overflow-hidden shadow-xl">
                                        <div className="absolute -right-4 -top-4 opacity-10"><Icon name="target" size={120}/></div>
                                        <span className="text-[10px] font-bold uppercase opacity-70 tracking-widest z-10">Total Score</span>
                                        <div className="flex items-baseline gap-1 z-10">
                                            <span className="text-6xl font-black tracking-tighter">{analysisData.totalScore}</span>
                                            <span className="text-2xl font-bold">점</span>
                                        </div>
                                        <div className="mt-3 text-xs font-bold opacity-80 z-10 bg-indigo-800/50 px-4 py-1.5 rounded-full">
                                            {analysisData.results.filter(r=>r.earnedScore > 0).length} / {analysisData.results.length} 문항 부분/전체 정답
                                        </div>
                                    </div>

                                    <div className="w-2/3 bg-slate-50 rounded-2xl border border-slate-200 p-6 flex flex-col justify-center shadow-sm">
                                        <h3 className="text-lg font-black text-slate-800 mb-4 print:mb-2 flex items-center gap-2 font-sans tracking-tight"><Icon name="sparkles" size={18} className="text-amber-500"/> 학습 종합 분석</h3>
                                        <div className="grid grid-cols-2 gap-4 mb-4 print:mb-2">
                                            <div className="bg-white p-3 rounded-xl border border-emerald-100 flex items-start gap-3 shadow-sm">
                                                <div className="bg-emerald-100 p-2 rounded-lg text-emerald-600 shrink-0"><Icon name="trending-up" size={18}/></div>
                                                <div className="min-w-0 flex-1">
                                                    <p className="text-[10px] text-slate-400 font-bold mb-1">강한 단원</p>
                                                    <p className="text-[13px] font-black text-slate-800 whitespace-normal break-keep leading-snug">{comments.strong}</p>
                                                </div>
                                            </div>
                                            <div className="bg-white p-3 rounded-xl border border-rose-100 flex items-start gap-3 shadow-sm">
                                                <div className="bg-rose-100 p-2 rounded-lg text-rose-600 shrink-0"><Icon name="trending-down" size={18}/></div>
                                                <div className="min-w-0 flex-1">
                                                    <p className="text-[10px] text-slate-400 font-bold mb-1">
                                                        {comments.weak.includes('완벽함') || comments.weak.includes('양호함') ? '특이사항' : '보완 단원'}
                                                    </p>
                                                    <p className={`text-[13px] font-black whitespace-normal break-keep leading-snug ${comments.weak.includes('완벽함') ? 'text-emerald-600' : 'text-slate-800'}`}>
                                                        {comments.weak}
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="text-[13.5px] text-slate-700 leading-relaxed font-medium bg-white p-4 rounded-xl border border-slate-100 shadow-sm whitespace-pre-wrap break-keep">
                                            <span className="font-bold text-indigo-600 block mb-1">💡 전문 학습 가이드</span><br/>{comments.method}
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-10 print:gap-6 mb-8 print:mb-2">
                                    <div className="col-span-1 border-r border-slate-100 pr-10 print:pr-6">
                                        <h3 className="text-lg font-black text-slate-800 mb-6 print:mb-3 flex items-center gap-2 border-b-2 border-indigo-50 pb-2 tracking-tight"><Icon name="bar-chart-2" className="text-indigo-500" size={18}/> 단원별 성취도</h3>
                                        <HorizontalBarChart data={analysisData.unitData} color="#4f46e5" />
                                    </div>
                                    
                                    <div className="col-span-1 flex flex-col gap-8 print:gap-4">
                                        <div>
                                            <h3 className="text-lg font-black text-slate-800 mb-6 print:mb-3 flex items-center gap-2 border-b-2 border-emerald-50 pb-2 tracking-tight"><Icon name="layers" className="text-emerald-500" size={18}/> 난이도별 성취도</h3>
                                            <HorizontalBarChart data={analysisData.diffData} color="#10b981" />
                                        </div>
                                        
                                        {analysisData.typeStats && Object.keys(analysisData.typeStats).length > 0 && (
                                            <div>
                                                <h3 className="text-lg font-black text-slate-800 mb-4 print:mb-2 flex items-center gap-2 border-b-2 border-amber-50 pb-2 tracking-tight"><Icon name="pie-chart" className="text-amber-500" size={18}/> 문제유형별 정답률</h3>
                                                <div className="flex flex-wrap gap-4 justify-center md:justify-start w-full">
                                                    {Object.entries(analysisData.typeStats).map(([type, stats]) => (
                                                        <DonutChart key={type} data={[{name: '정답', value: stats.correct, color: '#4f46e5'}, {name: '오답', value: stats.total-stats.correct, color: '#e2e8f0'}]} title={type} />
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="absolute bottom-10 print:bottom-6 left-0 right-0 text-center text-[10px] text-slate-300 font-bold tracking-[0.2em] uppercase font-sans">
                                    Academic Analysis System — Page 1
                                </div>
                            </div>

                            {/* --- 🖨️ Page 2: 상세 정오표 --- */}
                            <div className="a4-page bg-white flex flex-col print-page-auto">
                                <div className="border-b-2 border-slate-200 pb-4 mb-6 flex items-center justify-between">
                                    <h2 className="text-2xl font-black text-slate-900 flex items-center gap-2 tracking-tight">
                                        <Icon name="check-square" size={24} className="text-indigo-600"/> 문항별 상세 정오표
                                    </h2>
                                    <span className="text-sm font-bold text-slate-400 uppercase tracking-widest">{analysisData.results.length} Questions</span>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-3 flex-1 items-start content-start">
                                    {analysisData.results.map((row, idx) => (
                                        <DetailRowItem key={idx} r={row} />
                                    ))}
                                </div>

                                <div className="mt-8 text-center text-[10px] text-slate-300 font-bold tracking-[0.2em] uppercase pt-4 border-t border-slate-50 font-sans">
                                    Academic Analysis System — Page 2
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 🌟 뷰 모드: 기출 분석 보고서 🌟 */}
                    {viewMode === 'exam' && examReportData && <ExamAnalysisView data={examReportData} />}
                </div>
            );
        }

        const urlParams = new URLSearchParams(window.location.search);
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
